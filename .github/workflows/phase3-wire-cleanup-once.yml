name: DIREKT Phase 3 Wiring Cleanup Once

on:
  push:
    branches: [build/android-v1]
    paths: [.github/workflows/phase3-wire-cleanup-once.yml]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - name: Remove temporary write-enabled workflows
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase3-wire-once.yml .github/workflows/phase3-wire-cleanup-once.yml
          git commit -m "chore(phase3): remove temporary wiring workflows"
          git push origin HEAD:build/android-v1
