name: DIREKT RC3 portal lock refresh

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "admin/direkt-operations-portal/package.json"
      - "admin/direkt-operations-portal/package-lock.json"
      - ".github/workflows/rc3-portal-lock-refresh.yml"

permissions:
  contents: write

concurrency:
  group: direkt-rc3-portal-lock-refresh
  cancel-in-progress: false

jobs:
  refresh-lock:
    name: Regenerate and verify operations portal lockfile
    if: >-
      github.head_ref == 'integration/rc3-crashlytics-anr-signal' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up pinned Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json

      - name: Regenerate canonical lockfile
        working-directory: admin/direkt-operations-portal
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@11.16.0
          npm install --package-lock-only --ignore-scripts
          npm ci --ignore-scripts
          npm audit --audit-level=moderate
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Commit canonical lockfile
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- admin/direkt-operations-portal/package-lock.json; then
            echo "Lockfile already canonical."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/direkt-operations-portal/package-lock.json
          git commit -m "chore(security): refresh portal lockfile"
          git push origin "HEAD:${{ github.head_ref }}"
