name: DIREKT Phase 2C Strict Type Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/src/auth/auth.repository.ts"
      - "backend/direkt-api/src/authorization/permission.guard.ts"
      - ".github/workflows/phase2c-strict-type-fix-once.yml"

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Normalize exact optional audit contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/src/auth/auth.repository.ts')
          text = path.read_text()
          old = "      requestId?: string;\n      actorId: string;"
          new = "      requestId: string | undefined;\n      actorId: string;"
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one internal audit requestId declaration.')
          path.write_text(text.replace(old, new))
          PY
      - name: Format changed backend files
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npm run format -- --log-level silent
      - name: Commit deterministic strict-type fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/src/auth/auth.repository.ts backend/direkt-api/src/authorization/permission.guard.ts
          git commit -m "fix(phase2c): normalize strict optional and provider scope types"
          git push origin HEAD:build/android-v1
