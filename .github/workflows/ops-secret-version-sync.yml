name: Secret version sync check

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync.yml

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Start narrowed metadata sync
        id: start
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          gh workflow run cloud-run-secret-version-sync.yml --repo "$GITHUB_REPOSITORY" --ref main -f confirmation=SYNC-DIREKT-SECRET-VERSIONS
      - name: Verify sync
        env:
          GH_TOKEN: ${{ github.token }}
          START: ${{ steps.start.outputs.time }}
        run: |
          sleep 5
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow cloud-run-secret-version-sync.yml --branch main --event workflow_dispatch --limit 20 --json databaseId,createdAt --jq "map(select(.createdAt >= \"$START\")) | sort_by(.createdAt) | last | .databaseId")
          gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
