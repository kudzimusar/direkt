name: DIREKT RC4 FCM secret lifecycle audit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/firebase-fcm-canary.yml"
      - ".github/workflows/rc4-fcm-secret-lifecycle-audit.yml"
      - "scripts/rc4/verify-fcm-canary-secret-lifecycle.py"
      - "scripts/rc4/bootstrap-fcm-canary-secret.sh"
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - ".github/workflows/firebase-fcm-canary.yml"
      - ".github/workflows/rc4-fcm-secret-lifecycle-audit.yml"
      - "scripts/rc4/verify-fcm-canary-secret-lifecycle.py"
      - "scripts/rc4/bootstrap-fcm-canary-secret.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-rc4-secret-lifecycle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify version-only Secret Manager lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify exact checkout
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - name: Enforce RC4 secret lifecycle boundary
        run: python scripts/rc4/verify-fcm-canary-secret-lifecycle.py
