name: Phase 5 formatter cleanup

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase5-format-cleanup.yml"

permissions:
  contents: write

concurrency:
  group: phase5-formatter-cleanup
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Install and format backend sources
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format

      - name: Commit formatter-clean source and remove helper
        shell: bash
        run: |
          rm .github/workflows/phase5-format-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Phase 5 review regressions"
          git push origin HEAD:build/android-v1
