name: DIREKT Cloud Run development deployment

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-DIREKT-DEVELOPMENT to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string
      access_mode:
        description: Cloud Run invocation boundary
        required: true
        default: private
        type: choice
        options:
          - private
          - public-synthetic
      portal_origin:
        description: Optional Vercel preview/staging origin for CORS, without a trailing slash
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-cloud-run-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, deploy and verify DIREKT development API
    if: github.ref == 'refs/heads/main'
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_PROJECT_NUMBER: "264358173369"
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_CLOUD_RUN_SERVICE: direkt-api
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_RUNTIME_SERVICE_ACCOUNT: direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com
      DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test
      NODE_ENV: test

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Validate deployment controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DEPLOY-DIREKT-DEVELOPMENT"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]
          if [[ "${{ inputs.access_mode }}" == "public-synthetic" ]]; then
            test -n "${{ inputs.portal_origin }}"
            [[ "${{ inputs.portal_origin }}" =~ ^https://[^/]+$ ]]
          fi

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ inputs.source_sha }}"
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${SOURCE_SHA}" origin/main; then
            echo "::error title=Unmerged deployment source::The selected source commit is not an ancestor of origin/main. Merge and validate it before deployment."
            exit 1
          fi
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_CLOUD_RUN_SERVICE}:${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Verify exact backend source
        working-directory: backend/direkt-api
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm run format:check
          npm run lint
          npm run typecheck
          npm run migration:check
          npm run test
          npm run build
          npm run openapi:check

      - name: Authenticate to Google Cloud with GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Artifact Registry authentication
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push immutable API image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file backend/direkt-api/Dockerfile \
            --tag "${IMAGE_URI}" \
            backend/direkt-api
          docker push "${IMAGE_URI}"

      - name: Write bounded development runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/direkt-runtime-env.yaml" <<EOF
          NODE_ENV: "development"
          PORT: "8080"
          LOG_LEVEL: "info"
          CORS_ORIGINS: "${{ inputs.portal_origin }}"
          AUTH_CHALLENGE_MODE: "synthetic"
          ACCESS_TOKEN_TTL_SECONDS: "600"
          REFRESH_TOKEN_TTL_DAYS: "30"
          CHALLENGE_TTL_SECONDS: "300"
          EVIDENCE_STORAGE_PROVIDER: "supabase"
          SUPABASE_EVIDENCE_BUCKET: "provider-evidence"
          SUPABASE_PRIVATE_MEDIA_BUCKET: "provider-media-private"
          SUPABASE_PUBLIC_MEDIA_BUCKET: "provider-media-public"
          SUPABASE_SYSTEM_EXPORTS_BUCKET: "system-exports"
          PAYMENT_PROVIDER_MODE: "disabled"
          DIREKT_ENVIRONMENT: "development"
          DIREKT_DATA_MODE: "synthetic-only"
          EOF

      - name: Deploy immutable revision to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          ACCESS_FLAG="--no-allow-unauthenticated"
          if [[ "${{ inputs.access_mode }}" == "public-synthetic" ]]; then
            ACCESS_FLAG="--allow-unauthenticated"
          fi

          gcloud run deploy "${GCP_CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --image "${IMAGE_URI}" \
            --service-account "${GCP_RUNTIME_SERVICE_ACCOUNT}" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --concurrency 40 \
            --timeout 60 \
            --ingress all \
            --env-vars-file "${RUNNER_TEMP}/direkt-runtime-env.yaml" \
            --set-secrets "DATABASE_URL=direkt-database-url:latest,SUPABASE_URL=direkt-supabase-url:latest,SUPABASE_SECRET_KEY=direkt-supabase-secret-key:latest,ACCESS_TOKEN_SECRET=direkt-access-token-secret:latest,CONTACT_HASH_PEPPER=direkt-contact-hash-pepper:latest,CHALLENGE_HASH_PEPPER=direkt-challenge-hash-pepper:latest" \
            ${ACCESS_FLAG} \
            --quiet

      - name: Resolve deployed service URL
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_URL="$(gcloud run services describe "${GCP_CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          test -n "${SERVICE_URL}"
          echo "SERVICE_URL=${SERVICE_URL}" >> "${GITHUB_ENV}"

      - name: Run readiness smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.access_mode }}" == "private" ]]; then
            ID_TOKEN="$(gcloud auth print-identity-token --audiences="${SERVICE_URL}")"
            echo "::add-mask::${ID_TOKEN}"
            curl --fail --silent --show-error \
              --retry 8 --retry-delay 5 --retry-all-errors \
              --header "Authorization: Bearer ${ID_TOKEN}" \
              "${SERVICE_URL}/api/v1/health/ready" \
              | tee "${RUNNER_TEMP}/direkt-health.json"
          else
            curl --fail --silent --show-error \
              --retry 8 --retry-delay 5 --retry-all-errors \
              "${SERVICE_URL}/api/v1/health/ready" \
              | tee "${RUNNER_TEMP}/direkt-health.json"
          fi
          jq -e '.status == "ready"' "${RUNNER_TEMP}/direkt-health.json" >/dev/null

      - name: Publish deployment summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### DIREKT Cloud Run development deployment"
            echo "- Source: \`${SOURCE_SHA}\`"
            echo "- Source ancestry: verified against \`origin/main\`"
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Project: \`${GCP_PROJECT_ID}\`"
            echo "- Region: \`${GCP_REGION}\`"
            echo "- Service: \`${GCP_CLOUD_RUN_SERVICE}\`"
            echo "- Access mode: \`${{ inputs.access_mode }}\`"
            echo "- Data mode: \`synthetic-only\`"
            echo "- Runtime secrets: Google Secret Manager references only"
            echo "- Readiness: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
