name: DIREKT Cloud Run development deployment

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-DIREKT-DEVELOPMENT to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-cloud-run-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, deploy and verify private DIREKT development API
    if: github.ref == 'refs/heads/main'
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_PROJECT_NUMBER: "264358173369"
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_CLOUD_RUN_SERVICE: direkt-api
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_RUNTIME_SERVICE_ACCOUNT: direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com
      DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test
      NODE_ENV: test

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Validate deployment controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DEPLOY-DIREKT-DEVELOPMENT"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact reviewed source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ inputs.source_sha }}"
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${SOURCE_SHA}" origin/main; then
            echo "::error title=Unmerged deployment source::The selected source commit is not an ancestor of origin/main."
            exit 1
          fi
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_CLOUD_RUN_SERVICE}:${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - name: Set up Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Verify exact backend source
        working-directory: backend/direkt-api
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm run format:check
          npm run lint
          npm run typecheck
          npm run migration:check
          npm run test
          npm run build
          npm run openapi:check

      - name: Authenticate to Google Cloud with GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve enabled numeric Secret Manager versions
        shell: bash
        run: |
          set -euo pipefail

          mappings=(
            "DIREKT_DATABASE_URL_SECRET_VERSION:direkt-database-url"
            "DIREKT_SUPABASE_URL_SECRET_VERSION:direkt-supabase-url"
            "DIREKT_SUPABASE_SECRET_KEY_SECRET_VERSION:direkt-supabase-secret-key"
            "DIREKT_ACCESS_TOKEN_SECRET_VERSION:direkt-access-token-secret"
            "DIREKT_CONTACT_HASH_PEPPER_SECRET_VERSION:direkt-contact-hash-pepper"
            "DIREKT_CHALLENGE_HASH_PEPPER_SECRET_VERSION:direkt-challenge-hash-pepper"
          )

          for mapping in "${mappings[@]}"; do
            variable_name="${mapping%%:*}"
            secret_name="${mapping#*:}"
            version_record="$(gcloud secrets versions describe latest \
              --secret "${secret_name}" \
              --project "${GCP_PROJECT_ID}" \
              --format=json)"
            version="$(jq -r '.name | split("/") | last' <<< "${version_record}")"
            state="$(jq -r '.state' <<< "${version_record}")"

            if [[ ! "${version}" =~ ^[1-9][0-9]*$ ]] || [[ "${state}" != "ENABLED" ]]; then
              echo "::error title=Enabled secret version missing::${secret_name} did not resolve to an enabled numeric version."
              exit 1
            fi

            echo "${variable_name}=${version}" >> "${GITHUB_ENV}"
            echo "- ${secret_name}: version ${version}" >> "${GITHUB_STEP_SUMMARY}"
          done

      - name: Configure Artifact Registry authentication
        shell: bash
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push immutable API image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file backend/direkt-api/Dockerfile \
            --tag "${IMAGE_URI}" \
            backend/direkt-api
          docker push "${IMAGE_URI}"

      - name: Write bounded development runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/direkt-runtime-env.yaml" <<'EOF'
          NODE_ENV: "development"
          LOG_LEVEL: "info"
          CORS_ORIGINS: ""
          AUTH_CHALLENGE_MODE: "synthetic"
          ACCESS_TOKEN_TTL_SECONDS: "600"
          REFRESH_TOKEN_TTL_DAYS: "30"
          CHALLENGE_TTL_SECONDS: "300"
          EVIDENCE_STORAGE_PROVIDER: "supabase"
          SUPABASE_EVIDENCE_BUCKET: "provider-evidence"
          SUPABASE_PRIVATE_MEDIA_BUCKET: "provider-media-private"
          SUPABASE_PUBLIC_MEDIA_BUCKET: "provider-media-public"
          SUPABASE_SYSTEM_EXPORTS_BUCKET: "system-exports"
          PAYMENT_PROVIDER_MODE: "disabled"
          DIREKT_ENVIRONMENT: "development"
          DIREKT_DATA_MODE: "synthetic-only"
          EOF

      - name: Deploy immutable private revision to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${GCP_CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --image "${IMAGE_URI}" \
            --service-account "${GCP_RUNTIME_SERVICE_ACCOUNT}" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 40 \
            --timeout 60 \
            --ingress all \
            --env-vars-file "${RUNNER_TEMP}/direkt-runtime-env.yaml" \
            --set-secrets "DATABASE_URL=direkt-database-url:${DIREKT_DATABASE_URL_SECRET_VERSION},SUPABASE_URL=direkt-supabase-url:${DIREKT_SUPABASE_URL_SECRET_VERSION},SUPABASE_SECRET_KEY=direkt-supabase-secret-key:${DIREKT_SUPABASE_SECRET_KEY_SECRET_VERSION},ACCESS_TOKEN_SECRET=direkt-access-token-secret:${DIREKT_ACCESS_TOKEN_SECRET_VERSION},CONTACT_HASH_PEPPER=direkt-contact-hash-pepper:${DIREKT_CONTACT_HASH_PEPPER_SECRET_VERSION},CHALLENGE_HASH_PEPPER=direkt-challenge-hash-pepper:${DIREKT_CHALLENGE_HASH_PEPPER_SECRET_VERSION}" \
            --no-allow-unauthenticated \
            --quiet

      - name: Remove and reject public invocation bindings
        shell: bash
        run: |
          set -euo pipefail
          for member in allUsers allAuthenticatedUsers; do
            gcloud run services remove-iam-policy-binding "${GCP_CLOUD_RUN_SERVICE}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --member "${member}" \
              --role roles/run.invoker \
              --quiet >/dev/null 2>&1 || true
          done

          gcloud run services get-iam-policy "${GCP_CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format=json > "${RUNNER_TEMP}/direkt-api-iam.json"
          jq -e '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' \
            "${RUNNER_TEMP}/direkt-api-iam.json" >/dev/null

      - name: Resolve and verify deployed service
        shell: bash
        run: |
          set -euo pipefail
          gcloud run services describe "${GCP_CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format=json > "${RUNNER_TEMP}/direkt-api-service.json"

          SERVICE_URL="$(jq -r '.status.url' "${RUNNER_TEMP}/direkt-api-service.json")"
          test -n "${SERVICE_URL}"
          jq -e --arg identity "${GCP_RUNTIME_SERVICE_ACCOUNT}" '.spec.template.spec.serviceAccountName == $identity' \
            "${RUNNER_TEMP}/direkt-api-service.json" >/dev/null
          jq -e '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef.key == "latest")] | length == 0' \
            "${RUNNER_TEMP}/direkt-api-service.json" >/dev/null
          echo "SERVICE_URL=${SERVICE_URL}" >> "${GITHUB_ENV}"

      - name: Mint private Cloud Run smoke-test ID token
        id: cloud-run-smoke-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.SERVICE_URL }}
          id_token_include_email: true

      - name: Run readiness smoke test
        shell: bash
        env:
          CLOUD_RUN_ID_TOKEN: ${{ steps.cloud-run-smoke-auth.outputs.id_token }}
        run: |
          set -euo pipefail
          test -n "${CLOUD_RUN_ID_TOKEN}"
          echo "::add-mask::${CLOUD_RUN_ID_TOKEN}"
          curl --fail --silent --show-error \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer ${CLOUD_RUN_ID_TOKEN}" \
            "${SERVICE_URL}/api/v1/health/ready" \
            > "${RUNNER_TEMP}/direkt-health.json"
          jq -e '.status == "ok" and .database.status == "ready"' "${RUNNER_TEMP}/direkt-health.json" >/dev/null

      - name: Publish deployment summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### DIREKT Cloud Run development deployment"
            echo "- Source: \`${SOURCE_SHA}\`"
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Project: \`${GCP_PROJECT_ID}\`"
            echo "- Region: \`${GCP_REGION}\`"
            echo "- Service: \`${GCP_CLOUD_RUN_SERVICE}\`"
            echo "- Invocation: IAM-private"
            echo "- Data mode: \`synthetic-only\`"
            echo "- Runtime secret versions: resolved to enabled numeric versions"
            echo "- Public invocation bindings: absent"
            echo "- Readiness: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
