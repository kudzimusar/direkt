name: Phase 10 staging metadata diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-staging-secret-diagnostic.yml

permissions:
  contents: read
  id-token: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api
      GCP_PORTAL_SERVICE: direkt-operations-portal-staging
    steps:
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Inspect sanitized staging scaling metadata
        shell: bash
        run: |
          set -euo pipefail
          for service in "${GCP_API_SERVICE}" "${GCP_PORTAL_SERVICE}"; do
            file="${RUNNER_TEMP}/${service}.json"
            gcloud run services describe "${service}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --format=json > "${file}"
            jq -c --arg service "${service}" '{
              service:$service,
              min_scale_annotation:(.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // null),
              max_scale_annotation:(.spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] // null),
              template_scaling:(.spec.template.scaling // null)
            }' "${file}"
          done
