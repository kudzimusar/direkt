name: Phase 10 staging secret metadata diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-staging-secret-diagnostic.yml

permissions:
  contents: read
  id-token: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
    steps:
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Check staging secret metadata visibility
        shell: bash
        run: |
          set -euo pipefail
          secrets=(
            direkt-database-url
            direkt-supabase-url
            direkt-supabase-secret-key
            direkt-access-token-secret
            direkt-contact-hash-pepper
            direkt-challenge-hash-pepper
            direkt-rate-limit-hash-pepper
            direkt-portal-cookie-secret
          )
          failures=0
          for secret_name in "${secrets[@]}"; do
            if gcloud secrets versions describe latest --secret "${secret_name}" --project "${GCP_PROJECT_ID}" --format='value(name)' >/dev/null 2>&1; then
              echo "VISIBLE ${secret_name}"
            else
              echo "UNAVAILABLE ${secret_name}"
              failures=$((failures + 1))
            fi
          done
          echo "Unavailable secret metadata count: ${failures}"
