name: Stage 7G regression alignment once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7g-regression-alignment-once.yml"

permissions:
  contents: write

concurrency:
  group: stage7g-regression-alignment
  cancel-in-progress: false

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'activate Stage 7G regression alignment')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Align permanent Stage 7 regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          override = Path('backend/direkt-api/test/e2e/operations-escalations-overrides.e2e.spec.ts')
          text = override.read_text()
          start_marker = '      if (requirement.requirement_id === requirement.case_requirement_id) {'
          start = text.index(start_marker)
          end = text.index('\n      }', start) + len('\n      }')
          override.write_text(text[:start] + text[end:])

          reporting = Path('backend/direkt-api/test/e2e/operations-reporting.e2e.spec.ts')
          text = reporting.read_text()
          replacements = [
            (
              '  let support: SessionResponse;\n  let admin: SessionResponse;',
              '  let support: SessionResponse;\n  let secondSupport: SessionResponse;\n  let admin: SessionResponse;',
            ),
            (
              "    support = await signIn('phase7-reporting-support@example.invalid');\n    admin = await signIn",
              "    support = await signIn('phase7-reporting-support@example.invalid');\n    secondSupport = await signIn('phase7-reporting-second-support@example.invalid');\n    admin = await signIn",
            ),
            (
              "    await grantRole(support, 'support');\n    await grantRole(admin, 'admin');",
              "    await grantRole(support, 'support');\n    await grantRole(secondSupport, 'support');\n    await grantRole(admin, 'admin');",
            ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing reporting token: {old[:36]}')
              text = text.replace(old, new, 1)

          resolution_marker = """      .send({ reason: 'Assigned support operator started the synthetic internal investigation.' })
              .expect(200);
            const resolvedResponse = await request(httpServer())
          """
          if resolution_marker not in text:
              compact_marker = """      .send({ reason: 'Assigned support operator started the synthetic internal investigation.' })
              .expect(200);
            const resolvedResponse = await request(httpServer())
          """
              resolution_marker = compact_marker
          resolution_replacement = resolution_marker.replace(
              '    const resolvedResponse = await request(httpServer())',
              """    await request(httpServer())
              .post(`/api/v1/operations/incidents/${incident.incidentId}/resolve`)
              .set('authorization', `Bearer ${secondSupport.accessToken}`)
              .send({
                targetStatus: 'resolved',
                resolutionCode: 'UNOWNED_RESOLUTION_ATTEMPT',
                resolutionSummary:
                  'An unrelated support operator must not resolve another operator owned incident.',
              })
              .expect(400);
            const resolvedResponse = await request(httpServer())""",
          )
          if resolution_marker not in text:
              raise SystemExit('missing incident resolution insertion point')
          text = text.replace(resolution_marker, resolution_replacement, 1)

          old_leak = "    expect(serialized).not.toContain('objectKey');"
          if old_leak not in text:
              raise SystemExit('missing objectKey leak assertion')
          text = text.replace(
              old_leak,
              "    expect(serialized).not.toContain('\\\"objectKey\\\":');\n    expect(serialized).not.toContain('https://storage');",
              1,
          )
          reporting.write_text(text)

          field = Path('backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts')
          text = field.read_text()
          marker = "  it('persists idempotent offline submissions without creating trust state', async () => {"
          if marker not in text:
              raise SystemExit('missing field idempotency insertion point')
          privacy_test = """  it('rejects precise coordinates and private storage references from public field text', async () => {
            const caseId = await createCase('public_safe_text');
            const work = await createWork(caseId, fieldAgentA.identityId, 2);
            await acceptAndStart(work.workItemId, fieldAgentA);

            await request(httpServer())
              .post(`/api/v1/operations/field-work-items/${work.workItemId}/submissions`)
              .set('authorization', `Bearer ${fieldAgentA.accessToken}`)
              .send(
                submission(
                  'completed',
                  'offline-public-safe-0001',
                  'Synthetic inspection at 15.38761, 28.32282 must not enter public-safe output.',
                ),
              )
              .expect(400);

            await request(httpServer())
              .post(`/api/v1/operations/field-work-items/${work.workItemId}/submissions`)
              .set('authorization', `Bearer ${fieldAgentA.accessToken}`)
              .send({
                ...submission(
                  'completed',
                  'offline-public-safe-0002',
                  'Synthetic inspection completed without precise private location data.',
                ),
                observations: [
                  {
                    key: 'provider_presence',
                    result: 'confirmed',
                    note: 'Private object key private/00000000-0000-4000-8000-000000000001/00000000-0000-4000-8000-000000000002/00000000-0000-4000-8000-000000000003',
                  },
                ],
              })
              .expect(400);
          });

          """
          field.write_text(text.replace(marker, privacy_test + marker, 1))
          PY
      - name: Format, commit and remove helper
        shell: bash
        run: |
          cd backend/direkt-api
          npm ci --ignore-scripts
          npm run format
          cd ../..
          rm .github/workflows/stage7g-regression-alignment-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-escalations-overrides.e2e.spec.ts backend/direkt-api/test/e2e/operations-reporting.e2e.spec.ts backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts .github/workflows/stage7g-regression-alignment-once.yml
          git diff --cached --check
          git commit -m "test: align Stage 7 trust-boundary regressions"
          git push origin HEAD:build/android-v1

# robust third-commit activation marker
