name: Finalize infrastructure bootstrap

on:
  push:
    branches:
      - integration/phase10-infrastructure-bootstrap
    paths:
      - ".github/workflows/finalize-infrastructure-bootstrap.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/phase10-infrastructure-bootstrap
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json
      - name: Bind Cloud Run smoke to the API readiness schema
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/cloud-run-development-deploy.yml')
          text = path.read_text()
          old = "          jq -e '.status == \"ready\"' \"${RUNNER_TEMP}/direkt-health.json\" >/dev/null"
          new = "          jq -e '.status == \"ok\" and .database.status == \"ready\"' \"${RUNNER_TEMP}/direkt-health.json\" >/dev/null"
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('Cloud Run readiness assertion marker missing')
          PY
      - name: Format portal deployment files
        working-directory: admin/direkt-operations-portal
        run: |
          npm ci --ignore-scripts
          npx prettier --write src/app/api/health/route.ts test/deployment-health.spec.ts vercel.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cloud-run-development-deploy.yml admin/direkt-operations-portal/src/app/api/health/route.ts admin/direkt-operations-portal/test/deployment-health.spec.ts admin/direkt-operations-portal/vercel.json
          if git diff --cached --quiet; then
            echo "No finalization changes required."
          else
            git commit -m "fix(infra): finalize readiness and portal formatting"
            git push origin HEAD:integration/phase10-infrastructure-bootstrap
          fi
