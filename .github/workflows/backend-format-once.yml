name: DIREKT Backend Format Once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - ".github/workflows/backend-format-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-backend-format-once
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci --ignore-scripts --silent
      - run: npm run format -- --log-level silent
      - name: Commit only deterministic formatting changes
        shell: bash
        run: |
          if [[ -z "$(git status --short -- .)" ]]; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style(backend): normalize final lint fixes"
          git push origin HEAD:build/android-v1
