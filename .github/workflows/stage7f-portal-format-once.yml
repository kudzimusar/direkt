name: Stage 7F portal format once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7f-portal-format-once.yml"

permissions:
  contents: write

concurrency:
  group: stage7f-portal-format-once
  cancel-in-progress: false

jobs:
  format:
    if: contains(github.event.head_commit.message, 'activate Stage 7F portal formatter')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin/direkt-operations-portal
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format
      - name: Commit formatter output and remove helper
        shell: bash
        working-directory: .
        run: |
          rm .github/workflows/stage7f-portal-format-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/direkt-operations-portal .github/workflows/stage7f-portal-format-once.yml
          git diff --cached --check
          git commit -m "style: apply pinned Stage 7F portal formatter"
          git push origin HEAD:build/android-v1

# second-commit activation marker
