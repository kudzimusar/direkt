name: VC7 wire grounded support once

on:
  push:
    branches:
      - vc/ai-quality-7-8
    paths:
      - ".github/workflows/vc7-wire-support-once.yml"

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: vc/ai-quality-7-8
          fetch-depth: 0
      - name: Patch only reviewed account/help integration points
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("web/direkt-app/components/direkt-app-shell.tsx")
          text = path.read_text()

          import_marker = 'import { ProviderJourneyExperience } from "@/components/provider-journey-experience";\n'
          if 'SupportAssistPanel' not in text:
              text = text.replace(
                  import_marker,
                  import_marker + 'import { SupportAssistPanel } from "@/components/support-assist-panel";\n',
                  1,
              )

          insertion_marker = '''          {!showDiscovery &&\n          !showCustomerJourney &&\n          !showProviderJourney &&\n          !showAccount ? ('''
          insertion = '''          {showAccount ? <SupportAssistPanel /> : null}\n          {!showDiscovery &&\n          !showCustomerJourney &&\n          !showProviderJourney &&\n          !showAccount ? ('''
          if insertion_marker not in text:
              raise SystemExit("Account/help insertion marker missing")
          text = text.replace(insertion_marker, insertion, 1)
          path.write_text(text)
          PY
      - name: Commit bounded support wiring
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "direkt-vc-wiring[bot]"
          git config user.email "direkt-vc-wiring[bot]@users.noreply.github.com"
          git add web/direkt-app/components/direkt-app-shell.tsx
          git commit -m "feat(vc7): connect grounded help assistant to account surface"
          git push origin HEAD:vc/ai-quality-7-8
