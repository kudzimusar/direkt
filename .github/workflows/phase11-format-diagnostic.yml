name: DIREKT Phase 11 format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts --silent
      - name: Normalize isolated auth formatter drift
        run: npx prettier --write src/auth/firebase-session.repository.ts src/auth/pilot-invitation.controller.ts
      - name: Commit canonical formatting when needed
        shell: bash
        run: |
          if git diff --quiet -- src/auth/firebase-session.repository.ts src/auth/pilot-invitation.controller.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/auth/firebase-session.repository.ts src/auth/pilot-invitation.controller.ts
          git commit -m "style: normalize Phase 11 auth formatting"
          git push origin HEAD:${{ github.head_ref }}
