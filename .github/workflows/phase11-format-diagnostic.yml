name: DIREKT Phase 11 format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts --silent
      - name: Normalize isolated auth formatter drift
        run: npx prettier --write src/auth/firebase-session.repository.ts src/auth/pilot-invitation.controller.ts
      - uses: actions/upload-artifact@v4
        with:
          name: phase11-formatted-auth-${{ github.sha }}
          path: |
            backend/direkt-api/src/auth/firebase-session.repository.ts
            backend/direkt-api/src/auth/pilot-invitation.controller.ts
          if-no-files-found: error
          retention-days: 1
