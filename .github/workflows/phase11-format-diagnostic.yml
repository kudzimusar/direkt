name: DIREKT Phase 11 format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts --silent
      - name: Capture files that differ from Prettier
        shell: bash
        run: |
          mkdir -p artifacts/format-diagnostic
          npx prettier --list-different "{src,scripts,test}/**/*.ts" "*.{json,js,mjs}" > artifacts/format-diagnostic/files.txt || true
          cat artifacts/format-diagnostic/files.txt
          test ! -s artifacts/format-diagnostic/files.txt
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-format-diagnostic-${{ github.sha }}
          path: backend/direkt-api/artifacts/format-diagnostic/files.txt
          if-no-files-found: error
          retention-days: 1
