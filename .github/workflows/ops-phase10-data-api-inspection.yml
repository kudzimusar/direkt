name: Format Phase 10 Supabase boundary check

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-data-api-inspection.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/phase10-supabase-data-api-quarantine
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply pinned repository formatter to the changed file
        working-directory: backend/direkt-api
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npx prettier --write scripts/check-supabase.ts
          git diff --check
          if git diff --quiet -- scripts/check-supabase.ts; then
            echo "No formatter changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/check-supabase.ts
          git commit -m "style: format Supabase boundary check"
          git push origin HEAD:fix/phase10-supabase-data-api-quarantine
