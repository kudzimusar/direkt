name: Phase 10 backend formatting diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-data-api-inspection.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show failed backend formatting output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29634377401 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -A20 -B5 -E 'prettier|Prettier|format|check-supabase|Code style issues' \
            | tail -n 120
