name: Phase 10 managed restore diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-data-api-inspection.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show managed restore error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29635408329 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'ERROR:|Error:|error:|failed|Failed|permission denied|does not exist|syntax error|Process completed|psql:' \
            | tail -n 100
