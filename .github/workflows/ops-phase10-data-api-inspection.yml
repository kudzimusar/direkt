name: Phase 10 staging diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-data-api-inspection.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show migration error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29634809995 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'ERROR:|Error:|error:|failed|Failed|permission denied|does not exist|syntax error|Process completed' \
            | tail -n 80
