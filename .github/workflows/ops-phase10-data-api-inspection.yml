name: Phase 10 Data API inspection cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-data-api-inspection.yml

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove secret-bearing inspection run and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method DELETE \
            "repos/${GITHUB_REPOSITORY}/actions/runs/29634133092"
          echo "Removed secret-bearing inspection run 29634133092 and its artifacts."
