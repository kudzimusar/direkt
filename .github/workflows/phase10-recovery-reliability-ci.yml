name: DIREKT Phase 10 recovery and reliability exercise

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/phase10-recovery-reliability-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/phase10-recovery-reliability-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-phase10-recovery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exercise:
    name: Restore, outage recovery and bounded soak
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://direkt:direkt_recovery_ci@localhost:5432/direkt_recovery_source
      SOURCE_DATABASE: direkt_recovery_source
      RESTORE_DATABASE: direkt_recovery_restored
      POSTGRES_USER: direkt
      POSTGRES_PASSWORD: direkt_recovery_ci
      API_PORT: "8090"
      SOAK_REQUESTS: "600"
      SOAK_CONCURRENCY: "10"
      SOAK_P95_BUDGET_MS: "750"
      SOAK_MAX_BUDGET_MS: "3000"

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_recovery_source
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_recovery_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_recovery_source"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Install, migrate and seed synthetic source
        working-directory: backend/direkt-api
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm run migration:up
          npm run seed:synthetic

      - name: Back up, restore and verify the synthetic database
        shell: bash
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/phase10

          source_query() {
            docker exec \
              --env PGPASSWORD="${POSTGRES_PASSWORD}" \
              "${POSTGRES_CONTAINER}" \
              psql \
                --username "${POSTGRES_USER}" \
                --dbname "${SOURCE_DATABASE}" \
                --tuples-only \
                --no-align \
                --set ON_ERROR_STOP=1 \
                --command "$1"
          }

          restore_query() {
            docker exec \
              --env PGPASSWORD="${POSTGRES_PASSWORD}" \
              "${POSTGRES_CONTAINER}" \
              psql \
                --username "${POSTGRES_USER}" \
                --dbname "${RESTORE_DATABASE}" \
                --tuples-only \
                --no-align \
                --set ON_ERROR_STOP=1 \
                --command "$1"
          }

          source_query "CREATE SCHEMA IF NOT EXISTS phase10_exercise; CREATE TABLE IF NOT EXISTS phase10_exercise.recovery_sentinel (id uuid PRIMARY KEY, payload text NOT NULL, created_at timestamptz NOT NULL DEFAULT now()); TRUNCATE phase10_exercise.recovery_sentinel; INSERT INTO phase10_exercise.recovery_sentinel (id, payload) VALUES ('00000000-0000-4000-8000-000000001010', 'DIREKT_PHASE10_SYNTHETIC_RECOVERY_SENTINEL');" >/dev/null

          SOURCE_TABLE_COUNT="$(source_query "SELECT count(*) FROM pg_tables WHERE schemaname NOT IN ('pg_catalog', 'information_schema');")"
          SOURCE_SENTINEL_HASH="$(source_query "SELECT md5(payload) FROM phase10_exercise.recovery_sentinel WHERE id = '00000000-0000-4000-8000-000000001010';")"
          SOURCE_IDENTITY_COUNT="$(source_query "SELECT count(*) FROM account.identities;")"
          SOURCE_POSTGIS_VERSION="$(source_query "SELECT extversion FROM pg_extension WHERE extname = 'postgis';")"

          test "${SOURCE_TABLE_COUNT}" -gt 0
          test -n "${SOURCE_SENTINEL_HASH}"
          test "${SOURCE_IDENTITY_COUNT}" -gt 0
          test -n "${SOURCE_POSTGIS_VERSION}"

          RESTORE_STARTED_AT="$(date +%s)"
          docker exec \
            --env PGPASSWORD="${POSTGRES_PASSWORD}" \
            "${POSTGRES_CONTAINER}" \
            pg_dump \
              --username "${POSTGRES_USER}" \
              --dbname "${SOURCE_DATABASE}" \
              --format custom \
              --no-owner \
              --no-acl \
              --file /tmp/direkt-phase10-recovery.dump
          docker exec \
            --env PGPASSWORD="${POSTGRES_PASSWORD}" \
            "${POSTGRES_CONTAINER}" \
            dropdb --username "${POSTGRES_USER}" --if-exists "${RESTORE_DATABASE}"
          docker exec \
            --env PGPASSWORD="${POSTGRES_PASSWORD}" \
            "${POSTGRES_CONTAINER}" \
            createdb --username "${POSTGRES_USER}" --owner "${POSTGRES_USER}" --template template0 "${RESTORE_DATABASE}"
          docker exec \
            --env PGPASSWORD="${POSTGRES_PASSWORD}" \
            "${POSTGRES_CONTAINER}" \
            pg_restore \
              --username "${POSTGRES_USER}" \
              --dbname "${RESTORE_DATABASE}" \
              --no-owner \
              --no-acl \
              --exit-on-error \
              /tmp/direkt-phase10-recovery.dump
          RESTORE_DURATION_SECONDS="$(( $(date +%s) - RESTORE_STARTED_AT ))"

          RESTORED_TABLE_COUNT="$(restore_query "SELECT count(*) FROM pg_tables WHERE schemaname NOT IN ('pg_catalog', 'information_schema');")"
          RESTORED_SENTINEL_HASH="$(restore_query "SELECT md5(payload) FROM phase10_exercise.recovery_sentinel WHERE id = '00000000-0000-4000-8000-000000001010';")"
          RESTORED_IDENTITY_COUNT="$(restore_query "SELECT count(*) FROM account.identities;")"
          RESTORED_POSTGIS_VERSION="$(restore_query "SELECT extversion FROM pg_extension WHERE extname = 'postgis';")"

          test "${RESTORED_TABLE_COUNT}" = "${SOURCE_TABLE_COUNT}"
          test "${RESTORED_SENTINEL_HASH}" = "${SOURCE_SENTINEL_HASH}"
          test "${RESTORED_IDENTITY_COUNT}" = "${SOURCE_IDENTITY_COUNT}"
          test "${RESTORED_POSTGIS_VERSION}" = "${SOURCE_POSTGIS_VERSION}"
          test "${RESTORE_DURATION_SECONDS}" -le 180

          RESTORED_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${RESTORE_DATABASE}"
          DATABASE_URL="${RESTORED_DATABASE_URL}" npm --prefix backend/direkt-api run migration:up

          {
            echo "SOURCE_TABLE_COUNT=${SOURCE_TABLE_COUNT}"
            echo "SOURCE_IDENTITY_COUNT=${SOURCE_IDENTITY_COUNT}"
            echo "RESTORED_TABLE_COUNT=${RESTORED_TABLE_COUNT}"
            echo "RESTORED_IDENTITY_COUNT=${RESTORED_IDENTITY_COUNT}"
            echo "RESTORED_POSTGIS_VERSION=${RESTORED_POSTGIS_VERSION}"
            echo "RESTORE_DURATION_SECONDS=${RESTORE_DURATION_SECONDS}"
            echo "RESTORED_DATABASE_URL=${RESTORED_DATABASE_URL}"
          } >> "${GITHUB_ENV}"

          jq -n \
            --argjson sourceTableCount "${SOURCE_TABLE_COUNT}" \
            --argjson restoredTableCount "${RESTORED_TABLE_COUNT}" \
            --argjson sourceIdentityCount "${SOURCE_IDENTITY_COUNT}" \
            --argjson restoredIdentityCount "${RESTORED_IDENTITY_COUNT}" \
            --arg postgisVersion "${RESTORED_POSTGIS_VERSION}" \
            --argjson restoreDurationSeconds "${RESTORE_DURATION_SECONDS}" \
            '{
              sourceTableCount: $sourceTableCount,
              restoredTableCount: $restoredTableCount,
              sourceIdentityCount: $sourceIdentityCount,
              restoredIdentityCount: $restoredIdentityCount,
              postgisVersion: $postgisVersion,
              sentinelIntegrity: "matched",
              restoreDurationSeconds: $restoreDurationSeconds,
              exerciseRpo: "zero synthetic sentinel loss"
            }' > artifacts/phase10/database-restore-evidence.json

      - name: Start the API against the restored database
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="direkt-api-recovery:${GITHUB_SHA}"
          docker build \
            --file backend/direkt-api/Dockerfile \
            --tag "${IMAGE}" \
            backend/direkt-api
          docker run --detach \
            --name direkt-api-recovery \
            --network host \
            --env NODE_ENV=development \
            --env PORT="${API_PORT}" \
            --env DATABASE_URL="${RESTORED_DATABASE_URL}" \
            --env AUTH_CHALLENGE_MODE=synthetic \
            --env EVIDENCE_STORAGE_PROVIDER=synthetic \
            --env PAYMENT_PROVIDER_MODE=disabled \
            "${IMAGE}"

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "http://127.0.0.1:${API_PORT}/api/v1/health/ready" \
              > "${RUNNER_TEMP}/restored-api-health.json"; then
              jq -e '.status == "ok" and .database.status == "ready"' \
                "${RUNNER_TEMP}/restored-api-health.json" >/dev/null
              exit 0
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              docker logs direkt-api-recovery
              exit 1
            fi
            sleep 2
          done

      - name: Exercise fail-closed dependency outage and recovery
        shell: bash
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          set -euo pipefail
          docker pause "${POSTGRES_CONTAINER}" >/dev/null
          trap 'docker unpause "${POSTGRES_CONTAINER}" >/dev/null 2>&1 || true' EXIT

          set +e
          OUTAGE_HTTP_STATUS="$(curl --silent --show-error --max-time 8 \
            --output "${RUNNER_TEMP}/outage-health.json" \
            --write-out '%{http_code}' \
            "http://127.0.0.1:${API_PORT}/api/v1/health/ready")"
          OUTAGE_CURL_EXIT="$?"
          set -e
          OUTAGE_HTTP_STATUS="${OUTAGE_HTTP_STATUS:-000}"
          if [[ "${OUTAGE_HTTP_STATUS}" == "200" ]]; then
            echo "Readiness remained healthy while PostgreSQL was paused." >&2
            exit 1
          fi

          docker unpause "${POSTGRES_CONTAINER}" >/dev/null
          trap - EXIT

          RECOVERY_STARTED_AT="$(date +%s)"
          RECOVERY_DURATION_SECONDS=""
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "http://127.0.0.1:${API_PORT}/api/v1/health/ready" \
              > "${RUNNER_TEMP}/recovered-api-health.json"; then
              jq -e '.status == "ok" and .database.status == "ready"' \
                "${RUNNER_TEMP}/recovered-api-health.json" >/dev/null
              RECOVERY_DURATION_SECONDS="$(( $(date +%s) - RECOVERY_STARTED_AT ))"
              break
            fi
            sleep 2
          done

          test -n "${RECOVERY_DURATION_SECONDS}"
          test "${RECOVERY_DURATION_SECONDS}" -le 120
          {
            echo "OUTAGE_HTTP_STATUS=${OUTAGE_HTTP_STATUS}"
            echo "OUTAGE_CURL_EXIT=${OUTAGE_CURL_EXIT}"
            echo "RECOVERY_DURATION_SECONDS=${RECOVERY_DURATION_SECONDS}"
          } >> "${GITHUB_ENV}"

          jq -n \
            --arg outageHttpStatus "${OUTAGE_HTTP_STATUS}" \
            --argjson outageCurlExit "${OUTAGE_CURL_EXIT}" \
            --argjson recoveryDurationSeconds "${RECOVERY_DURATION_SECONDS}" \
            '{
              readinessFailedClosed: true,
              outageHttpStatus: $outageHttpStatus,
              curlExit: $outageCurlExit,
              recoveryDurationSeconds: $recoveryDurationSeconds
            }' > artifacts/phase10/dependency-outage-evidence.json

      - name: Run bounded synthetic API soak
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const { performance } = require('node:perf_hooks');

          async function main() {
            const port = Number(process.env.API_PORT);
            const requests = Number(process.env.SOAK_REQUESTS);
            const concurrency = Number(process.env.SOAK_CONCURRENCY);
            const endpoint = `http://127.0.0.1:${port}/api/v1/health/ready`;
            const durations = [];
            let successes = 0;
            let nextRequest = 0;

            async function worker() {
              while (true) {
                const index = nextRequest++;
                if (index >= requests) return;
                const started = performance.now();
                const response = await fetch(endpoint, { signal: AbortSignal.timeout(5000) });
                const elapsed = performance.now() - started;
                durations.push(elapsed);
                if (response.status === 200) {
                  const body = await response.json();
                  if (body.status === 'ok' && body.database?.status === 'ready') successes += 1;
                }
              }
            }

            await Promise.all(Array.from({ length: concurrency }, () => worker()));
            durations.sort((a, b) => a - b);
            const p95 = durations[Math.max(0, Math.ceil(durations.length * 0.95) - 1)];
            const maximum = durations[durations.length - 1];
            fs.writeFileSync(
              'artifacts/phase10/soak-evidence.json',
              `${JSON.stringify({ requests, concurrency, successes, p95Ms: Math.round(p95), maxMs: Math.round(maximum) }, null, 2)}\n`,
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

          SOAK_SUCCESS_COUNT="$(jq -r '.successes' artifacts/phase10/soak-evidence.json)"
          SOAK_P95_MS="$(jq -r '.p95Ms' artifacts/phase10/soak-evidence.json)"
          SOAK_MAX_MS="$(jq -r '.maxMs' artifacts/phase10/soak-evidence.json)"
          test "${SOAK_SUCCESS_COUNT}" = "${SOAK_REQUESTS}"
          test "${SOAK_P95_MS}" -le "${SOAK_P95_BUDGET_MS}"
          test "${SOAK_MAX_MS}" -le "${SOAK_MAX_BUDGET_MS}"
          {
            echo "SOAK_SUCCESS_COUNT=${SOAK_SUCCESS_COUNT}"
            echo "SOAK_P95_MS=${SOAK_P95_MS}"
            echo "SOAK_MAX_MS=${SOAK_MAX_MS}"
          } >> "${GITHUB_ENV}"

      - name: Write consolidated sanitized exercise evidence
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg sourceSha "${GITHUB_SHA}" \
            --slurpfile databaseRestore artifacts/phase10/database-restore-evidence.json \
            --slurpfile dependencyOutage artifacts/phase10/dependency-outage-evidence.json \
            --slurpfile boundedSoak artifacts/phase10/soak-evidence.json \
            '{
              schemaVersion: 1,
              sourceSha: $sourceSha,
              dataClassification: "synthetic-only",
              databaseRestore: $databaseRestore[0],
              dependencyOutage: $dependencyOutage[0],
              boundedSoak: $boundedSoak[0]
            }' > artifacts/phase10/recovery-reliability-evidence.json

          {
            echo "### DIREKT Phase 10 recovery and reliability exercise"
            echo "- Source: \`${GITHUB_SHA}\`"
            echo "- Data: synthetic-only"
            echo "- Restore integrity: ${RESTORED_TABLE_COUNT} tables, ${RESTORED_IDENTITY_COUNT} synthetic identities, sentinel matched"
            echo "- PostGIS: \`${RESTORED_POSTGIS_VERSION}\`"
            echo "- Restore duration: ${RESTORE_DURATION_SECONDS}s"
            echo "- Exercise RPO: zero synthetic sentinel loss"
            echo "- Dependency outage: readiness failed closed with HTTP \`${OUTAGE_HTTP_STATUS}\`"
            echo "- Recovery duration: ${RECOVERY_DURATION_SECONDS}s"
            echo "- Bounded soak: ${SOAK_SUCCESS_COUNT}/${SOAK_REQUESTS} succeeded at concurrency ${SOAK_CONCURRENCY}"
            echo "- Latency: p95 ${SOAK_P95_MS}ms, max ${SOAK_MAX_MS}ms"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Show sanitized API logs on failure
        if: failure()
        shell: bash
        run: docker logs direkt-api-recovery 2>&1 | tail -n 200 || true

      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-phase10-recovery-${{ github.run_number }}-${{ github.sha }}
          path: artifacts/phase10/*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Stop exercise API
        if: always()
        shell: bash
        run: |
          docker unpause "${{ job.services.postgres.id }}" >/dev/null 2>&1 || true
          docker rm --force direkt-api-recovery >/dev/null 2>&1 || true
