name: DIREKT RC6 integration register reconcile once

on:
  pull_request:
    paths:
      - ".github/workflows/rc6-doc-reconcile-once.yml"

permissions:
  contents: write

jobs:
  reconcile:
    name: Reconcile RC5 parked and RC6 source state
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact line-anchored integration-register replacements
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: Path, pattern: str, replacement: str) -> None:
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}: {pattern}')
              path.write_text(updated, encoding='utf-8')

          current = Path('docs/integrations/CURRENT_INTEGRATION_STATUS.md')
          replace_once(
              current,
              r'^\| WhatsApp Cloud API \|.*$',
              '| WhatsApp Cloud API | **IMPLEMENTED_GATED / MANAGED CANARY PENDING** | RC6 backend-only provider-neutral Meta adapter, transactional outbox, hashed opt-out, template-only payload boundary, raw-body HMAC webhook verification, durable idempotent receipts/retries and synthetic canary entrypoint are implemented. Provider business/phone/template/secret state and managed synthetic proof are not yet verified. Only Meta test/synthetic assets plus one owner-controlled verified recipient may be used for proof; participant/production delivery remains disabled. |',
          )
          replace_once(
              current,
              r'^7\. RC5 Firebase Test Lab .*$',
              '7. RC5 Firebase Test Lab — **PARKED / NOT CLOSED — IMPLEMENTED_GATED / MANAGED MATRIX PENDING**; source contract, local instrumentation, least-privilege roles and dedicated results bucket are preserved. Final owner-side read-only verification and exact-current-main managed Test Lab evidence remain pending because Cloud Shell is temporarily quota-blocked.',
          )
          replace_once(
              current,
              r'^8\. RC6 WhatsApp Cloud API application adapter\.$',
              '8. RC6 WhatsApp Cloud API application adapter — **ACTIVE CHECKPOINT / IMPLEMENTED_GATED — MANAGED CANARY PENDING**; fail-closed backend/outbox/webhook/opt-out source is implemented and regression-proven; managed provider proof remains pending. Meta test/synthetic number plus one owner-controlled verified recipient only; production phone registration, production templates and participant/live WhatsApp traffic remain gated.',
          )

          ledger = Path('docs/integrations/LIVE_INTEGRATION_LEDGER.md')
          replace_once(
              ledger,
              r'^\*\*Last reconciled:\*\* .*$',
              '**Last reconciled:** 2026-07-23 (Asia/Tokyo)',
          )
          replace_once(
              ledger,
              r'^\| WhatsApp Cloud API \|.*$',
              '| WhatsApp Cloud API | `IMPLEMENTED_GATED / MANAGED CANARY PENDING` | RC6 implements a backend-only provider-neutral Meta template adapter through the transactional outbox, send-time synthetic approval/opt-out re-check, hashed opt-out state, bounded retry/idempotency, raw-body HMAC webhook verification, durable out-of-order-safe receipts and a synthetic canary entrypoint. Provider business/WABA/phone/template/secret state and managed proof are not yet verified. Only Meta test/synthetic assets plus one owner-controlled verified recipient may be used for proof; participant/production delivery, production phone registration and production templates remain disabled/gated. |',
          )
          replace_once(
              ledger,
              r'^\| Firebase Test Lab \|.*$',
              '| Firebase Test Lab | `PARKED / NOT CLOSED — IMPLEMENTED_GATED / MANAGED MATRIX PENDING` | RC5 source and local instrumentation are integrated; least-privilege custom roles and dedicated 30-day results bucket were created and partially verified. Final owner-side read-only verification and exact-current-main managed matrix proof remain pending because Cloud Shell is temporarily quota-blocked. Draft proof bridge #378 remains preserved; no production/participant authorization is created. |',
          )
          PY

          changed="$(git diff --name-only)"
          expected=$'docs/integrations/CURRENT_INTEGRATION_STATUS.md\ndocs/integrations/LIVE_INTEGRATION_LEDGER.md'
          test "$(printf '%s\n' "$changed" | LC_ALL=C sort)" = "$(printf '%s\n' "$expected" | LC_ALL=C sort)"
          git diff --check

      - name: Commit reconciled source state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/integrations/CURRENT_INTEGRATION_STATUS.md docs/integrations/LIVE_INTEGRATION_LEDGER.md
          git commit -m "docs(rc6): reconcile WhatsApp source state"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
