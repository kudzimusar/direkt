name: DIREKT Phase 2C Database Review Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - "database/migrations/202607141530_identity_session_authorization.sql"
      - "backend/direkt-api/test/integration/role-contact-audit.integration.spec.ts"
      - ".github/workflows/phase2c-review-fix-once.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - name: Apply reviewed migration corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('database/migrations/202607141530_identity_session_authorization.sql')
          text = path.read_text()

          schema_marker = "CREATE SCHEMA IF NOT EXISTS account;\nCREATE SCHEMA IF NOT EXISTS authz;\n"
          schema_replacement = schema_marker + "CREATE EXTENSION IF NOT EXISTS btree_gist;\n"
          if text.count(schema_marker) != 1:
              raise SystemExit('Schema marker mismatch')
          text = text.replace(schema_marker, schema_replacement)

          old_index = """CREATE UNIQUE INDEX role_assignments_active_unique_idx
            ON authz.role_assignments (
              identity_id,
              role_id,
              scope_type,
              COALESCE(provider_id, '00000000-0000-0000-0000-000000000000'::uuid)
            )
            WHERE revoked_at IS NULL;
          """
          new_constraint = """ALTER TABLE authz.role_assignments
            ADD CONSTRAINT role_assignments_no_time_overlap
            EXCLUDE USING gist (
              identity_id WITH =,
              role_id WITH =,
              scope_type WITH =,
              (COALESCE(provider_id, '00000000-0000-0000-0000-000000000000'::uuid)) WITH =,
              tstzrange(starts_at, COALESCE(ends_at, 'infinity'::timestamptz), '[)') WITH &&
            )
            WHERE (revoked_at IS NULL);
          """
          if text.count(old_index) != 1:
              raise SystemExit('Role index marker mismatch')
          text = text.replace(old_index, new_constraint)

          old_condition = "IF NEW.verified_at IS NOT NULL AND (OLD.verified_at IS NULL OR NEW.verified_at <> OLD.verified_at) THEN"
          new_condition = "IF NEW.verified_at IS NOT NULL AND (TG_OP = 'INSERT' OR OLD.verified_at IS DISTINCT FROM NEW.verified_at) THEN"
          if text.count(old_condition) != 1:
              raise SystemExit('Contact audit condition marker mismatch')
          text = text.replace(old_condition, new_condition)

          old_trigger = "AFTER UPDATE OF verified_at ON account.contacts"
          new_trigger = "AFTER INSERT OR UPDATE OF verified_at ON account.contacts"
          if text.count(old_trigger) != 1:
              raise SystemExit('Contact audit trigger marker mismatch')
          text = text.replace(old_trigger, new_trigger)

          path.write_text(text)
          PY
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Format regression test
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npm run format -- --log-level silent
      - name: Commit reviewed corrections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/migrations/202607141530_identity_session_authorization.sql backend/direkt-api/test/integration/role-contact-audit.integration.spec.ts
          git commit -m "fix(phase2c): close role lifecycle and contact audit gaps"
          git push origin HEAD:build/android-v1
