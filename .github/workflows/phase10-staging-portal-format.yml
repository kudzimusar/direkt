name: Phase 10 staging portal formatting

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase10-staging-portal-format.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json
      - working-directory: admin/direkt-operations-portal
        run: npm ci --ignore-scripts
      - working-directory: admin/direkt-operations-portal
        run: npx prettier --write next.config.ts src/lib/cloud-run-identity.ts src/lib/operations-api.ts src/lib/server-operations-api.ts src/app/api/health/route.ts test/cloud-run-identity.spec.ts test/operations-api.spec.ts
      - run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/direkt-operations-portal/next.config.ts \
            admin/direkt-operations-portal/src/lib/cloud-run-identity.ts \
            admin/direkt-operations-portal/src/lib/operations-api.ts \
            admin/direkt-operations-portal/src/lib/server-operations-api.ts \
            admin/direkt-operations-portal/src/app/api/health/route.ts \
            admin/direkt-operations-portal/test/cloud-run-identity.spec.ts \
            admin/direkt-operations-portal/test/operations-api.spec.ts
          git diff --cached --quiet && exit 0
          git commit -m "style(staging): apply portal formatting"
          git push origin HEAD:build/android-v1
