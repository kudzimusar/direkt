name: DIREKT functional web W8 trusted-main public cutover trigger

on:
  push:
    branches:
      - main
    paths:
      - "docs/web/W8_MANAGED_PUBLIC_WEB_MAIN_TRIGGER.md"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: direkt-functional-web-w8-main-trigger
  cancel-in-progress: false

jobs:
  dispatch:
    name: Validate main trigger, dispatch W8 cutover and report
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2

      - name: Validate trusted one-file main trigger
        id: source
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          SOURCE_SHA="$(git rev-parse HEAD)"
          parent="$(git rev-parse HEAD^1)"
          mapfile -t changed < <(git diff --name-only "${parent}" "${SOURCE_SHA}")
          test "${#changed[@]}" -eq 1
          test "${changed[0]}" = "docs/web/W8_MANAGED_PUBLIC_WEB_MAIN_TRIGGER.md"
          echo "source_sha=${SOURCE_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch reviewed W8 cutover on main
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        shell: bash
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api --method POST -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/functional-pwa-w8-managed-cutover.yml/dispatches" \
            -f ref=main -f inputs[confirmation]=RUN-DIREKT-W8-PUBLIC-WEB -f inputs[source_sha]="${SOURCE_SHA}"
          echo "dispatched_at=${dispatched_at}" >> "${GITHUB_OUTPUT}"

      - name: Resolve dispatched W8 run
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCHED_AT: ${{ steps.dispatch.outputs.dispatched_at }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        shell: bash
        run: |
          set -euo pipefail
          run_id=""
          for attempt in $(seq 1 30); do
            runs="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/workflows/functional-pwa-w8-managed-cutover.yml/runs?event=workflow_dispatch&branch=main&per_page=20")"
            run_id="$(jq -r --arg dispatched_at "${DISPATCHED_AT}" --arg source_sha "${SOURCE_SHA}" '[.workflow_runs[] | select(.created_at >= $dispatched_at and .head_sha == $source_sha)] | sort_by(.created_at) | last | .id // empty' <<< "${runs}")"
            [[ "${run_id}" =~ ^[1-9][0-9]*$ ]] && break
            sleep 4
          done
          [[ "${run_id}" =~ ^[1-9][0-9]*$ ]]
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "${GITHUB_OUTPUT}"

      - name: Wait for W8 cutover completion
        id: result
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          status=""; conclusion=""
          for attempt in $(seq 1 220); do
            record="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")"
            status="$(jq -r '.status' <<< "${record}")"
            conclusion="$(jq -r '.conclusion // empty' <<< "${record}")"
            [[ "${status}" == "completed" ]] && break
            sleep 15
          done
          test "${status}" = "completed"
          test -n "${conclusion}"
          echo "conclusion=${conclusion}" >> "${GITHUB_OUTPUT}"
          test "${conclusion}" = "success"

      - name: Summarize failed W8 job without logs or secret values
        id: diagnosis
        if: always() && steps.result.outputs.conclusion != 'success' && steps.run.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          jobs="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100")"
          summary="$(jq -r '[.jobs[] | select(.conclusion == "failure") | {job:.name, failedSteps:[.steps[]? | select(.conclusion == "failure") | .name]}] | if length == 0 then "No failed job metadata was returned." else map("Job: " + .job + "; failed step(s): " + ((.failedSteps | join(", ")) // "unknown")) | join(" | ") end' <<< "${jobs}")"
          echo "failure_summary<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${summary}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Extract sanitized W8 public UI evidence
        id: evidence
        if: steps.result.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        shell: bash
        run: |
          set -euo pipefail
          artifacts="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")"
          artifact_id="$(jq -r --arg expected "direkt-w8-functional-cutover-${SOURCE_SHA}" '[.artifacts[] | select(.name == $expected and .expired == false)] | last | .id // empty' <<< "${artifacts}")"
          [[ "${artifact_id}" =~ ^[1-9][0-9]*$ ]]
          gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "${RUNNER_TEMP}/w8-evidence.zip"
          unzip -q "${RUNNER_TEMP}/w8-evidence.zip" -d "${RUNNER_TEMP}/w8-evidence"
          evidence_file="${RUNNER_TEMP}/w8-evidence/w8-cutover-evidence.json"
          test -s "${evidence_file}"
          jq -e --arg source "${SOURCE_SHA}" '.source == $source and .publicFunctionalWebReachable == true and .canonicalApiRemainsIamPrivate == true and .browserPrivacyScan == true and .realParticipantActivation == false and .formalProductionRelease == false' "${evidence_file}" >/dev/null
          public_web_url="$(jq -r '.publicWebUrl' "${evidence_file}")"
          [[ "${public_web_url}" =~ ^https://[^/]+$ ]]
          echo "public_web_url=${public_web_url}" >> "${GITHUB_OUTPUT}"

      - name: Publish W8 managed public UI result to Issue 133
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          RUN_URL: ${{ steps.run.outputs.run_url }}
          CONCLUSION: ${{ steps.result.outputs.conclusion }}
          PUBLIC_WEB_URL: ${{ steps.evidence.outputs.public_web_url }}
          FAILURE_SUMMARY: ${{ steps.diagnosis.outputs.failure_summary }}
        shell: bash
        run: |
          set -euo pipefail
          result="${CONCLUSION:-incomplete}"
          if [[ "${result}" == "success" && -n "${PUBLIC_WEB_URL:-}" ]]; then
            heading="PASS"
            detail="The functional synthetic-only customer/provider browser/BFF is publicly reachable at ${PUBLIC_WEB_URL}. The canonical API remains IAM-private. W8 remains open until the approved custom-domain route, DNS/TLS and preserved preview are independently verified."
            diagnostic=""
          else
            heading="FAIL / INCOMPLETE"
            detail="The W8 public functional browser checkpoint did not pass. The workflow is designed to fail closed by removing public web invocation and the new runtime-to-API binding on failure. W8 remains open."
            diagnostic="- Sanitized failure location: ${FAILURE_SUMMARY:-unavailable}"
          fi
          body=$(cat <<EOF
          <!-- direkt-w8-main-public-web-result -->
          ## W8 managed public functional web checkpoint: ${heading}

          - Exact merged source: \`${SOURCE_SHA}\`
          - Execution: trusted \`main\` push → reviewed \`workflow_dispatch\`
          - Conclusion: \`${result}\`
          - Functional UI: ${PUBLIC_WEB_URL:-not promoted}
          - Managed run: ${RUN_URL}
          ${diagnostic}

          ${detail}
          EOF
          )
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/133/comments" -f body="${body}" >/dev/null
