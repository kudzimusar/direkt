name: Stage 7 evidence review lint fix once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7-lint-fix-once.yml"

permissions:
  contents: write

concurrency:
  group: stage7-evidence-review-lint-fix
  cancel-in-progress: false

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'activate Stage 7 lint fix retry')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Type the redemption response before assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/direkt-api/test/e2e/operations-evidence-review.e2e.spec.ts')
          text = path.read_text()
          marker = '    expect(redemption.body).toMatchObject({'
          if text.count(marker) != 1:
              raise SystemExit(f'expected one redemption assertion marker, found {text.count(marker)}')
          text = text.replace(
              marker,
              '    const redemptionBody = redemption.body as AccessGrantResponse;\n'
              '    expect(redemptionBody).toMatchObject({',
              1,
          )
          if text.count('redemption.body.accessUrl') != 2:
              raise SystemExit('expected two untyped access URL assertions')
          text = text.replace('redemption.body.accessUrl', 'redemptionBody.accessUrl')
          path.write_text(text)
          PY
      - name: Commit lint correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-evidence-review.e2e.spec.ts
          git diff --cached --check
          git commit -m "test: type secure evidence redemption response"
          git push origin HEAD:build/android-v1
