name: DIREKT Supabase development activation

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type ACTIVATE-DIREKT-DEVELOPMENT to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit to migrate and verify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: direkt-supabase-development-activation
  cancel-in-progress: false

jobs:
  activate:
    name: Migrate and verify Supabase development
    if: github.ref == 'refs/heads/main'
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPECTED_PROJECT_REF: aeeuscifrxcjmnswqwnq
      DOCUMENTED_PROJECT_NAME: direct-app
      EXPECTED_PROJECT_REGION: ap-northeast-1
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: https://aeeuscifrxcjmnswqwnq.supabase.co
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Validate activation controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "ACTIVATE-DIREKT-DEVELOPMENT"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]
          test -n "${SUPABASE_ACCESS_TOKEN}"
          test -n "${SUPABASE_DB_PASSWORD}"
          test -n "${PROJECT_REF}"
          test "${PROJECT_REF}" = "${EXPECTED_PROJECT_REF}"
          echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"
          echo "::add-mask::${SUPABASE_DB_PASSWORD}"

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Record source identity
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ inputs.source_sha }}"
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Set up pinned Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Verify Supabase project identity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/supabase
          PROJECT_RESPONSE="${RUNNER_TEMP}/supabase-project.json"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${PROJECT_RESPONSE}" \
            --write-out '%{http_code}' \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json")"

          case "${HTTP_STATUS}" in
            200) ;;
            401)
              echo "::error title=Supabase token rejected::SUPABASE_ACCESS_TOKEN is invalid, expired, or was copied incorrectly. Create a fresh personal access token while signed into the Supabase account that owns project ${EXPECTED_PROJECT_REF}."
              exit 1
              ;;
            403)
              echo "::error title=Supabase project permission denied::The token is valid but its Supabase user lacks project_admin_read access to ${PROJECT_REF}. Add that user to the owning organization/project as Owner, Administrator, or Developer, then create a fresh token."
              exit 1
              ;;
            404)
              echo "::error title=Supabase project not visible::The token's Supabase account cannot see project ${PROJECT_REF}, or SUPABASE_PROJECT_REF is wrong. Generate the token from the account where this project ref is visible."
              exit 1
              ;;
            *)
              SAFE_MESSAGE="$(jq -r '.message // .error // "Management API request failed"' "${PROJECT_RESPONSE}" 2>/dev/null | head -c 240)"
              echo "::error title=Supabase Management API failure::HTTP ${HTTP_STATUS}: ${SAFE_MESSAGE}"
              exit 1
              ;;
          esac

          ACTUAL_REF="$(jq -r '.ref // empty' "${PROJECT_RESPONSE}")"
          ACTUAL_NAME="$(jq -r '.name // empty' "${PROJECT_RESPONSE}")"
          ACTUAL_REGION="$(jq -r '.region // empty' "${PROJECT_RESPONSE}")"

          if [[ "${ACTUAL_REF}" != "${EXPECTED_PROJECT_REF}" ]]; then
            echo "::error title=Supabase project-ref mismatch::Expected ${EXPECTED_PROJECT_REF}, received ${ACTUAL_REF:-missing}."
            exit 1
          fi
          if [[ "${ACTUAL_REGION}" != "${EXPECTED_PROJECT_REGION}" ]]; then
            echo "::error title=Supabase region mismatch::Expected ${EXPECTED_PROJECT_REGION}, received ${ACTUAL_REGION:-missing}."
            exit 1
          fi
          if [[ "${ACTUAL_NAME}" != "${DOCUMENTED_PROJECT_NAME}" ]]; then
            echo "::warning title=Supabase display name differs::Project ref and region are correct. The current display name is ${ACTUAL_NAME:-missing}; documentation records ${DOCUMENTED_PROJECT_NAME}. Display names are informational and do not block activation."
          fi

          jq '{id, ref, organization_id, organization_slug, name, region, status, database: {version: .database.version, postgres_engine: .database.postgres_engine, release_channel: .database.release_channel}}' \
            "${PROJECT_RESPONSE}" \
            > artifacts/supabase/project-metadata.json

      - name: Resolve Session pooler connection safely
        shell: bash
        run: |
          set -euo pipefail
          POOLER_RESPONSE="${RUNNER_TEMP}/supabase-pooler.json"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${POOLER_RESPONSE}" \
            --write-out '%{http_code}' \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/database/pooler" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json")"

          if [[ "${HTTP_STATUS}" != "200" ]]; then
            echo "::error title=Supabase pooler configuration unavailable::Management API returned HTTP ${HTTP_STATUS}. The token needs database_pooling_config_read permission."
            exit 1
          fi

          POOLER_ROW="$(jq -c '[.[] | select(.database_type == "PRIMARY")] | (map(select(.db_port == 5432 or .pool_mode == "session"))[0] // .[0] // empty)' "${POOLER_RESPONSE}")"
          test -n "${POOLER_ROW}"
          RAW_CONNECTION_STRING="$(jq -r '.connection_string // .connectionString // empty' <<<"${POOLER_ROW}")"
          DB_USER="$(jq -r '.db_user // empty' <<<"${POOLER_ROW}")"
          DB_HOST="$(jq -r '.db_host // empty' <<<"${POOLER_ROW}")"
          DB_NAME="$(jq -r '.db_name // "postgres"' <<<"${POOLER_ROW}")"

          export RAW_CONNECTION_STRING DB_USER DB_HOST DB_NAME
          DATABASE_URL="$(node <<'NODE'
          const password = process.env.SUPABASE_DB_PASSWORD;
          const raw = process.env.RAW_CONNECTION_STRING;
          let url;
          if (raw) {
            const normalized = raw
              .replace(/\[YOUR-PASSWORD\]/g, 'placeholder')
              .replace(/\[YOUR_PASSWORD\]/g, 'placeholder');
            url = new URL(normalized);
          } else {
            if (!process.env.DB_USER || !process.env.DB_HOST) {
              throw new Error('Supabase pooler response did not include usable connection details.');
            }
            url = new URL('postgresql://localhost/postgres');
            url.username = process.env.DB_USER;
            url.hostname = process.env.DB_HOST;
            url.pathname = `/${process.env.DB_NAME || 'postgres'}`;
          }
          url.protocol = 'postgresql:';
          url.password = password;
          url.port = '5432';
          url.searchParams.set('uselibpqcompat', 'true');
          url.searchParams.set('sslmode', 'require');
          process.stdout.write(url.toString());
          NODE
          )"

          case "${DATABASE_URL}" in
            postgresql://*) ;;
            *) echo "::error title=Invalid Supabase pooler URL::Could not construct the Session pooler PostgreSQL URL."; exit 1 ;;
          esac
          echo "::add-mask::${DATABASE_URL}"
          {
            echo "SUPABASE_DATABASE_URL=${DATABASE_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "DIRECT_DATABASE_URL=${DATABASE_URL}"
          } >> "${GITHUB_ENV}"

      - name: Link Supabase CLI without exposing credentials
        shell: bash
        run: |
          set -euo pipefail
          SUPABASE_DB_PASSWORD="${SUPABASE_DB_PASSWORD}" supabase link --project-ref "${PROJECT_REF}"

      - name: Resolve a temporary backend server key
        shell: bash
        run: |
          set -euo pipefail
          KEY_RESPONSE="${RUNNER_TEMP}/supabase-api-keys.json"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${KEY_RESPONSE}" \
            --write-out '%{http_code}' \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/api-keys?reveal=true" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json")"
          if [[ "${HTTP_STATUS}" != "200" ]]; then
            echo "::error title=Supabase backend key unavailable::Management API returned HTTP ${HTTP_STATUS}. The token needs api_gateway_keys_read permission."
            exit 1
          fi
          SERVER_KEY="$(jq -r '[.[] | select(.type == "secret" or .name == "service_role") | .api_key][0] // empty' "${KEY_RESPONSE}")"
          test -n "${SERVER_KEY}"
          echo "::add-mask::${SERVER_KEY}"
          if [[ "${SERVER_KEY}" == sb_secret_* ]]; then
            echo "SUPABASE_SECRET_KEY=${SERVER_KEY}" >> "${GITHUB_ENV}"
          else
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVER_KEY}" >> "${GITHUB_ENV}"
          fi
          rm -f "${KEY_RESPONSE}"

      - name: Install exact backend dependencies
        working-directory: backend/direkt-api
        run: npm ci --ignore-scripts

      - name: Apply and verify all DIREKT migrations
        working-directory: backend/direkt-api
        env:
          NODE_ENV: development
        run: npm run migration:check

      - name: Verify PostGIS and private Storage buckets
        working-directory: backend/direkt-api
        run: npm run supabase:check | tee ../../artifacts/supabase/integration-check.json

      - name: Capture database inspection report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/supabase/inspect
          supabase inspect report \
            --db-url "${SUPABASE_DATABASE_URL}" \
            --output-dir artifacts/supabase/inspect

      - name: Capture Supabase advisors
        shell: bash
        run: |
          set -euo pipefail
          for advisor in security performance; do
            ADVISOR_RESPONSE="artifacts/supabase/${advisor}-advisor.json"
            HTTP_STATUS="$(curl --silent --show-error \
              --output "${ADVISOR_RESPONSE}" \
              --write-out '%{http_code}' \
              "https://api.supabase.com/v1/projects/${PROJECT_REF}/advisors/${advisor}" \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json")"
            if [[ "${HTTP_STATUS}" != "200" ]]; then
              echo "::error title=Supabase ${advisor} advisor unavailable::Management API returned HTTP ${HTTP_STATUS}."
              exit 1
            fi
            jq -e '.lints | type == "array"' "${ADVISOR_RESPONSE}" >/dev/null
          done

      - name: Publish activation summary
        shell: bash
        run: |
          set -euo pipefail
          SECURITY_ERRORS="$(jq '[.lints[]? | select(.level == "ERROR")] | length' artifacts/supabase/security-advisor.json)"
          SECURITY_WARNINGS="$(jq '[.lints[]? | select(.level == "WARN")] | length' artifacts/supabase/security-advisor.json)"
          PERFORMANCE_ERRORS="$(jq '[.lints[]? | select(.level == "ERROR")] | length' artifacts/supabase/performance-advisor.json)"
          PERFORMANCE_WARNINGS="$(jq '[.lints[]? | select(.level == "WARN")] | length' artifacts/supabase/performance-advisor.json)"
          {
            echo "### DIREKT Supabase development activation"
            echo "- Project ref: \`${PROJECT_REF}\`"
            echo "- Project display name: \`${DOCUMENTED_PROJECT_NAME}\`"
            echo "- Region: \`${EXPECTED_PROJECT_REGION}\`"
            echo "- Session pooler: resolved through the Management API"
            echo "- TLS: encrypted libpq-compatible require mode for development activation"
            echo "- Migrations: applied and idempotency checked"
            echo "- PostGIS and private buckets: verified"
            echo "- Security advisor: ${SECURITY_ERRORS} errors, ${SECURITY_WARNINGS} warnings"
            echo "- Performance advisor: ${PERFORMANCE_ERRORS} errors, ${PERFORMANCE_WARNINGS} warnings"
            echo "- Activated source: \`${SOURCE_SHA}\`"
            echo "- Workflow source: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitized activation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-supabase-development-${{ github.run_number }}-${{ inputs.source_sha }}
          path: artifacts/supabase/**
          if-no-files-found: warn
          retention-days: 14
