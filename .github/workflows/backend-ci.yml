name: DIREKT Backend CI

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/phase8-remediate.py"
      - ".github/scripts/phase8-runtime-fix.py"
      - ".github/scripts/phase8-test-expectation-fix.py"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/phase8-remediate.py"
      - ".github/scripts/phase8-runtime-fix.py"
      - ".github/scripts/phase8-test-expectation-fix.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - name: Apply typed Phase 8 remediations in runner
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          python3 ../../.github/scripts/phase8-remediate.py 2>&1 | \
            tee artifacts/diagnostics/remediation.txt
          python3 ../../.github/scripts/phase8-runtime-fix.py 2>&1 | \
            tee artifacts/diagnostics/runtime-fix.txt
          python3 ../../.github/scripts/phase8-test-expectation-fix.py 2>&1 | \
            tee artifacts/diagnostics/test-expectation-fix.txt
      - name: Generate formatting diagnostic
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics/formatted/test/e2e
          mkdir -p artifacts/diagnostics/formatted/src/interaction
          npm run format
          cp test/e2e/interaction-lifecycle.e2e.spec.ts \
            artifacts/diagnostics/formatted/test/e2e/interaction-lifecycle.e2e.spec.ts
          cp src/interaction/interaction-handoff.repository.ts \
            artifacts/diagnostics/formatted/src/interaction/interaction-handoff.repository.ts
          git diff -- . > artifacts/diagnostics/format.patch
          git diff --name-only -- . > artifacts/diagnostics/format-files.txt
      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee artifacts/diagnostics/eslint.txt
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee artifacts/diagnostics/typecheck.txt
      - run: npm run migration:check
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee artifacts/diagnostics/tests.txt
      - run: npm run build
      - run: npm run openapi:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 14
