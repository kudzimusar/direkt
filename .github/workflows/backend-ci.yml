name: DIREKT Backend CI
# Phase 8 one-time backend synchronization activation.

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/phase8-backend-bundle.tgz"
      - ".github/workflows/phase8-backend-sync-once.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  sync-phase8-backend:
    name: Apply reviewed Phase 8 backend source once
    if: github.event_name == 'pull_request' && github.head_ref == 'build/android-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply reviewed source bundle
        shell: bash
        run: |
          test -f .github/phase8-backend-bundle.tgz
          tar -xzf .github/phase8-backend-bundle.tgz
          rm .github/phase8-backend-bundle.tgz
      - name: Validate application source before commit
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run lint
          npm run typecheck
          npm run build
          npm run openapi:check
      - name: Commit permanent Phase 8 backend source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend database .github/phase8-backend-bundle.tgz
          git commit -m "feat: complete Phase 8 interaction review backend"
          git push origin HEAD:build/android-v1

  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Verify runtime and committed lockfile
        shell: bash
        run: |
          node --version
          npm --version
          [[ "$(npm --version)" == 11.* ]]
          test -f package-lock.json
          git diff --exit-code -- package.json package-lock.json
      - name: Install exact locked dependencies
        run: npm ci --ignore-scripts
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run lint 2>&1 | tee artifacts/diagnostics/eslint.txt
      - name: Typecheck
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run typecheck 2>&1 | tee artifacts/diagnostics/typecheck.txt
      - name: Apply and verify migrations
        run: npm run migration:check
      - name: Run tests with coverage
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run test 2>&1 | tee artifacts/diagnostics/vitest.txt
      - name: Build production JavaScript
        run: npm run build
      - name: Generate and validate OpenAPI
        run: npm run openapi:check
      - name: Upload backend verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
            backend/direkt-api/package-lock.json
          if-no-files-found: warn
          retention-days: 14
      - name: Publish backend summary
        shell: bash
        run: |
          echo "### DIREKT backend foundation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime: Node.js 24 / npm 11" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework: NestJS 11.1.x / TypeScript 5.9.x" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: PostgreSQL 18 / PostGIS 3.6" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dependencies: committed npm lockfile installed with \`npm ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: format, lint, typecheck, migrations, tests, build and OpenAPI passed" >> "$GITHUB_STEP_SUMMARY"
