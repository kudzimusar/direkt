name: DIREKT Backend CI

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - name: Apply reviewed Phase 9 source corrections
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          types_path = Path('src/commercial/commercial.types.ts')
          types_source = types_path.read_text()
          old_outcome = "processingOutcome: 'processed' | 'rejected' | 'duplicate';"
          new_outcome = "processingOutcome: 'processed' | 'rejected' | 'duplicate' | 'failed';"
          if types_source.count(old_outcome) != 1:
              raise SystemExit('Expected one synthetic webhook outcome contract')
          types_path.write_text(types_source.replace(old_outcome, new_outcome))

          test_path = Path('test/e2e/commercial-lifecycle.e2e.spec.ts')
          test_source = test_path.read_text()
          old_sql = "SELECT $1, id, 'global', $1, $3"
          new_sql = "SELECT $1, id, 'global', $1, $2"
          if test_source.count(old_sql) != 1:
              raise SystemExit('Expected one finance role seed SQL contract')
          test_source = test_source.replace(old_sql, new_sql)
          old_params = "[identityId, 'finance', reason],"
          new_params = "[identityId, reason],"
          if test_source.count(old_params) != 1:
              raise SystemExit('Expected one finance role seed parameter contract')
          test_path.write_text(test_source.replace(old_params, new_params))
          PY
      - name: Format and commit backend sources
        shell: bash
        run: |
          npm run format
          if git diff --quiet -- .; then
            echo "Backend sources already formatted."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "style(api): apply Phase 9 backend formatting"
            git push origin HEAD:build/android-v1
          fi
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run migration:check
      - run: npm run test
      - run: npm run build
      - run: npm run openapi:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 14
