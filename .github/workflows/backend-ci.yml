name: DIREKT Backend CI

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - name: Apply typed Phase 8 remediations in runner
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lifecycle_path = Path('test/e2e/interaction-lifecycle.e2e.spec.ts')
          lifecycle = lifecycle_path.read_text()

          lifecycle_replacements = [
              (
                  """interface TrustStateCounts {
            decisions: string;
            claims: string;
            publications: string;
          }
          """,
                  """interface TrustStateCounts {
            decisions: string;
            claims: string;
            publications: string;
          }

          interface OperationsInteractionListView {
            interactionScope: 'privacy_safe';
            items: Array<{
              interactionId: string;
              customerIdentityExposed: false;
              contactIncluded: false;
              privateEvidenceIncluded: false;
              internalModerationRationaleIncluded: false;
              trustOrRankingMutation: false;
            }>;
          }

          interface OperationsComplaintListView {
            phase7IncidentDataIncluded: false;
            items: ComplaintView[];
          }
          """,
              ),
              (
                  """    expect(operationsInteractions.body).toMatchObject({
                interactionScope: 'privacy_safe',
                items: expect.arrayContaining([
                  expect.objectContaining({
                    interactionId,
                    customerIdentityExposed: false,
                    contactIncluded: false,
                    privateEvidenceIncluded: false,
                    internalModerationRationaleIncluded: false,
                    trustOrRankingMutation: false,
                  }),
                ]),
              });
              expect(JSON.stringify(operationsInteractions.body)).not.toContain('+260 ••• •• 104');
              expect(JSON.stringify(operationsInteractions.body)).not.toContain(customer.identityId);
          """,
                  """    const operationsInteractionBody =
                operationsInteractions.body as OperationsInteractionListView;
              expect(operationsInteractionBody.interactionScope).toBe('privacy_safe');
              const operationsInteraction = operationsInteractionBody.items.find(
                (item) => item.interactionId === interactionId,
              );
              expect(operationsInteraction).toMatchObject({
                interactionId,
                customerIdentityExposed: false,
                contactIncluded: false,
                privateEvidenceIncluded: false,
                internalModerationRationaleIncluded: false,
                trustOrRankingMutation: false,
              });
              expect(JSON.stringify(operationsInteractionBody)).not.toContain('+260 ••• •• 104');
              expect(JSON.stringify(operationsInteractionBody)).not.toContain(customer.identityId);
          """,
              ),
              (
                  """    expect(deniedAppeal.body as ReviewView).toMatchObject({
                moderationStatus: 'withheld',
                revision: 4,
                appeals: expect.arrayContaining([
                  expect.objectContaining({
                    appealId: firstAppealId,
                    status: 'denied',
                    decisionReasonCode: 'PRIVACY_REMAINS',
                  }),
                ]),
              });
          """,
                  """    const deniedAppealReview = deniedAppeal.body as ReviewView;
              expect(deniedAppealReview).toMatchObject({
                moderationStatus: 'withheld',
                revision: 4,
              });
              const decidedAppeal = deniedAppealReview.appeals.find(
                (appeal) => appeal.appealId === firstAppealId,
              );
              expect(decidedAppeal).toMatchObject({
                appealId: firstAppealId,
                status: 'denied',
                decisionReasonCode: 'PRIVACY_REMAINS',
              });
          """,
              ),
              (
                  """    expect(operationsComplaints.body).toMatchObject({
                phase7IncidentDataIncluded: false,
                items: expect.arrayContaining([
                  expect.objectContaining({
                    complaintId: complaint.complaintId,
                    phase7IncidentLinked: false,
                    contactIncluded: false,
                  }),
                ]),
              });
          """,
                  """    const operationsComplaintBody =
                operationsComplaints.body as OperationsComplaintListView;
              expect(operationsComplaintBody.phase7IncidentDataIncluded).toBe(false);
              const operationsComplaint = operationsComplaintBody.items.find(
                (item) => item.complaintId === complaint.complaintId,
              );
              expect(operationsComplaint).toMatchObject({
                complaintId: complaint.complaintId,
                phase7IncidentLinked: false,
                contactIncluded: false,
              });
          """,
              ),
          ]

          for old, new in lifecycle_replacements:
              count = lifecycle.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one lifecycle remediation target, found {count}')
              lifecycle = lifecycle.replace(old, new)

          lifecycle_path.write_text(lifecycle)

          handoff_path = Path('src/interaction/interaction-handoff.repository.ts')
          handoff = handoff_path.read_text()

          if handoff.count('      trustOrPublicationMutation: false,\n') != 2:
              raise SystemExit('Expected two obsolete handoff trust-mutation flags')
          handoff = handoff.replace('      trustOrPublicationMutation: false,\n', '')

          old_event_flags = """        actorIdentifierIncluded: false,
            contactIncluded: false,
            privateEvidenceIncluded: false,
            internalModerationIncluded: false,
          """
          new_event_flags = """        actorIdentityExposed: false,
            privateMetadataIncluded: false,
          """
          if handoff.count(old_event_flags) != 1:
              raise SystemExit('Expected one interaction event privacy projection')
          handoff = handoff.replace(old_event_flags, new_event_flags)

          old_eligibility = """  private eligibility(row: InteractionRow, now: number): ReviewEligibilityView {
            if (row.status === 'active') {
              return { eligible: false, reasonCode: 'INTERACTION_ACTIVE', eligibleUntil: null };
            }
            if (row.status === 'cancelled') {
              return { eligible: false, reasonCode: 'INTERACTION_CANCELLED', eligibleUntil: null };
            }
            if (row.review_exists) {
              return { eligible: false, reasonCode: 'REVIEW_ALREADY_EXISTS', eligibleUntil: null };
            }
            if (!row.review_eligible_from || !row.review_eligible_until) {
              return { eligible: false, reasonCode: 'REVIEW_WINDOW_MISSING', eligibleUntil: null };
            }
            if (row.review_eligible_from.getTime() > now) {
              return {
                eligible: false,
                reasonCode: 'REVIEW_WINDOW_NOT_OPEN',
                eligibleUntil: row.review_eligible_until.toISOString(),
              };
            }
            if (row.review_eligible_until.getTime() <= now) {
              return {
                eligible: false,
                reasonCode: 'REVIEW_WINDOW_EXPIRED',
                eligibleUntil: row.review_eligible_until.toISOString(),
              };
            }
            return {
              eligible: true,
              reasonCode: 'ELIGIBLE',
              eligibleUntil: row.review_eligible_until.toISOString(),
            };
          }
          """
          new_eligibility = """  private eligibility(row: InteractionRow, now: number): ReviewEligibilityView {
            if (row.status === 'active') {
              return {
                eligible: false,
                reasonCode: 'INTERACTION_ACTIVE',
                eligibleFrom: null,
                eligibleUntil: null,
              };
            }
            if (row.status === 'cancelled') {
              return {
                eligible: false,
                reasonCode: 'INTERACTION_CANCELLED',
                eligibleFrom: null,
                eligibleUntil: null,
              };
            }
            if (row.review_exists) {
              return {
                eligible: false,
                reasonCode: 'ALREADY_REVIEWED',
                eligibleFrom: row.review_eligible_from?.toISOString() ?? null,
                eligibleUntil: row.review_eligible_until?.toISOString() ?? null,
              };
            }
            if (!row.review_eligible_from || !row.review_eligible_until) {
              throw new Error('Completed interaction is missing its review eligibility window.');
            }
            if (row.review_eligible_from.getTime() > now) {
              return {
                eligible: false,
                reasonCode: 'WINDOW_NOT_OPEN',
                eligibleFrom: row.review_eligible_from.toISOString(),
                eligibleUntil: row.review_eligible_until.toISOString(),
              };
            }
            if (row.review_eligible_until.getTime() <= now) {
              return {
                eligible: false,
                reasonCode: 'WINDOW_EXPIRED',
                eligibleFrom: row.review_eligible_from.toISOString(),
                eligibleUntil: row.review_eligible_until.toISOString(),
              };
            }
            return {
              eligible: true,
              reasonCode: 'ELIGIBLE',
              eligibleFrom: row.review_eligible_from.toISOString(),
              eligibleUntil: row.review_eligible_until.toISOString(),
            };
          }
          """
          if handoff.count(old_eligibility) != 1:
              raise SystemExit('Expected one review eligibility projection')
          handoff = handoff.replace(old_eligibility, new_eligibility)
          handoff_path.write_text(handoff)
          PY
      - name: Generate formatting diagnostic
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics/formatted/test/e2e
          mkdir -p artifacts/diagnostics/formatted/src/interaction
          npm run format
          cp test/e2e/interaction-lifecycle.e2e.spec.ts \
            artifacts/diagnostics/formatted/test/e2e/interaction-lifecycle.e2e.spec.ts
          cp src/interaction/interaction-handoff.repository.ts \
            artifacts/diagnostics/formatted/src/interaction/interaction-handoff.repository.ts
          git diff -- . > artifacts/diagnostics/format.patch
          git diff --name-only -- . > artifacts/diagnostics/format-files.txt
      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee artifacts/diagnostics/eslint.txt
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee artifacts/diagnostics/typecheck.txt
      - run: npm run migration:check
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee artifacts/diagnostics/tests.txt
      - run: npm run build
      - run: npm run openapi:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 14
