name: DIREKT Backend CI

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: backend/direkt-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Verify runtime and committed lockfile
        shell: bash
        run: |
          node --version
          npm --version
          [[ "$(npm --version)" == 11.* ]]
          test -f package-lock.json
          git diff --exit-code -- package.json package-lock.json

      - name: Install exact locked dependencies
        run: npm ci --ignore-scripts

      - name: Format Phase 6 backend source
        run: npm run format

      - name: Commit formatted source and restore permanent workflow
        if: github.ref_name == 'build/android-v1'
        shell: bash
        run: |
          cd ../..
          git fetch origin main
          git checkout origin/main -- .github/workflows/backend-ci.yml
          rm -f .github/workflows/phase6-format-all.yml
          rm -f .github/workflows/phase6-stage6a-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m "style: format Phase 6 backend and remove helpers"
            git push origin HEAD:build/android-v1
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run lint 2>&1 | tee artifacts/diagnostics/eslint.txt

      - name: Typecheck
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run typecheck 2>&1 | tee artifacts/diagnostics/typecheck.txt

      - name: Apply and verify migrations
        run: npm run migration:check

      - name: Run tests with coverage
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run test 2>&1 | tee artifacts/diagnostics/vitest.txt

      - name: Build production JavaScript
        run: npm run build

      - name: Generate and validate OpenAPI
        run: npm run openapi:check

      - name: Upload backend verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
            backend/direkt-api/package-lock.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish backend summary
        shell: bash
        run: |
          echo "### DIREKT backend foundation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime: Node.js 24 / npm 11" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework: NestJS 11.1.x / TypeScript 5.9.x" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: PostgreSQL 18 / PostGIS 3.6" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dependencies: committed npm lockfile installed with \`npm ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: format, lint, typecheck, migrations, tests, build and OpenAPI passed" >> "$GITHUB_STEP_SUMMARY"
