name: Stage 7G missed-state regression correction

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stage7g-missed-state-pr-head
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Correct missed-state fixture
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts')
          text = path.read_text()
          old = """    const work = await createWork(caseId, fieldAgentB.identityId, 5);
              await acceptAndStart(work.workItemId, fieldAgentB);
              const response = await request(httpServer())
          """
          new = """    const work = await createWork(caseId, fieldAgentB.identityId, 5);
              if (outcome === 'missed') {
                await request(httpServer())
                  .post(`/api/v1/operations/field-work-items/${work.workItemId}/transitions`)
                  .set('authorization', `Bearer ${fieldAgentB.accessToken}`)
                  .send({
                    targetState: 'accepted',
                    reason: 'Field agent accepted the assignment before the missed visit was recorded.',
                  })
                  .expect(200);
              } else {
                await acceptAndStart(work.workItemId, fieldAgentB);
              }
              const response = await request(httpServer())
          """
          if text.count(old) != 1:
              raise SystemExit(f'missed-state fixture marker count={text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Format and commit regression correction
        shell: bash
        run: |
          cd backend/direkt-api
          npm ci --ignore-scripts
          npx prettier --write test/e2e/operations-field-workflow.e2e.spec.ts
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts
          git diff --cached --check
          git commit -m "test: align missed field-work state transition"
          git push origin HEAD:build/android-v1
