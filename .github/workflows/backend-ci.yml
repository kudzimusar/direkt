name: DIREKT Backend CI
# Phase 6A validation trigger; remove after the exact-head result is recorded.

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: backend/direkt-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Verify runtime and committed lockfile
        shell: bash
        run: |
          node --version
          npm --version
          [[ "$(npm --version)" == 11.* ]]
          test -f package-lock.json
          git diff --exit-code -- package.json package-lock.json

      - name: Install exact locked dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify and apply migrations
        run: npm run migration:check

      - name: Run tests with coverage thresholds
        run: npm run test

      - name: Build API
        run: npm run build

      - name: Verify OpenAPI contract
        run: npm run openapi:check

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-reports-${{ github.run_number }}
          path: |
            backend/direkt-api/coverage
            backend/direkt-api/dist/openapi.json
            backend/direkt-api/.migration-check
          if-no-files-found: warn
          retention-days: 14
