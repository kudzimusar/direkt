name: DIREKT Backend CI

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  verify:
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - name: Run lint with diagnostics
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run lint 2>&1 | tee artifacts/diagnostics/lint.txt
      - name: Run typecheck with diagnostics
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run typecheck 2>&1 | tee artifacts/diagnostics/typecheck.txt
      - run: npm run migration:check
      - name: Run tests with diagnostics
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          npm run test 2>&1 | tee artifacts/diagnostics/vitest.txt
      - run: npm run build
      - run: npm run openapi:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 14
