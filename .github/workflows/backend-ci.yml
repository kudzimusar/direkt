name: Stage 7G reporting lint correction

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stage7g-reporting-lint-pr-head
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Correct reporting assertion
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/test/e2e/operations-reporting.e2e.spec.ts')
          text = path.read_text()
          old = "    expect(serialized).not.toContain('\\\"objectKey\\\":');"
          new = "    expect(serialized).not.toContain('\"objectKey\":');"
          if text.count(old) != 1:
              raise SystemExit(f'reporting assertion marker count={text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit lint correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-reporting.e2e.spec.ts
          git diff --cached --check
          git commit -m "test: correct Stage 7 storage leak assertion"
          git push origin HEAD:build/android-v1
