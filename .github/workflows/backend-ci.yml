name: DIREKT Backend CI
# Phase 8 one-time formatter activation; restored after formatter commit.

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - "database/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  format-phase8:
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'build/android-v1' &&
      contains(github.event.head_commit.message, 'execute permanent Phase 8 formatter')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Format permanent backend source
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit formatter-clean source
        shell: bash
        run: |
          rm -f .github/workflows/phase8-format-backend.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Phase 8 interaction lifecycle"
          git push origin HEAD:build/android-v1

  verify:
    if: >-
      !contains(github.event.head_commit.message || '', 'execute permanent Phase 8 formatter')
    name: Format, test, migrate and build API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run migration:check
      - run: npm run test
      - run: npm run build
      - run: npm run openapi:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-backend-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/direkt-api/coverage/**
            backend/direkt-api/artifacts/openapi.json
            backend/direkt-api/artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 14
