name: VC7 VC8 consolidate once

on:
  push:
    branches:
      - vc/ai-quality-7-8
    paths:
      - ".github/workflows/vc78-consolidate-once.yml"

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: vc/ai-quality-7-8
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Add fail-closed typed AI use-case switches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/direkt-api/src/config/environment.ts")
          text = path.read_text()
          type_marker = "export type AiFallbackProviderMode = 'disabled' | 'groq';\n"
          if "export type AiUseCaseMode" not in text:
              text = text.replace(type_marker, type_marker + "export type AiUseCaseMode = 'disabled' | 'synthetic';\n", 1)

          interface_marker = "  AI_MAX_INPUT_CHARS: number;\n"
          interface_block = """  AI_MAX_INPUT_CHARS: number;\n  DIREKT_AI_DISCOVERY_ASSIST_MODE: AiUseCaseMode;\n  DIREKT_AI_PUBLIC_SUPPORT_MODE: AiUseCaseMode;\n  DIREKT_AI_PROVIDER_GUIDE_MODE: AiUseCaseMode;\n  DIREKT_AI_PROVIDER_DRAFT_MODE: AiUseCaseMode;\n  DIREKT_AI_OPERATIONS_SUMMARY_MODE: 'disabled';\n"""
          if "DIREKT_AI_DISCOVERY_ASSIST_MODE: AiUseCaseMode;" not in text:
              text = text.replace(interface_marker, interface_block, 1)

          schema_marker = "  AI_MAX_INPUT_CHARS: Joi.number().integer().min(256).max(20000).default(8000),\n"
          schema_block = """  AI_MAX_INPUT_CHARS: Joi.number().integer().min(256).max(20000).default(8000),\n  DIREKT_AI_DISCOVERY_ASSIST_MODE: Joi.string().valid('disabled', 'synthetic').default('disabled'),\n  DIREKT_AI_PUBLIC_SUPPORT_MODE: Joi.string().valid('disabled', 'synthetic').default('disabled'),\n  DIREKT_AI_PROVIDER_GUIDE_MODE: Joi.string().valid('disabled', 'synthetic').default('disabled'),\n  DIREKT_AI_PROVIDER_DRAFT_MODE: Joi.string().valid('disabled', 'synthetic').default('disabled'),\n  DIREKT_AI_OPERATIONS_SUMMARY_MODE: Joi.string().valid('disabled').default('disabled'),\n"""
          if "DIREKT_AI_DISCOVERY_ASSIST_MODE: Joi.string()" not in text:
              text = text.replace(schema_marker, schema_block, 1)

          validation_marker = """  if (value.AI_FALLBACK_PROVIDER !== 'disabled' && value.AI_PROVIDER_MODE === 'disabled') {\n    return helpers.message({\n      custom: 'AI fallback provider cannot be enabled while the primary AI provider is disabled.',\n    });\n  }\n"""
          validation_block = validation_marker + """  const enabledAiUseCases = [\n    value.DIREKT_AI_DISCOVERY_ASSIST_MODE,\n    value.DIREKT_AI_PUBLIC_SUPPORT_MODE,\n    value.DIREKT_AI_PROVIDER_GUIDE_MODE,\n    value.DIREKT_AI_PROVIDER_DRAFT_MODE,\n  ].some((mode) => mode === 'synthetic');\n  if (enabledAiUseCases && value.DIREKT_DATA_MODE !== 'synthetic-only') {\n    return helpers.message({\n      custom: 'AI use-case activation currently permits synthetic-only data mode.',\n    });\n  }\n  if (enabledAiUseCases && value.AI_PROVIDER_MODE === 'disabled') {\n    return helpers.message({\n      custom: 'AI use-case activation requires an explicitly enabled primary AI provider.',\n    });\n  }\n"""
          if "const enabledAiUseCases" not in text:
              if validation_marker not in text:
                  raise SystemExit("AI validation marker missing")
              text = text.replace(validation_marker, validation_block, 1)
          path.write_text(text)

          env_path = Path("backend/direkt-api/.env.example")
          env_text = env_path.read_text()
          env_marker = "AI_MAX_INPUT_CHARS=8000\n"
          env_block = """AI_MAX_INPUT_CHARS=8000\n# Per-use-case AI switches are fail-closed. 'synthetic' requires synthetic-only data mode and an enabled primary provider.\nDIREKT_AI_DISCOVERY_ASSIST_MODE=disabled\nDIREKT_AI_PUBLIC_SUPPORT_MODE=disabled\nDIREKT_AI_PROVIDER_GUIDE_MODE=disabled\nDIREKT_AI_PROVIDER_DRAFT_MODE=disabled\n# Restricted evidence/case AI is hard-gated pending dedicated privacy/security/data-processing approval.\nDIREKT_AI_OPERATIONS_SUMMARY_MODE=disabled\n"""
          if "DIREKT_AI_DISCOVERY_ASSIST_MODE=" not in env_text:
              if env_marker not in env_text:
                  raise SystemExit("AI env marker missing")
              env_text = env_text.replace(env_marker, env_block, 1)
          env_path.write_text(env_text)
          PY
      - name: Canonically format backend VC7/VC8 files
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npx prettier --write \
            src/config/environment.ts \
            src/ai/ai-use-case.registry.ts \
            src/ai/ai-use-case.registry.spec.ts \
            src/ai/ai-evaluation-contract.spec.ts \
            src/ai/ai.module.ts \
            src/ai/public-support.controller.ts \
            src/ai/public-support.service.ts \
            src/ai/public-support.service.spec.ts \
            src/discovery/discovery-ai-assist.service.ts \
            src/discovery/discovery-ai-assist.service.spec.ts \
            src/discovery/discovery-ai.dto.ts \
            src/discovery/discovery.controller.ts \
            src/discovery/discovery.module.ts \
            src/provider-workspace/provider-workspace-ai.service.ts \
            src/provider-workspace/provider-workspace-ai.service.spec.ts \
            src/provider-workspace/provider-workspace.controller.ts \
            src/provider-workspace/provider-workspace.module.ts \
            test/ai/*.evaluation.json
      - name: Canonically format web VC7/VC8 files
        working-directory: web/direkt-app
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npx prettier --write \
            app/api/discovery/assist/route.ts \
            app/api/provider/ai-assist/route.ts \
            app/api/support/assist/route.ts \
            app/layout.tsx \
            components/discovery-ai-assist-panel.tsx \
            components/discovery-experience.tsx \
            components/provider-ai-assist-panel.tsx \
            components/provider-journey-experience.tsx \
            components/support-assist-panel.tsx \
            components/direkt-app-shell.tsx \
            lib/contracts/discovery-ai.ts \
            lib/contracts/provider-ai.ts \
            lib/contracts/public-support.ts \
            lib/server/direkt-discovery-ai-client.ts \
            lib/server/direkt-provider-ai-api.ts \
            lib/server/direkt-public-support-api.ts
      - name: Commit consolidated source
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "direkt-vc-consolidator[bot]"
          git config user.email "direkt-vc-consolidator[bot]@users.noreply.github.com"
          git add backend/direkt-api web/direkt-app
          git commit -m "chore(vc8): consolidate AI controls and canonical formatting"
          git push origin HEAD:vc/ai-quality-7-8
