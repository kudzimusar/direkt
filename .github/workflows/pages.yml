name: Deploy DIREKT documentation to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements-docs.txt
      - run: python scripts/validate_docs.py
      - run: python scripts/package_planning_docs.py
      - run: python scripts/build_pages_source.py
      - uses: actions/configure-pages@v5
      - run: mkdocs build --strict
      - name: Verify W8 synthetic preview preservation
        shell: bash
        run: |
          set -euo pipefail
          for route in app preview; do
            test -f "site/${route}/index.html"
            test -f "site/${route}/manifest.webmanifest"
            test -f "site/${route}/sw.js"
            grep -q "Synthetic remote UI review" "site/${route}/index.html"
          done
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
