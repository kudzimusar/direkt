name: DIREKT Phase 11 backend formatter

on:
  push:
    branches:
      - phase11/synthetic-controlled-pilot

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: phase11/synthetic-controlled-pilot
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format
      - name: Commit formatter output only when needed
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api
          git commit -m "style: normalize backend formatting"
          git push origin HEAD:phase11/synthetic-controlled-pilot
