name: DIREKT functional web W6 managed commercial canary

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RUN-DIREKT-W6-CANARY to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-functional-web-w6-managed-canary
  cancel-in-progress: false

jobs:
  canary:
    name: Deploy and verify private W6 commercial canary
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api
      GCP_WEB_SERVICE: direkt-customer-provider-web-staging
      GCP_WEB_RUNTIME_SERVICE_ACCOUNT: direkt-portal-runtime@direkt-dev-502701.iam.gserviceaccount.com
    steps:
      - name: Validate immutable main source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "RUN-DIREKT-W6-CANARY"
          source_sha="${{ inputs.source_sha }}"
          [[ "${source_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          fetch-depth: 0

      - name: Verify exact reviewed source
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ steps.source.outputs.source_sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${SOURCE_SHA}" origin/main
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "WEB_IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_WEB_SERVICE}:w6-${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/direkt-app/package-lock.json

      - name: Verify exact W6 web source
        working-directory: web/direkt-app
        env:
          DIREKT_WEB_API_MODE: disabled
          DIREKT_WEB_AUTH_MODE: disabled
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run verify

      - name: Authenticate to Google Cloud through approved staging identity
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Prepare private W6 deployment
        shell: bash
        run: bash scripts/w6-managed-canary-prepare.sh

      - name: Mint private API token
        id: api-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.API_URL }}
          id_token_include_email: true

      - name: Mint private web token
        id: web-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.WEB_URL }}
          id_token_include_email: true

      - name: Exercise managed W6 lifecycle
        env:
          API_ID_TOKEN: ${{ steps.api-auth.outputs.id_token }}
          WEB_ID_TOKEN: ${{ steps.web-auth.outputs.id_token }}
        shell: bash
        run: bash scripts/w6-managed-canary-exercise.sh

      - name: Remove temporary invocation and verify final IAM
        if: always()
        shell: bash
        run: bash scripts/w6-managed-canary-cleanup.sh

      - name: Upload sanitized W6 evidence
        if: always() && hashFiles(format('{0}/w6-canary-evidence.json', runner.temp)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: direkt-w6-commercial-canary-${{ steps.source.outputs.source_sha }}
          path: ${{ runner.temp }}/w6-canary-evidence.json
          if-no-files-found: error
          retention-days: 14
