name: Phase 9 webhook integrity correction

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase9-webhook-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - working-directory: backend/direkt-api
        run: npm ci --ignore-scripts
      - run: python3 .github/scripts/phase9_webhook_fix.py
      - working-directory: backend/direkt-api
        run: npx prettier --write src/commercial/commercial.repository.ts test/e2e/commercial-lifecycle.e2e.spec.ts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/src/commercial/commercial.repository.ts backend/direkt-api/test/e2e/commercial-lifecycle.e2e.spec.ts
          git commit -m "fix(commercial): bind webhook processing to canonical receipt"
          git push origin HEAD:build/android-v1
