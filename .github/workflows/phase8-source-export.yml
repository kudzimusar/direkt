name: Phase 8 interrupted source export

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase8-source-export.yml"
      - ".github/phase8-backend-bundle.tgz"
      - ".github/phase8-interaction-handoff.service.ts"

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'build/android-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - name: Extract interrupted source safely
        shell: bash
        run: |
          test -f .github/phase8-backend-bundle.tgz
          python - <<'PY'
          from pathlib import Path
          import tarfile

          bundle = Path('.github/phase8-backend-bundle.tgz')
          with tarfile.open(bundle, 'r:gz') as archive:
              archive.extractall('.', filter='data')
          PY
          cp .github/phase8-interaction-handoff.service.ts backend/direkt-api/src/interaction/interaction-handoff.service.ts
          rm -f .github/phase8-backend-bundle.tgz
          rm -f .github/phase8-interaction-handoff.service.ts
          rm -f .github/phase8-permissions.ts
          rm -f .github/workflows/phase8-backend-sync-once.yml
          rm -f .github/workflows/phase8-lint-diagnostic.yml
          rm -f .github/workflows/phase8-source-export.yml
      - name: Upload exact Phase 8 workspace
        uses: actions/upload-artifact@v4
        with:
          name: phase8-full-workspace-${{ github.run_number }}-${{ github.sha }}
          path: |
            .github/workflows
            admin/direkt-operations-portal
            android/direkt-app
            backend/direkt-api
            database
            docs
            DECISION_LOG.md
            MASTER_BUILD_PLAN.md
            PROJECT_STATUS.md
            RISK_REGISTER.md
            WORKSTREAM_LOCK.md
          if-no-files-found: error
          retention-days: 2
