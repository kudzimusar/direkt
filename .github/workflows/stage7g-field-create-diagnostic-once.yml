name: Stage 7G field creation diagnostic once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7g-field-create-diagnostic-once.yml"

permissions:
  contents: write

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  diagnose:
    if: contains(github.event.head_commit.message, 'activate Stage 7G field creation diagnostic')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Instrument temporary database error output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/src/operations/operations-field.service.ts')
          text = path.read_text()
          marker = """      throw error;
          """
          replacement = """      process.stderr.write(
            `STAGE7_FIELD_ERROR ${JSON.stringify({
              name: error instanceof Error ? error.name : 'unknown',
              message: databaseError.message ?? (error instanceof Error ? error.message : String(error)),
              code: databaseError.code ?? null,
            })}\\n`,
          );
          throw error;
          """
          if text.count(marker) != 1:
              raise SystemExit(f'field throw marker count={text.count(marker)}')
          path.write_text(text.replace(marker, replacement, 1))
          PY
      - name: Run targeted field workflow test
        shell: bash
        run: |
          cd backend/direkt-api
          npm ci --ignore-scripts
          set +e
          npx vitest run test/e2e/operations-field-workflow.e2e.spec.ts > ../../stage7g-field-create-diagnostic.txt 2>&1
          status=$?
          set -e
          grep -E "STAGE7_FIELD_ERROR|expected 201|Internal Server Error|Error:" ../../stage7g-field-create-diagnostic.txt > ../../stage7g-field-create-summary.txt || true
          printf '\nexit_status=%s\n' "$status" >> ../../stage7g-field-create-summary.txt
      - name: Commit diagnostic and remove helper
        shell: bash
        run: |
          rm .github/workflows/stage7g-field-create-diagnostic-once.yml
          git checkout -- backend/direkt-api/src/operations/operations-field.service.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stage7g-field-create-summary.txt .github/workflows/stage7g-field-create-diagnostic-once.yml
          git diff --cached --check
          git commit -m "ci: capture Stage 7G field creation diagnostic"
          git push origin HEAD:build/android-v1

# second-commit activation marker
