name: DIREKT RC4 one-shot FID verifier promotion

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rc4-fid-verifier-patch-once.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'integration/rc4-fcm-fid-registration-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm-fid-registration-fix
          fetch-depth: 0

      - name: Promote RC4 verifier to FID registration contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/verify-integration-runtime-contract.py')
          text = path.read_text()

          replacements = [
              (
                  '''    require(\n        android_manifest,\n        'android:name="com.google.firebase.MESSAGING_EVENT"',\n        "FCM messaging service intent",\n    )\n''',
                  '''    require(\n        android_manifest,\n        'android:name="com.google.firebase.MESSAGING_EVENT"',\n        "FCM messaging service intent",\n    )\n    require(\n        android_manifest,\n        'android:name="firebase_messaging_installation_id_enabled"',\n        "FCM FID registration callback enablement",\n    )\n    require(\n        android_manifest,\n        'android:name="firebase_messaging_auto_init_enabled"',\n        "FCM auto-init manifest control",\n    )\n''',
              ),
              (
                  '        "FirebaseMessaging.getInstance().token",\n',
                  '        "FirebaseMessaging.getInstance().register()",\n',
              ),
              (
                  '        "PushRegistrationCoordinator(applicationContext).registerRotatedToken(token)",\n',
                  '        "override fun onRegistered(installationId: String)",\n        "FcmCanary.recordRegisteredInstallation(applicationContext, installationId)",\n        "registerRegisteredInstallation(installationId)",\n',
              ),
              (
                  '''    require(\n        fcm_adapter,\n        "https://fcm.googleapis.com/v1/projects/",\n        "FCM HTTP v1 endpoint",\n    )\n''',
                  '''    require(\n        fcm_adapter,\n        "https://fcm.googleapis.com/v1/projects/",\n        "FCM HTTP v1 endpoint",\n    )\n    require(fcm_adapter, "fid: request.token", "FCM FID target")\n''',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'expected verifier fragment not found: {old[:100]!r}')
              text = text.replace(old, new, 1)

          marker = '        require(android_fcm_canary, needle, "FCM synthetic token canary invariant")\n'
          addition = '''        require(android_fcm_canary, needle, "FCM synthetic token canary invariant")\n    prohibit(\n        android_fcm_canary,\n        r"FirebaseMessaging\\.getInstance\\(\\)\\.token",\n        "deprecated FCM token retrieval in RC4 canary",\n    )\n'''
          if marker not in text:
              raise SystemExit('expected FCM canary verifier marker not found')
          text = text.replace(marker, addition, 1)

          path.write_text(text)
          PY
          git diff --check

      - name: Commit verifier promotion
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/verify-integration-runtime-contract.py
          git commit -m 'test(rc4): enforce FID registration runtime contract'
          git push origin HEAD:integration/rc4-fcm-fid-registration-fix
