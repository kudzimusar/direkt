name: Phase 6 formatter pass

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase6-format-all.yml"

permissions:
  contents: write

concurrency:
  group: phase6-formatter-pass
  cancel-in-progress: false

jobs:
  format:
    if: contains(github.event.head_commit.message, 'activate Phase 6 formatter pass')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            backend/direkt-api/package-lock.json
            admin/direkt-operations-portal/package-lock.json

      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format

      - name: Format operations portal
        working-directory: admin/direkt-operations-portal
        run: |
          npm ci --ignore-scripts
          npm run format

      - name: Commit formatter-clean source
        shell: bash
        run: |
          rm .github/workflows/phase6-format-all.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Phase 6 implementation"
          git push origin HEAD:build/android-v1
