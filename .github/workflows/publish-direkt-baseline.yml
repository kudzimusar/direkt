name: Publish validated DIREKT baseline

on:
  push:
    branches:
      - main
    paths:
      - ".direkt-bootstrap-trigger"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-baseline-publication
  cancel-in-progress: false

jobs:
  publish:
    name: Reconstruct, validate, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct transferred archive
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/direkt-bootstrap
          git clone --branch bootstrap-docs --single-branch "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" /tmp/direkt-bootstrap
          test -d /tmp/direkt-bootstrap/bootstrap/chunks
          cat /tmp/direkt-bootstrap/bootstrap/chunks/*.txt > /tmp/direkt-baseline.tar.gz.b64
          base64 --decode /tmp/direkt-baseline.tar.gz.b64 > /tmp/direkt-baseline.tar.gz
          tar -tzf /tmp/direkt-baseline.tar.gz > /tmp/direkt-baseline-files.txt
          test -s /tmp/direkt-baseline-files.txt

      - name: Replace temporary repository contents
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/direkt-baseline.tar.gz -C .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Validate planning documents
        run: python scripts/validate_docs.py

      - name: Package downloadable planning archive
        run: python scripts/package_planning_docs.py

      - name: Prepare Pages source
        run: python scripts/build_pages_source.py

      - name: Build documentation site strictly
        run: python -m mkdocs build --strict

      - name: Commit and publish clean baseline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs: establish comprehensive DIREKT planning baseline"
          fi
          git push origin HEAD:main
          git push origin HEAD:build/android-v1
