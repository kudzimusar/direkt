name: Phase 6 backend format once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/phase6-reconcile-main-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase6-backend-format-once
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out active Phase 6 branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Apply pinned backend formatter
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run format:check

      - name: Commit deterministic formatting
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- backend/direkt-api)" ]; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api
          git diff --cached --check
          git commit -m "style: apply Phase 6 backend formatting"
          git push origin HEAD:build/android-v1