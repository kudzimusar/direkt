name: Phase 6 reconcile and format once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/phase6-reconcile-main-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase6-reconcile-and-format-once
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out active Phase 6 branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Reconcile latest main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main build/android-v1
          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U | sort)"
          if [ -n "$conflicts" ]; then
            unexpected="$(printf '%s\n' "$conflicts" | grep -Ev '^\.github/workflows/phase6-reconcile-main-once\.yml$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:" >&2
              printf '%s\n' "$unexpected" >&2
              git merge --abort
              exit 1
            fi
            git checkout --theirs .github/workflows/phase6-reconcile-main-once.yml
            git add .github/workflows/phase6-reconcile-main-once.yml
          fi

          if [ "$merge_status" -ne 0 ] && [ -z "$conflicts" ]; then
            echo "Merge failed without a resolvable conflict set." >&2
            git merge --abort || true
            exit 1
          fi

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Apply pinned backend formatter
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run format:check

      - name: Commit reconciled clean Phase 6 tree
        shell: bash
        run: |
          rm .github/workflows/phase6-reconcile-main-once.yml
          git add -A
          git diff --cached --check
          git commit -m "chore: finalize Phase 6 branch reconciliation"
          git push origin HEAD:build/android-v1