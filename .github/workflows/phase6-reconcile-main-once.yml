name: Phase 6 reconcile main once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/phase6-reconcile-main-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase6-reconcile-main-once
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out active Phase 6 branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Merge stable main without overwriting Phase 6 records
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main build/android-v1
          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U | sort)"
          if [ -n "$conflicts" ]; then
            unexpected="$(printf '%s\n' "$conflicts" | grep -Ev '^(PROJECT_STATUS\.md|WORKSTREAM_LOCK\.md)$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:" >&2
              printf '%s\n' "$unexpected" >&2
              git merge --abort
              exit 1
            fi
            git checkout --ours PROJECT_STATUS.md WORKSTREAM_LOCK.md
            git add PROJECT_STATUS.md WORKSTREAM_LOCK.md
          fi

          if [ "$merge_status" -ne 0 ] && [ -z "$conflicts" ]; then
            echo "Merge failed without a resolvable conflict set." >&2
            git merge --abort || true
            exit 1
          fi

          git diff --cached --check
          git commit -m "chore: merge Phase 5 stable record into Phase 6 branch"
          git push origin HEAD:build/android-v1