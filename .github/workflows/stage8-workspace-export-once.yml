name: Stage 8 workspace export once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage8-workspace-export-once.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Package repository workspace
        shell: bash
        run: |
          tar --exclude=.git --exclude='**/node_modules' --exclude='**/build' --exclude='**/.next' -czf /tmp/direkt-stage8-workspace.tgz .
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: direkt-stage8-workspace-${{ github.sha }}
          path: /tmp/direkt-stage8-workspace.tgz
          if-no-files-found: error
          retention-days: 1
