name: Stage 7G migration diagnostic once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7g-migration-diagnostic-once.yml"

permissions:
  contents: write

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  diagnose:
    if: contains(github.event.head_commit.message, 'activate Stage 7G migration diagnostic')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Capture exact migration result
        shell: bash
        run: |
          cd backend/direkt-api
          npm ci --ignore-scripts
          set +e
          npm run migration:check > ../../stage7g-migration-diagnostic.txt 2>&1
          status=$?
          set -e
          printf '\nexit_status=%s\n' "$status" >> ../../stage7g-migration-diagnostic.txt
      - name: Commit diagnostic and remove helper
        shell: bash
        run: |
          rm .github/workflows/stage7g-migration-diagnostic-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stage7g-migration-diagnostic.txt .github/workflows/stage7g-migration-diagnostic-once.yml
          git diff --cached --check
          git commit -m "ci: capture Stage 7G migration diagnostic"
          git push origin HEAD:build/android-v1

# second-commit activation marker
