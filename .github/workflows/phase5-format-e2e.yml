name: Phase 5 discovery e2e formatting

on:
  push:
    branches: [build/android-v1]
    paths:
      - ".github/workflows/phase5-format-e2e.yml"
      - "backend/direkt-api/test/e2e/discovery.e2e-spec.ts"

permissions:
  contents: write

concurrency:
  group: direkt-phase5-e2e-format
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit formatting
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- backend/direkt-api)" ]; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api
          git commit -m "style: format Phase 5 discovery e2e"
          git push origin HEAD:build/android-v1
