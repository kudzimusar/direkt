name: Phase 8 backend product sync once

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase8-lint-diagnostic.yml"
      - ".github/phase8-backend-bundle.tgz"
      - ".github/phase8-interaction-handoff.service.ts"
      - ".github/phase8-permissions.ts"

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'build/android-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Extract reviewed source and exact overlays
        shell: bash
        run: |
          test -f .github/phase8-backend-bundle.tgz
          test -f .github/phase8-interaction-handoff.service.ts
          test -f .github/phase8-permissions.ts
          python - <<'PY'
          import tarfile
          with tarfile.open('.github/phase8-backend-bundle.tgz', 'r:gz') as archive:
              archive.extractall('.')
          PY
          cp .github/phase8-interaction-handoff.service.ts backend/direkt-api/src/interaction/interaction-handoff.service.ts
          cp .github/phase8-permissions.ts backend/direkt-api/src/authorization/permissions.ts
      - name: Install exact locked dependencies
        working-directory: backend/direkt-api
        run: npm ci --ignore-scripts
      - name: Format reviewed source
        working-directory: backend/direkt-api
        run: npm run format
      - name: Lint reviewed source
        working-directory: backend/direkt-api
        run: npm run lint
      - name: Typecheck reviewed source
        working-directory: backend/direkt-api
        run: npm run typecheck
      - name: Build reviewed source
        working-directory: backend/direkt-api
        run: npm run build
      - name: Validate reviewed OpenAPI
        working-directory: backend/direkt-api
        run: npm run openapi:check
      - name: Commit permanent product source
        shell: bash
        run: |
          rm .github/phase8-backend-bundle.tgz
          rm .github/phase8-interaction-handoff.service.ts
          rm .github/phase8-permissions.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend database .github/phase8-backend-bundle.tgz .github/phase8-interaction-handoff.service.ts .github/phase8-permissions.ts
          git commit -m "feat: complete Phase 8 interaction review backend"
          git push origin HEAD:build/android-v1
