name: Cloud Run failure diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-cloud-run-failure-diagnostic.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print final narrowed metadata sync failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29624290983 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 35
