name: Cloud Run failure diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-cloud-run-failure-diagnostic.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print secret-version sync failure lines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29624111883 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -Ei 'permission|denied|forbidden|enabled secret|secretmanager|variables|403|404|error|process completed' \
            | tail -n 80
