name: Phase 9 governance patch
# Applies the final documented governance and TypeScript corrections in one fast-forward commit.

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase9-governance-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - name: Apply documented Phase 9 governance updates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          decisions = Path('DECISION_LOG.md')
          source = decisions.read_text()
          marker = '\n## How to add a decision\n'
          rows = """
| D-088 | 2026-07-17 | Phase 9 commercial aggregates remain in a separate schema and module | Products, subscriptions, invoices, payments, ledger and reconciliation must not become columns or transitions inside trust or interaction aggregates | Accepted |
| D-089 | 2026-07-17 | Commercial amounts use immutable integer minor units and issued invoice-line snapshots | Avoids floating-point ambiguity and prevents later catalogue edits from rewriting historical obligations | Accepted |
| D-090 | 2026-07-17 | Payment-provider integration uses disabled and synthetic adapters; production accepts disabled mode only | Establishes testable contracts while making accidental production money movement impossible before approval | Accepted with production stop gate |
| D-091 | 2026-07-17 | Webhook state changes require canonical HMAC verification, timestamp freshness, unique external identity and replay-safe fingerprints | External callbacks are untrusted and cannot mutate money state solely because a payload parses | Accepted |
| D-092 | 2026-07-17 | Ledger history is append-only and every transaction must balance before completion | Commercial audit and reconciliation require corrections through new entries, never silent historical edits | Accepted |
| D-093 | 2026-07-17 | Commercial mismatches use a separate reconciliation lifecycle and high-risk adjustments require two distinct non-requester approvers | Exceptions and corrections need explicit ownership, optimistic revisions and four-eyes control | Accepted |
| D-094 | 2026-07-17 | Android and the operations portal persist or render only minimized commercial state through API-owned contracts | Device and browser code must not store credentials, raw webhooks, private evidence/contact data or bypass backend authorization | Accepted |
"""
          if '| D-088 |' not in source:
              if marker not in source:
                  raise SystemExit('Decision-log insertion marker missing')
              decisions.write_text(source.replace(marker, '\n' + rows + marker))

          risks = Path('RISK_REGISTER.md')
          source = risks.read_text()
          risk_marker = '\n## Current treatment priorities\n'
          risk_rows = """
| R-069 | Forged, stale or replayed payment webhook changes commercial state | 3 | 5 | 15 | canonical HMAC, timestamp window, unique event ID/fingerprint, replay tests and Phase 10 key-rotation monitoring | Finance/security / controlled synthetically; production gate |
| R-070 | Ledger imbalance or direct historical edits corrupt financial audit | 2 | 5 | 10 | append-only triggers, controlled posting functions, debit/credit balance checks and reconciliation | Finance/data / controlled synthetically |
| R-071 | Subscription or payment state changes verification, publication, ranking or accountability rights | 2 | 5 | 10 | separate schema/module, absent write coupling, explicit false-effect fields and before/after trust assertions | Product/trust / controlled |
| R-072 | Credentials, raw webhook bodies, contact or evidence leak through commercial clients or projections | 3 | 5 | 15 | minimized DTOs, no raw-body storage, API-only portal, metadata-only Android persistence and leak regressions | Privacy/security / controlled synthetically; production gate |
| R-073 | Ambiguous or copied provider context causes cross-tenant commercial access | 2 | 5 | 10 | actor-resolved active assignment, zero/multiple-assignment denial, database permission checks and cross-provider tests | Security/backend / controlled |
| R-074 | Reconciliation exceptions are unresolved or resolved against incorrect evidence | 4 | 4 | 16 | explicit mismatch codes, ownership, revisions, immutable source records, queue ageing and Phase 10 service levels | Finance/operations / Phase 10 gate |
| R-075 | Adjustment or refund requester colludes with or acts as approver | 3 | 5 | 15 | requester exclusion, two distinct eligible approvers, immutable approvals and later anti-collusion review | Finance/security / controlled synthetically; pilot gate |
| R-076 | Synthetic payment adapter or test secret is enabled in production | 2 | 5 | 10 | production schema permits disabled mode only, no real provider SDK/credential and Phase 10 configuration/secret scans | Security/operations / controlled; production gate |
| R-077 | Supabase activation targets the wrong project or exposes protected credentials | 2 | 5 | 10 | exact project-ref check, protected environment secrets, backend-only keys, sanitized artifacts and abort-on-mismatch workflow | Security/infrastructure / blocked until verified access |
"""
          if '| R-069 |' not in source:
              if risk_marker not in source:
                  raise SystemExit('Risk-register insertion marker missing')
              source = source.replace(risk_marker, '\n' + risk_rows + risk_marker)

          start = source.index('## Current treatment priorities')
          end = source.index('## Review cadence')
          treatment = """## Current treatment priorities

Phase 9 exit controls are implemented for the synthetic checkpoint:

- R-009 is controlled by adapter isolation, idempotent signed webhooks, an append-only balanced ledger and reconciliation queues;
- R-054 is mitigated because the former subscription placeholder is replaced by a live actor-scoped commercial workspace;
- R-069 is controlled synthetically by canonical HMAC verification, timestamp freshness and replay/conflict regressions;
- R-070 is controlled by immutable ledger history, balanced posting functions and direct-mutation denial;
- R-071 is controlled by schema separation and before/after verification, claim, publication, review and complaint assertions;
- R-072 is controlled by minimized projections, absent raw webhook storage, API-only portal access and credential-free Android persistence;
- R-073 is controlled by active actor-resolved provider scope and cross-provider denial tests;
- R-075 is controlled synthetically by requester exclusion and two independent approvals;
- R-076 is controlled because production configuration accepts only disabled payment mode;
- R-077 remains blocked until the exact DIREKT Supabase project and protected secrets are verifiably accessible.

Before production integration:

- R-006 still requires WorkManager/network implementation and representative low-connectivity device validation;
- R-014 and R-048 require an approved map/location provider, quotas, cost controls and manual fallback validation;
- R-039, R-042 and R-043 require production storage, scheduler, scanning, alerting and recovery validation;
- R-053 and R-067 require approved encrypted Android storage, secure local retention and deletion tests;
- R-055 and R-056 require production identity, object-storage and log-redaction review;
- R-062 requires approved consent copy, privacy notice, lawful-use boundaries and qualified Zambia review;
- R-066 and R-074 require queue ownership, service levels, ageing alerts, staffing and escalation exercises;
- R-068 requires approved communication providers, consent-at-send enforcement, idempotency, audit, opt-out and abuse controls;
- R-069, R-072, R-076 and R-077 require production key rotation, secret/configuration scanning, verified infrastructure activation and incident monitoring.

Before the controlled pilot:

- R-004, R-010, R-013, R-015, R-021, R-022, R-023 and R-025 require real operational or legal evidence;
- R-030 requires approved providers, distributed rate limiting and monitored abuse controls;
- R-033 requires deployment, cookie/session, CSP and private-data review;
- R-034 and R-076 require production configuration and secret-management validation;
- R-037, R-058 and R-075 require representative fairness, independence and anti-collusion testing;
- R-062, R-066, R-067, R-068 and R-074 require representative consent, moderation, connectivity, communications and finance-operations validation.

"""
          risks.write_text(source[:start] + treatment + source[end:])

          addenda = {
              'docs/architecture/BACKEND_ARCHITECTURE.md': """## Phase 9 commercial architecture

Phase 9 adds a bounded `commercial` NestJS module and PostgreSQL schema for products, prices, entitlements, subscriptions, immutable invoices, synthetic payment intents, webhook receipts, ledger entries, reconciliation and adjustments. Controllers delegate lifecycle and authorization-sensitive mutations to database functions. The module may reference account/provider scope but has no write coupling to verification, discovery, interaction, review, complaint or incident aggregates. Payment providers implement a port with `synthetic` development/test and production-disabled adapters only.
""",
              'docs/backend/AUTHENTICATION_AND_AUTHORIZATION.md': """## Phase 9 commercial authorization

Provider-commercial mutations resolve one active provider workspace from server-side role assignments; request-body, query or copied resource identifiers do not establish tenant scope. Commercial operations use separate global permission families for products, subscriptions, invoices, payments, reconciliation, adjustments and ledger reads. Trust, field, moderation and complaint roles do not inherit finance access. High-risk adjustments exclude the requester and require two distinct current eligible approvers. Controller guards are necessary but database functions independently verify scope and permission.
""",
              'docs/security/PRIVACY_MODEL.md': """## Phase 9 commercial privacy boundary

Commercial storage and projections exclude payment credentials, account/PIN/card values, raw webhook bodies, interaction contact values, handoff consent, private evidence, storage object keys and trust-review rationale. Webhooks persist bounded metadata and fingerprints only. Android recovery stores opaque request/invoice identifiers, integer minor-unit amount, currency, revision and safe state/error metadata. The operations portal consumes the versioned backend API only. Commercial status cannot alter trust, publication, ranking, reviews, complaints, appeals or incidents.
""",
              'docs/testing/TEST_STRATEGY.md': """## Phase 9 commercial validation

Permanent Phase 9 tests cover actor-resolved provider scope, hashed idempotency and fingerprint conflicts, subscription states, immutable invoice lines, signed/timestamped webhook processing, replay/conflict handling, amount/currency mismatch reconciliation, balanced append-only ledger posting, two-approver adjustments, production-disabled adapters, credential/privacy leak assertions, Android process-death recovery and accessible commercial states, portal finance-permission separation, API-only architecture and before/after trust independence. Promotion requires backend, Android, portal and documentation gates on one exact reviewed head.
""",
          }
          for name, addition in addenda.items():
              path = Path(name)
              text = path.read_text()
              heading = addition.splitlines()[0]
              if heading not in text:
                  path.write_text(text.rstrip() + '\n\n' + addition.strip() + '\n')

          lifecycle = Path('backend/direkt-api/test/e2e/commercial-lifecycle.e2e.spec.ts')
          text = lifecycle.read_text()
          old = 'interface ReconciliationResponse {\n  reconciliationCaseId: string;'
          new = 'interface ReconciliationResponse {\n  reconciliationCaseId: string;\n  paymentIntentId: string;'
          if 'paymentIntentId: string;' not in text[text.index('interface ReconciliationResponse'):text.index('interface AdjustmentResponse')]:
              if old not in text:
                  raise SystemExit('Reconciliation interface marker missing')
              lifecycle.write_text(text.replace(old, new))

          unit = Path('backend/direkt-api/test/unit/commercial-payment-provider.spec.ts')
          text = unit.read_text()
          start_call = """adapter.createAction({
        externalReference: 'SYN-PAY-HISTORICAL',
        currency: 'ZMW',
        amountMinor: 15000,
        expiresAt: '2026-07-17T03:00:00.000Z',
      })"""
          if start_call in text:
              unit.write_text(text.replace(start_call, 'adapter.createAction()'))
          PY
          cd backend/direkt-api
          npx prettier --write test/e2e/commercial-lifecycle.e2e.spec.ts test/unit/commercial-payment-provider.spec.ts
      - name: Commit governance and type updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DECISION_LOG.md RISK_REGISTER.md docs/architecture/BACKEND_ARCHITECTURE.md docs/backend/AUTHENTICATION_AND_AUTHORIZATION.md docs/security/PRIVACY_MODEL.md docs/testing/TEST_STRATEGY.md backend/direkt-api/test/e2e/commercial-lifecycle.e2e.spec.ts backend/direkt-api/test/unit/commercial-payment-provider.spec.ts
          git commit -m "docs: complete Phase 9 governance and type contracts"
          git push origin HEAD:build/android-v1
