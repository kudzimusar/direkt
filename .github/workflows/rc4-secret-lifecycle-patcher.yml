name: DIREKT RC4 one-shot secret lifecycle patcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rc4-secret-lifecycle-patcher.yml

permissions:
  contents: write

jobs:
  patch-reviewed-rc4-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out RC4 correction branch
        uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm-preprovisioned-secret
          fetch-depth: 0

      - name: Apply exact pre-provisioned secret lifecycle correction
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/firebase-fcm-canary.yml')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '      GCP_CANARY_JOB: direkt-fcm-canary\n',
                  '      GCP_CANARY_JOB: direkt-fcm-canary\n'
                  '      GCP_FCM_TOKEN_SECRET: direkt-fcm-canary-token\n',
              ),
              (
                  '''      - name: Store synthetic FCM token as one-run Secret Manager secret
        shell: bash
        run: |
          set -euo pipefail
          secret_name="direkt-fcm-canary-token-${GITHUB_RUN_ID}"
          gcloud secrets create "${secret_name}" \\
            --project "${GCP_PROJECT_ID}" \\
            --replication-policy automatic \\
            --quiet
          gcloud secrets versions add "${secret_name}" \\
            --project "${GCP_PROJECT_ID}" \\
            --data-file "${RUNNER_TEMP}/fcm-device-token" \\
            --quiet >/dev/null
          rm -f "${RUNNER_TEMP}/fcm-device-token"
          gcloud secrets add-iam-policy-binding "${secret_name}" \\
            --project "${GCP_PROJECT_ID}" \\
            --member "serviceAccount:${GCP_RUNTIME_SERVICE_ACCOUNT}" \\
            --role roles/secretmanager.secretAccessor \\
            --quiet >/dev/null
          echo "FCM_TOKEN_SECRET=${secret_name}" >> "${GITHUB_ENV}"
''',
                  '''      - name: Store synthetic FCM token as one-run version in pre-provisioned Secret Manager secret
        shell: bash
        run: |
          set -euo pipefail
          test "${GCP_FCM_TOKEN_SECRET}" = "direkt-fcm-canary-token"
          version_record="$(gcloud secrets versions add "${GCP_FCM_TOKEN_SECRET}" \\
            --project "${GCP_PROJECT_ID}" \\
            --data-file "${RUNNER_TEMP}/fcm-device-token" \\
            --format=json \\
            --quiet)"
          rm -f "${RUNNER_TEMP}/fcm-device-token"
          version="$(jq -r '.name | split("/") | last' <<< "${version_record}")"
          state="$(jq -r '.state // empty' <<< "${version_record}")"
          [[ "${version}" =~ ^[1-9][0-9]*$ ]]
          test "${state}" = "ENABLED"
          echo "FCM_TOKEN_SECRET=${GCP_FCM_TOKEN_SECRET}" >> "${GITHUB_ENV}"
          echo "FCM_TOKEN_SECRET_VERSION=${version}" >> "${GITHUB_ENV}"
''',
              ),
              (
                  'FCM_SYNTHETIC_DEVICE_TOKEN=${FCM_TOKEN_SECRET}:1',
                  'FCM_SYNTHETIC_DEVICE_TOKEN=${FCM_TOKEN_SECRET}:${FCM_TOKEN_SECRET_VERSION}',
              ),
              (
                  '''          grep -Fq "${FCM_TOKEN_SECRET}" "${job_export}"
          grep -Fq "PUSH_PROVIDER_MODE" "${job_export}"
''',
                  '''          grep -Fq "${FCM_TOKEN_SECRET}" "${job_export}"
          grep -Eq "key: ['\\\"]?${FCM_TOKEN_SECRET_VERSION}['\\\"]?$" "${job_export}"
          grep -Fq "PUSH_PROVIDER_MODE" "${job_export}"
''',
              ),
              (
                  '- FCM token: temporary one-run Secret Manager value; not logged or retained in artifacts',
                  '- FCM token: temporary numeric version in a pre-provisioned Secret Manager container; not logged or retained in artifacts',
              ),
              (
                  '''          if [[ -n "${FCM_TOKEN_SECRET:-}" ]]; then
            gcloud secrets delete "${FCM_TOKEN_SECRET}" --project "${GCP_PROJECT_ID}" --quiet
          fi
          gcloud run jobs delete "${GCP_CANARY_JOB}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --quiet
''',
                  '''          gcloud run jobs delete "${GCP_CANARY_JOB}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --quiet
          if [[ -n "${FCM_TOKEN_SECRET:-}" && "${FCM_TOKEN_SECRET_VERSION:-}" =~ ^[1-9][0-9]*$ ]]; then
            gcloud secrets versions destroy "${FCM_TOKEN_SECRET_VERSION}" \\
              --secret "${FCM_TOKEN_SECRET}" \\
              --project "${GCP_PROJECT_ID}" \\
              --quiet
          fi
''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one replacement target, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          prohibited = (
              'gcloud secrets create "${secret_name}"',
              'gcloud secrets add-iam-policy-binding "${secret_name}"',
              'gcloud secrets delete "${FCM_TOKEN_SECRET}"',
              'FCM_SYNTHETIC_DEVICE_TOKEN=${FCM_TOKEN_SECRET}:1',
          )
          for needle in prohibited:
              if needle in text:
                  raise SystemExit(f'prohibited legacy secret lifecycle remains: {needle}')

          required = (
              'GCP_FCM_TOKEN_SECRET: direkt-fcm-canary-token',
              'gcloud secrets versions add "${GCP_FCM_TOKEN_SECRET}"',
              'FCM_TOKEN_SECRET_VERSION=${version}',
              'FCM_SYNTHETIC_DEVICE_TOKEN=${FCM_TOKEN_SECRET}:${FCM_TOKEN_SECRET_VERSION}',
              'gcloud secrets versions destroy "${FCM_TOKEN_SECRET_VERSION}"',
          )
          for needle in required:
              if needle not in text:
                  raise SystemExit(f'missing corrected secret lifecycle invariant: {needle}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit bounded correction to RC4 branch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff -- .github/workflows/firebase-fcm-canary.yml
          test -n "$(git status --short)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/firebase-fcm-canary.yml
          git commit -m "fix(rc4): use pre-provisioned FCM token secret"
          git push origin HEAD:integration/rc4-fcm-preprovisioned-secret
