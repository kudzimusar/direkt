name: DIREKT Firebase Crashlytics synthetic canary

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RUN-DIREKT-CRASHLYTICS-CANARY to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-firebase-crashlytics-canary
  cancel-in-progress: false

jobs:
  crashlytics-canary:
    name: Prove synthetic crash and ANR delivery
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      FIREBASE_PACKAGE_NAME: com.kudzimusar.direkt.debug
      DIREKT_GRADLE_VERSION: "9.4.0"
      SOURCE_SHA: ${{ inputs.source_sha }}

    steps:
      - name: Validate canary controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "RUN-DIREKT-CRASHLYTICS-CANARY"
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${SOURCE_SHA}" origin/main

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve registered debug Firebase app and temporary config
        shell: bash
        run: |
          set -euo pipefail
          token="$(gcloud auth print-access-token)"
          echo "::add-mask::${token}"
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${token}" \
            "https://firebase.googleapis.com/v1beta1/projects/${GCP_PROJECT_ID}/androidApps?pageSize=100" \
            > "${RUNNER_TEMP}/firebase-android-apps.json"
          FIREBASE_APP_ID="$(jq -r --arg package "${FIREBASE_PACKAGE_NAME}" '[.apps[]? | select(.packageName == $package) | .appId][0] // empty' "${RUNNER_TEMP}/firebase-android-apps.json")"
          test -n "${FIREBASE_APP_ID}"
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${token}" \
            "https://firebase.googleapis.com/v1beta1/projects/${GCP_PROJECT_ID}/androidApps/${FIREBASE_APP_ID}/config" \
            > "${RUNNER_TEMP}/firebase-app-config.json"
          jq -r '.configFileContents // empty' "${RUNNER_TEMP}/firebase-app-config.json" | base64 --decode > android/direkt-app/app/google-services.json
          test -s android/direkt-app/app/google-services.json
          FIREBASE_API_KEY="$(jq -r --arg package "${FIREBASE_PACKAGE_NAME}" '[.client[] | select(.client_info.android_client_info.package_name == $package) | .api_key[0].current_key][0] // empty' android/direkt-app/app/google-services.json)"
          CONFIG_APP_ID="$(jq -r --arg package "${FIREBASE_PACKAGE_NAME}" '[.client[] | select(.client_info.android_client_info.package_name == $package) | .client_info.mobilesdk_app_id][0] // empty' android/direkt-app/app/google-services.json)"
          CONFIG_PROJECT_ID="$(jq -r '.project_info.project_id // empty' android/direkt-app/app/google-services.json)"
          test -n "${FIREBASE_API_KEY}"
          test -n "${CONFIG_APP_ID}"
          test "${CONFIG_APP_ID}" = "${FIREBASE_APP_ID}"
          test "${CONFIG_PROJECT_ID}" = "${GCP_PROJECT_ID}"
          echo "::add-mask::${FIREBASE_API_KEY}"
          echo "DIREKT_FIREBASE_API_KEY=${FIREBASE_API_KEY}" >> "${GITHUB_ENV}"
          echo "DIREKT_FIREBASE_APP_ID=${CONFIG_APP_ID}" >> "${GITHUB_ENV}"
          echo "DIREKT_FIREBASE_PROJECT_ID=${CONFIG_PROJECT_ID}" >> "${GITHUB_ENV}"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure pinned Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}

      - name: Build exact synthetic Crashlytics canary APK
        working-directory: android/direkt-app
        shell: bash
        env:
          DIREKT_CRASHLYTICS_BUILD_ENABLED: "true"
          DIREKT_CRASHLYTICS_CANARY_ENABLED: "true"
          DIREKT_CRASHLYTICS_DATA_MODE: synthetic-only
          DIREKT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          trap 'rm -f app/google-services.json' EXIT
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            wrapper_checksum="$(sed -n 's/^distributionSha256Sum=//p' gradle/wrapper/gradle-wrapper.properties)"
            [[ "${wrapper_checksum}" =~ ^[0-9a-f]{64}$ ]]
            gradle wrapper --gradle-version "${DIREKT_GRADLE_VERSION}" --distribution-type bin --gradle-distribution-sha256-sum "${wrapper_checksum}"
          fi
          chmod +x gradlew
          ./gradlew --no-daemon --no-configuration-cache testDebugUnitTest lintDebug assembleDebug
          APK_PATH="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*-debug.apk' | head -n 1)"
          test -n "${APK_PATH}"
          test -s "${APK_PATH}"
          echo "APK_PATH=${PWD}/${APK_PATH}" >> "${GITHUB_ENV}"
          echo "APK_SHA256=$(sha256sum "${APK_PATH}" | awk '{print $1}')" >> "${GITHUB_ENV}"

      - name: Verify temporary Firebase config was removed
        shell: bash
        run: |
          set -euo pipefail
          test ! -e android/direkt-app/app/google-services.json

      - name: Provision headless Android emulator
        shell: bash
        env:
          ANDROID_AVD_HOME: ${{ runner.temp }}/direkt-rc3-avd
        run: bash scripts/vc8/provision-android-emulator.sh

      - name: Install exact canary APK
        shell: bash
        run: |
          set -euo pipefail
          adb_bin="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}/platform-tools/adb"
          test -x "${adb_bin}"
          "${adb_bin}" install -r "${APK_PATH}"
          "${adb_bin}" shell pm path "${FIREBASE_PACKAGE_NAME}" >/dev/null
          echo "ADB_BIN=${adb_bin}" >> "${GITHUB_ENV}"

      - name: Prove fatal crash delivery
        shell: bash
        run: |
          set -euo pipefail
          component="${FIREBASE_PACKAGE_NAME}/com.kudzimusar.direkt.MainActivity"
          "${ADB_BIN}" shell setprop log.tag.FirebaseCrashlytics DEBUG
          "${ADB_BIN}" logcat -c
          "${ADB_BIN}" shell am force-stop "${FIREBASE_PACKAGE_NAME}" || true
          "${ADB_BIN}" shell am start -n "${component}" --es direkt_rc3_crashlytics_canary crash >/dev/null 2>&1 || true
          for _ in $(seq 1 20); do
            if ! "${ADB_BIN}" shell pidof "${FIREBASE_PACKAGE_NAME}" >/dev/null 2>&1; then break; fi
            sleep 1
          done
          ! "${ADB_BIN}" shell pidof "${FIREBASE_PACKAGE_NAME}" >/dev/null 2>&1
          "${ADB_BIN}" shell am start -n "${component}" --es direkt_rc3_crashlytics_canary flush >/dev/null
          delivered=false
          for _ in $(seq 1 60); do
            "${ADB_BIN}" logcat -d -s FirebaseCrashlytics > "${RUNNER_TEMP}/rc3-crash-upload.log" || true
            if grep -Eqi 'Crashlytics report successfully enqueued to DataTransport|Crashlytics report upload complete|[[:space:]]204[[:space:]]' "${RUNNER_TEMP}/rc3-crash-upload.log"; then delivered=true; break; fi
            sleep 2
          done
          test "${delivered}" = "true"
          grep -Ei 'Crashlytics report successfully enqueued to DataTransport|Crashlytics report upload complete|[[:space:]]204[[:space:]]' "${RUNNER_TEMP}/rc3-crash-upload.log" | tail -n 10

      - name: Prove ANR signal and Crashlytics delivery
        shell: bash
        run: |
          set -euo pipefail
          component="${FIREBASE_PACKAGE_NAME}/com.kudzimusar.direkt.MainActivity"
          "${ADB_BIN}" logcat -c
          "${ADB_BIN}" shell am force-stop "${FIREBASE_PACKAGE_NAME}" || true
          "${ADB_BIN}" shell am start -n "${component}" --es direkt_rc3_crashlytics_canary anr >/dev/null 2>&1 &
          anr_seen=false
          for _ in $(seq 1 40); do
            "${ADB_BIN}" logcat -d > "${RUNNER_TEMP}/rc3-anr-system.log" || true
            if grep -Eqi "ANR in ${FIREBASE_PACKAGE_NAME}|ANR.*${FIREBASE_PACKAGE_NAME}" "${RUNNER_TEMP}/rc3-anr-system.log"; then anr_seen=true; break; fi
            sleep 1
          done
          test "${anr_seen}" = "true"
          sleep 5
          "${ADB_BIN}" shell am force-stop "${FIREBASE_PACKAGE_NAME}" || true
          "${ADB_BIN}" logcat -c
          "${ADB_BIN}" shell am start -n "${component}" --es direkt_rc3_crashlytics_canary flush >/dev/null
          delivered=false
          for _ in $(seq 1 60); do
            "${ADB_BIN}" logcat -d -s FirebaseCrashlytics > "${RUNNER_TEMP}/rc3-anr-upload.log" || true
            if grep -Eqi 'Crashlytics report successfully enqueued to DataTransport|Crashlytics report upload complete|[[:space:]]204[[:space:]]' "${RUNNER_TEMP}/rc3-anr-upload.log"; then delivered=true; break; fi
            sleep 2
          done
          test "${delivered}" = "true"
          "${ADB_BIN}" shell am start -n "${component}" --es direkt_rc3_crashlytics_canary disable >/dev/null || true
          grep -Ei "ANR in ${FIREBASE_PACKAGE_NAME}|ANR.*${FIREBASE_PACKAGE_NAME}" "${RUNNER_TEMP}/rc3-anr-system.log" | tail -n 10
          grep -Ei 'Crashlytics report successfully enqueued to DataTransport|Crashlytics report upload complete|[[:space:]]204[[:space:]]' "${RUNNER_TEMP}/rc3-anr-upload.log" | tail -n 10

      - name: Upload sanitized RC3 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-rc3-crashlytics-canary-${{ github.run_number }}-${{ inputs.source_sha }}
          path: |
            ${{ runner.temp }}/rc3-crash-upload.log
            ${{ runner.temp }}/rc3-anr-system.log
            ${{ runner.temp }}/rc3-anr-upload.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish sanitized RC3 summary
        if: success()
        shell: bash
        run: |
          {
            echo "### DIREKT RC3 Crashlytics synthetic canary"
            echo "- Source: \`${SOURCE_SHA}\`"
            echo "- Package: \`${FIREBASE_PACKAGE_NAME}\`"
            echo "- Data mode: \`synthetic-only\`"
            echo "- Fatal crash OS termination: \`PASS\`"
            echo "- Fatal crash Crashlytics/DataTransport delivery: \`PASS\`"
            echo "- Android ANR signal: \`PASS\`"
            echo "- Post-ANR Crashlytics/DataTransport delivery: \`PASS\`"
            echo "- Automatic collection default: \`disabled\`"
            echo "- Analytics SDK: \`not added\`"
            # Permanent integration contract marker: Real participant telemetry: `disabled`
            echo "- Real participant telemetry: \`disabled\`"
            echo "- Public/production release: \`not authorized\`"
            echo "- APK SHA-256: \`${APK_SHA256}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
