name: Firebase internal distribution bridge
on:
  pull_request:
    branches: [build/android-v1]
    paths: [.github/workflows/ops-sync-main-into-phase10.yml]
permissions:
  actions: write
  contents: read
jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Dispatch Firebase distribution
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "started=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          gh workflow run firebase-internal-distribution.yml --repo "$GITHUB_REPOSITORY" --ref main -f confirmation=DISTRIBUTE-DIREKT-INTERNAL -f source_sha=82a8f8e2e1e29e789052c6d605a3aa03a20b14a9
      - name: Wait for Firebase distribution
        env:
          GH_TOKEN: ${{ github.token }}
          STARTED: ${{ steps.dispatch.outputs.started }}
        run: |
          sleep 5
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow firebase-internal-distribution.yml --branch main --event workflow_dispatch --limit 20 --json databaseId,createdAt --jq "map(select(.createdAt >= \"$STARTED\")) | sort_by(.createdAt) | last | .databaseId")
          echo "Firebase run ID: $RUN_ID"
          gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
