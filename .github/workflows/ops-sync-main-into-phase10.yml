name: Phase 10 staging diagnostic
on:
  pull_request:
    branches: [build/android-v1]
    paths: [.github/workflows/ops-sync-main-into-phase10.yml]
permissions:
  actions: read
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 29627582756 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 80
