name: Restore final error
on:
  pull_request:
    branches: [build/android-v1]
    paths: [.github/workflows/ops-sync-main-into-phase10.yml]
permissions:
  actions: read
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 29628637442 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 12
