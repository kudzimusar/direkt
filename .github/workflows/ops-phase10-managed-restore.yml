name: Phase 10 managed restore bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-managed-restore.yml

permissions:
  actions: write
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Dispatch managed restore
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "started=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          gh workflow run phase10-managed-supabase-restore.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f confirmation=RESTORE-DIREKT-MANAGED \
            -f source_sha=c52b83deab1c5d49a47f9bc98b90e32d972d721b

      - name: Require managed restore success
        env:
          GH_TOKEN: ${{ github.token }}
          STARTED: ${{ steps.dispatch.outputs.started }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow phase10-managed-supabase-restore.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$STARTED\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$RUN_ID" && break
            sleep 5
          done
          test -n "$RUN_ID"
          echo "Managed restore run ID: $RUN_ID"
          gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
