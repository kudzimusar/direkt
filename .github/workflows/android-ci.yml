name: DIREKT Android CI
# Phase 7 final exact-head validation anchor v2.

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PROJECT_DIR: android/direkt-app
  DIREKT_GRADLE_VERSION: "9.4.0"

jobs:
  preflight:
    name: Android project preflight
    runs-on: ubuntu-latest
    outputs:
      project_ready: ${{ steps.detect.outputs.project_ready }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect Android project
        id: detect
        shell: bash
        run: |
          if [[ -f "${ANDROID_PROJECT_DIR}/gradlew" ]] && \
             [[ -f "${ANDROID_PROJECT_DIR}/settings.gradle.kts" ]]; then
            echo "project_ready=true" >> "$GITHUB_OUTPUT"
            echo "### Android CI preflight" >> "$GITHUB_STEP_SUMMARY"
            echo "Native Android project detected at \`${ANDROID_PROJECT_DIR}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "project_ready=false" >> "$GITHUB_OUTPUT"
            echo "### Android CI preflight" >> "$GITHUB_STEP_SUMMARY"
            echo "The native Android project is incomplete at \`${ANDROID_PROJECT_DIR}\`." >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    name: Test, lint and assemble debug APK
    needs: preflight
    if: needs.preflight.outputs.project_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: android/direkt-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure pinned Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}

      - name: Bootstrap standard Gradle wrapper JAR
        shell: bash
        run: |
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew --version

      - name: Verify Android identity and safety boundaries
        shell: bash
        run: |
          grep -F 'namespace = "com.kudzimusar.direkt"' app/build.gradle.kts
          grep -F 'applicationId = "com.kudzimusar.direkt"' app/build.gradle.kts
          grep -F 'applicationIdSuffix = ".debug"' app/build.gradle.kts
          test ! -f app/google-services.json
          test ! -f google-services.json

      - name: Run unit tests, Android lint and debug builds
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-android-reports-${{ github.run_number }}
          path: |
            android/direkt-app/**/build/reports/**
            android/direkt-app/**/build/test-results/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: direkt-debug-apk-${{ github.run_number }}-${{ github.sha }}
          path: android/direkt-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Compose test APK
        uses: actions/upload-artifact@v4
        with:
          name: direkt-compose-test-apk-${{ github.run_number }}-${{ github.sha }}
          path: android/direkt-app/app/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish build summary
        shell: bash
        run: |
          echo "### DIREKT Android build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Application ID: \`com.kudzimusar.direkt.debug\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Toolchain: Gradle ${DIREKT_GRADLE_VERSION}, AGP 9.0.0, Kotlin 2.3.0, API 36" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: unit tests, lint, debug APK and Compose test APK assembled" >> "$GITHUB_STEP_SUMMARY"
          echo "- Distribution: download the \`direkt-debug-apk-*\` artifact from this workflow run" >> "$GITHUB_STEP_SUMMARY"

  incomplete-scaffold:
    name: Android project scaffold incomplete
    needs: preflight
    if: needs.preflight.outputs.project_ready != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Fail with actionable guidance
        run: |
          echo "The required Android Gradle launcher or settings file is missing." >&2
          exit 1
