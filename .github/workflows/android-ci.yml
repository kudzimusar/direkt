name: DIREKT Android CI
# Phase 7 final exact-head validation anchor v3; VC8 synthetic visual evidence included.

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "android/direkt-app/**"
      - "scripts/vc8/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/**"
      - "scripts/vc8/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PROJECT_DIR: android/direkt-app
  DIREKT_GRADLE_VERSION: "9.4.0"
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  preflight:
    name: Android project preflight
    runs-on: ubuntu-latest
    outputs:
      project_ready: ${{ steps.detect.outputs.project_ready }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Detect Android project
        id: detect
        shell: bash
        run: |
          if [[ -f "${ANDROID_PROJECT_DIR}/gradlew" ]] && \
             [[ -f "${ANDROID_PROJECT_DIR}/settings.gradle.kts" ]]; then
            echo "project_ready=true" >> "$GITHUB_OUTPUT"
            echo "### Android CI preflight" >> "$GITHUB_STEP_SUMMARY"
            echo "Native Android project detected at \`${ANDROID_PROJECT_DIR}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "project_ready=false" >> "$GITHUB_OUTPUT"
            echo "### Android CI preflight" >> "$GITHUB_STEP_SUMMARY"
            echo "The native Android project is incomplete at \`${ANDROID_PROJECT_DIR}\`." >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    name: Test, lint, assemble and capture synthetic native evidence
    needs: preflight
    if: needs.preflight.outputs.project_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    defaults:
      run:
        working-directory: android/direkt-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
      - name: Verify exact checkout
        working-directory: .
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Configure pinned Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}
      - name: Bootstrap standard Gradle wrapper JAR
        shell: bash
        run: |
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew --version
      - name: Verify Android identity and safety boundaries
        shell: bash
        run: |
          grep -F 'namespace = "com.kudzimusar.direkt"' app/build.gradle.kts
          grep -F 'applicationId = "com.kudzimusar.direkt"' app/build.gradle.kts
          grep -F 'applicationIdSuffix = ".debug"' app/build.gradle.kts
          test ! -f app/google-services.json
          test ! -f google-services.json
      - name: Run unit tests, Android lint and debug builds
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest \
            2>&1 | tee "${RUNNER_TEMP}/direkt-android-build.log"
      - name: Upload Android build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-android-build-log-${{ github.run_number }}
          path: ${{ runner.temp }}/direkt-android-build.log
          if-no-files-found: warn
          retention-days: 14
      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-android-reports-${{ github.run_number }}
          path: |
            android/direkt-app/**/build/reports/**
            android/direkt-app/**/build/test-results/**
          if-no-files-found: warn
          retention-days: 14
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: direkt-debug-apk-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: android/direkt-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload Compose test APK
        uses: actions/upload-artifact@v4
        with:
          name: direkt-compose-test-apk-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: android/direkt-app/app/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Provision headless Android emulator for VC8 evidence and instrumentation
        working-directory: .
        shell: bash
        run: bash scripts/vc8/provision-android-emulator.sh
      - name: Execute current Android instrumentation smoke test
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          adb_bin="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}/platform-tools/adb"
          test -x "${adb_bin}"
          app_apk="$(find android/direkt-app/app/build/outputs/apk/debug -maxdepth 1 -type f -name '*-debug.apk' | head -n 1)"
          test_apk="$(find android/direkt-app/app/build/outputs/apk/androidTest/debug -maxdepth 1 -type f -name '*-debug-androidTest.apk' | head -n 1)"
          test -n "${app_apk}"
          test -s "${app_apk}"
          test -n "${test_apk}"
          test -s "${test_apk}"
          "${adb_bin}" install -r "${app_apk}"
          "${adb_bin}" install -r "${test_apk}"
          "${adb_bin}" shell am force-stop com.kudzimusar.direkt.debug || true
          "${adb_bin}" shell am instrument -w -r \
            -e class com.kudzimusar.direkt.DirektAppSmokeTest \
            com.kudzimusar.direkt.debug.test/androidx.test.runner.AndroidJUnitRunner \
            | tee "${RUNNER_TEMP}/direkt-android-instrumentation.log"
          grep -Fq 'OK (1 test)' "${RUNNER_TEMP}/direkt-android-instrumentation.log"
          if grep -Eq 'FAILURES!!!|INSTRUMENTATION_FAILED|Process crashed' "${RUNNER_TEMP}/direkt-android-instrumentation.log"; then
            echo "Instrumentation smoke test reported a failure marker." >&2
            exit 1
          fi
      - name: Upload Android instrumentation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-android-instrumentation-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/direkt-android-instrumentation.log
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Android emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-vc8-emulator-diagnostics-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: |
            ${{ runner.temp }}/vc8-provision.log
            ${{ runner.temp }}/vc8-emulator.log
            ${{ runner.temp }}/vc8-emulator.pid
          if-no-files-found: warn
          retention-days: 14
      - name: Capture native customer and provider synthetic evidence
        working-directory: .
        shell: bash
        env:
          VC8_ANDROID_EVIDENCE_DIR: visual-evidence/android
        run: bash scripts/vc8/capture-android-evidence.sh
      - name: Upload Android capture diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-vc8-android-capture-diagnostics-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/vc8-android-capture/**
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Android visual evidence
        uses: actions/upload-artifact@v4
        with:
          name: direkt-vc8-android-visual-evidence-${{ env.SOURCE_SHA }}
          path: visual-evidence/android/**
          if-no-files-found: error
          retention-days: 30
      - name: Publish build summary
        shell: bash
        run: |
          echo "### DIREKT Android build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${SOURCE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Application ID: \`com.kudzimusar.direkt.debug\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Instrumentation: \`DirektAppSmokeTest\` executed on the managed local emulator" >> "$GITHUB_STEP_SUMMARY"
          echo "- Toolchain: Gradle ${DIREKT_GRADLE_VERSION}, AGP 9.0.0, Kotlin 2.3.0, API 36" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: unit tests, lint, debug APK, Compose test APK, instrumentation smoke and synthetic native screenshots completed" >> "$GITHUB_STEP_SUMMARY"

  incomplete-scaffold:
    name: Android project scaffold incomplete
    needs: preflight
    if: needs.preflight.outputs.project_ready != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Fail with actionable guidance
        run: |
          echo "The required Android Gradle launcher or settings file is missing." >&2
          exit 1
