name: Phase 6 backend formatter

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase6-format.yml"

permissions:
  contents: write

concurrency:
  group: phase6-backend-formatter
  cancel-in-progress: false

jobs:
  format:
    if: contains(github.event.head_commit.message, 'activate Phase 6 backend formatter')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Phase 6 branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Install and format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format

      - name: Commit formatted source and remove helper
        shell: bash
        run: |
          rm .github/workflows/phase6-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Phase 6 provider workspace"
          git push origin HEAD:build/android-v1
