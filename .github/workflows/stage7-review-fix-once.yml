name: Stage 7 review behavior fix once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7-review-fix-once.yml"

permissions:
  contents: write

concurrency:
  group: stage7-review-behavior-fix
  cancel-in-progress: false

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'activate Stage 7 review behavior fix final')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Patch HTTP status and expiry commit boundary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          controller = Path('backend/direkt-api/src/verification-evidence/verification-evidence.controller.ts')
          controller_text = controller.read_text()
          old_import = "import { Body, Controller, Get, Param, ParseUUIDPipe, Post, Query, Req } from '@nestjs/common';"
          new_import = "import { Body, Controller, Get, HttpCode, HttpStatus, Param, ParseUUIDPipe, Post, Query, Req } from '@nestjs/common';"
          if old_import in controller_text:
              controller_text = controller_text.replace(old_import, new_import, 1)
          elif 'HttpCode' not in controller_text or 'HttpStatus' not in controller_text:
              raise SystemExit('verification controller import is not patchable')

          route_marker = '  @RequirePermission(PERMISSIONS.OPERATIONS_EVIDENCE_ACCESS_REVOKE)\n  @ApiOkResponse({'
          patched_marker = '  @RequirePermission(PERMISSIONS.OPERATIONS_EVIDENCE_ACCESS_REVOKE)\n  @HttpCode(HttpStatus.OK)\n  @ApiOkResponse({'
          if route_marker in controller_text:
              controller_text = controller_text.replace(route_marker, patched_marker, 1)
          elif patched_marker not in controller_text:
              raise SystemExit('evidence access revoke route is not patchable')
          controller.write_text(controller_text)

          repository = Path('backend/direkt-api/src/verification-evidence/evidence-review.repository.ts')
          repository_text = repository.read_text()
          start = repository_text.index('  async resolveAccessGrant(input: {')
          end = repository_text.index('  async revokeAccessGrant(input: {', start)
          replacement = dedent('''
            async resolveAccessGrant(input: {
              actor: AuthenticatedActor;
              grantId: string;
              requestId?: string | undefined;
            }): Promise<EvidenceGrantRow> {
              const grant = await this.database.transaction(async (client) => {
                await client.query(
                  `UPDATE operations.evidence_access_grants
                   SET status = 'expired',
                       ended_at = now(),
                       end_reason = 'Evidence access authorization expired before redemption'
                   WHERE id = $1
                     AND grantee_identity_id = $2
                     AND status = 'active'
                     AND expires_at <= now()`,
                  [input.grantId, input.actor.identityId],
                );

                const result = await client.query<EvidenceGrantRow>(
                  `SELECT
                     grants.id AS grant_id,
                     grants.evidence_id,
                     cases.provider_id,
                     grants.assignment_id,
                     grants.evidence_version_id,
                     versions.object_key,
                     grants.expires_at
                   FROM operations.evidence_access_grants AS grants
                   JOIN verification.assignments AS assignments
                     ON assignments.id = grants.assignment_id
                    AND assignments.case_id = grants.case_id
                    AND assignments.assignee_identity_id = grants.grantee_identity_id
                    AND assignments.assignment_kind IN ('reviewer', 'supervisor')
                    AND assignments.status = 'active'
                   JOIN verification.cases AS cases
                     ON cases.id = grants.case_id
                    AND cases.status IN ('assigned', 'in_review')
                   JOIN verification.case_evidence AS links
                     ON links.case_id = grants.case_id
                    AND links.evidence_id = grants.evidence_id
                   JOIN evidence.items AS items
                     ON items.id = grants.evidence_id
                    AND items.current_version_id = grants.evidence_version_id
                    AND items.status IN ('ready_for_review', 'approved')
                   JOIN evidence.versions AS versions ON versions.id = grants.evidence_version_id
                   WHERE grants.id = $1
                     AND grants.grantee_identity_id = $2
                     AND grants.status = 'active'
                     AND grants.expires_at > now()
                   FOR UPDATE OF grants`,
                  [input.grantId, input.actor.identityId],
                );
                const resolvedGrant = result.rows[0] ?? null;
                if (resolvedGrant) {
                  await this.insertAudit(client, {
                    actor: input.actor,
                    providerId: resolvedGrant.provider_id,
                    requestId: input.requestId,
                    action: 'private_evidence_access_redeemed',
                    resourceType: 'evidence_access_grant',
                    resourceId: resolvedGrant.grant_id,
                    metadata: {
                      evidenceId: resolvedGrant.evidence_id,
                      evidenceVersionId: resolvedGrant.evidence_version_id,
                      assignmentId: resolvedGrant.assignment_id,
                      accessUrlStored: false,
                      objectKeyStored: false,
                      evidenceBytesLogged: false,
                    },
                  });
                }
                return resolvedGrant;
              });

              if (!grant) {
                throw new NotFoundException('Private evidence authorization is no longer active.');
              }
              return grant;
            }

          ''')
          repository.write_text(repository_text[:start] + replacement + repository_text[end:])
          PY
      - name: Normalize patched backend files
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit behavior corrections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/src/verification-evidence/evidence-review.repository.ts backend/direkt-api/src/verification-evidence/verification-evidence.controller.ts
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Behavior corrections already present."
            exit 0
          fi
          git commit -m "fix: commit expired review grants before rejection"
          git push origin HEAD:build/android-v1
