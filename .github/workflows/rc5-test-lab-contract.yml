name: DIREKT RC5 Firebase Test Lab contract

on:
  push:
    branches:
      - main
      - integration/rc5-firebase-test-lab
    paths:
      - "android/direkt-app/app/src/androidTest/**"
      - ".github/workflows/android-ci.yml"
      - ".github/workflows/firebase-test-lab.yml"
      - ".github/workflows/rc5-test-lab-contract.yml"
      - "scripts/rc5/**"
      - "docs/integrations/RC5_FIREBASE_TEST_LAB_IMPLEMENTATION_NOTES.md"
      - "docs/integrations/CURRENT_INTEGRATION_STATUS.md"
      - "docs/integrations/LIVE_INTEGRATION_LEDGER.md"
      - "WORKSTREAM_LOCK.md"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/app/src/androidTest/**"
      - ".github/workflows/android-ci.yml"
      - ".github/workflows/firebase-test-lab.yml"
      - ".github/workflows/rc5-test-lab-contract.yml"
      - "scripts/rc5/**"
      - "docs/integrations/RC5_FIREBASE_TEST_LAB_IMPLEMENTATION_NOTES.md"
      - "docs/integrations/CURRENT_INTEGRATION_STATUS.md"
      - "docs/integrations/LIVE_INTEGRATION_LEDGER.md"
      - "WORKSTREAM_LOCK.md"

permissions:
  contents: read

jobs:
  verify:
    name: Verify RC5 Test Lab source and safety contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify bootstrap shell syntax
        shell: bash
        run: |
          bash -n scripts/rc5/bootstrap-test-lab.sh
          bash -n scripts/rc5/verify-no-project-storage-roles.sh
      - name: Verify Python syntax and selector self-test
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/rc5/select-test-lab-matrix.py scripts/rc5/verify-test-lab-contract.py
          python scripts/rc5/select-test-lab-matrix.py --self-test
      - name: Verify permanent RC5 contract
        shell: bash
        run: |
          set -o pipefail
          python scripts/rc5/verify-test-lab-contract.py 2>&1 | tee "${RUNNER_TEMP}/rc5-test-lab-contract.log"
      - name: Upload RC5 contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc5-test-lab-contract-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/rc5-test-lab-contract.log
          if-no-files-found: warn
          retention-days: 14

  reconcile-project-storage-boundary:
    name: Reconcile project-scoped Storage prohibition once
    if: (github.event_name == 'push' && github.ref == 'refs/heads/integration/rc5-firebase-test-lab') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'integration/rc5-firebase-test-lab')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc5-firebase-test-lab
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply deterministic permanent patch
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/rc5/reconcile-project-storage-boundary.py
          python scripts/rc5/reconcile-project-storage-boundary.py 2>&1 | tee "${RUNNER_TEMP}/rc5-storage-reconcile.log"
          bash -n scripts/rc5/bootstrap-test-lab.sh
          bash -n scripts/rc5/verify-no-project-storage-roles.sh
          python -m py_compile scripts/rc5/verify-test-lab-contract.py
          python scripts/rc5/verify-test-lab-contract.py
          git diff --check
          git config user.name "direkt-rc5-storage-boundary"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/firebase-test-lab.yml scripts/rc5/bootstrap-test-lab.sh scripts/rc5/verify-test-lab-contract.py docs/integrations/RC5_FIREBASE_TEST_LAB_IMPLEMENTATION_NOTES.md
          if git diff --cached --quiet; then
            echo "Project-scoped Storage prohibition already reconciled."
            exit 0
          fi
          git commit -m "fix(rc5): reject all project-scoped Storage roles"
          git push origin HEAD:integration/rc5-firebase-test-lab
      - name: Upload reconciliation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc5-storage-reconcile-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/rc5-storage-reconcile.log
          if-no-files-found: warn
          retention-days: 7
