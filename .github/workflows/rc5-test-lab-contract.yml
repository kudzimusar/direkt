name: DIREKT RC5 Firebase Test Lab contract

on:
  push:
    branches:
      - main
      - integration/rc5-firebase-test-lab
    paths:
      - "android/direkt-app/app/src/androidTest/**"
      - ".github/workflows/android-ci.yml"
      - ".github/workflows/firebase-test-lab.yml"
      - ".github/workflows/rc5-test-lab-contract.yml"
      - "scripts/rc5/**"
      - "docs/integrations/RC5_FIREBASE_TEST_LAB_IMPLEMENTATION_NOTES.md"
      - "docs/integrations/CURRENT_INTEGRATION_STATUS.md"
      - "docs/integrations/LIVE_INTEGRATION_LEDGER.md"
      - "WORKSTREAM_LOCK.md"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/app/src/androidTest/**"
      - ".github/workflows/android-ci.yml"
      - ".github/workflows/firebase-test-lab.yml"
      - ".github/workflows/rc5-test-lab-contract.yml"
      - "scripts/rc5/**"
      - "docs/integrations/RC5_FIREBASE_TEST_LAB_IMPLEMENTATION_NOTES.md"
      - "docs/integrations/CURRENT_INTEGRATION_STATUS.md"
      - "docs/integrations/LIVE_INTEGRATION_LEDGER.md"
      - "WORKSTREAM_LOCK.md"

jobs:
  verify:
    name: Verify RC5 Test Lab source and safety contract
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify bootstrap shell syntax
        shell: bash
        run: bash -n scripts/rc5/bootstrap-test-lab.sh
      - name: Verify Python syntax and selector self-test
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/rc5/select-test-lab-matrix.py scripts/rc5/verify-test-lab-contract.py
          python scripts/rc5/select-test-lab-matrix.py --self-test
      - name: Verify permanent RC5 contract
        shell: bash
        run: python scripts/rc5/verify-test-lab-contract.py

  reconcile-source-status:
    name: Reconcile RC5 source-phase status once
    if: (github.event_name == 'push' && github.ref == 'refs/heads/integration/rc5-firebase-test-lab') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'integration/rc5-firebase-test-lab')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc5-firebase-test-lab
          fetch-depth: 0
          show-progress: false
      - name: Reconcile authoritative RC5 source-phase status
        shell: bash
        run: |
          set -euo pipefail
          python scripts/rc5/reconcile-source-status.py
          git diff --check
          if git diff --quiet -- docs/integrations/CURRENT_INTEGRATION_STATUS.md docs/integrations/LIVE_INTEGRATION_LEDGER.md; then
            echo 'RC5 source-phase status already reconciled.'
            exit 0
          fi
          git config user.name "direkt-rc5-status"
          git config user.email "actions@users.noreply.github.com"
          git add docs/integrations/CURRENT_INTEGRATION_STATUS.md docs/integrations/LIVE_INTEGRATION_LEDGER.md
          git commit -m "docs(rc5): reconcile Test Lab source phase"
          git push origin HEAD:integration/rc5-firebase-test-lab
