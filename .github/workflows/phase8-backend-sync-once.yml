name: Phase 8 backend sync once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/phase8-backend-bundle.tgz"
      - ".github/workflows/phase8-backend-sync-once.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name == 'push' && github.ref_name == 'build/android-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply reviewed source bundle
        shell: bash
        run: |
          tar -xzf .github/phase8-backend-bundle.tgz
          rm .github/phase8-backend-bundle.tgz
          rm .github/workflows/phase8-backend-sync-once.yml
      - name: Validate application source before commit
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run lint
          npm run typecheck
          npm run build
          npm run openapi:check
      - name: Commit permanent Phase 8 backend source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "feat: complete Phase 8 interaction review backend"
          git push origin HEAD:build/android-v1
