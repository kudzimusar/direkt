name: Phase 8 backend sync once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/phase8-backend-bundle.tgz"
      - ".github/phase8-interaction-handoff.service.ts"
      - ".github/phase8-permissions.ts"
      - ".github/phase8-complaint.controller.ts"
      - ".github/phase8-complaint.service.ts"
      - ".github/workflows/phase8-backend-sync-once.yml"

permissions:
  contents: write

concurrency:
  group: phase8-backend-product-sync
  cancel-in-progress: false

jobs:
  sync:
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'build/android-v1' &&
      contains(github.event.head_commit.message, 'activate final Phase 8 backend recovery')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply reviewed Phase 8 backend source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          bundle = Path('.github/phase8-backend-bundle.tgz')
          with tarfile.open(bundle, 'r:gz') as archive:
              archive.extractall('.', filter='data')
          PY
          cp .github/phase8-interaction-handoff.service.ts backend/direkt-api/src/interaction/interaction-handoff.service.ts
          cp .github/phase8-permissions.ts backend/direkt-api/src/authorization/permissions.ts
          cp .github/phase8-complaint.controller.ts backend/direkt-api/src/interaction/complaint.controller.ts
          cp .github/phase8-complaint.service.ts backend/direkt-api/src/interaction/complaint.service.ts
          python - <<'PY'
          from pathlib import Path

          deferred = Path('backend/direkt-api/src/provider-workspace/provider-workspace-deferred.controller.ts')
          text = deferred.read_text().replace('PROVIDET_PROFILE_READ', 'PROVIDER_PROFILE_READ')
          deferred.write_text(text)

          checker = Path('backend/direkt-api/scripts/check-openapi.ts')
          text = checker.read_text()
          text = text.replace('    ["/api/v1/provider-workspace/me/review-responses", "get"],\n', '')
          text = text.replace(
              '  const deferredReadOnlyPaths = new Set([\n    "/api/v1/provider-workspace/me/enquiries",\n    "/api/v1/provider-workspace/me/review-responses",\n    "/api/v1/provider-workspace/me/subscription-status",\n  ]);',
              '  const deferredReadOnlyPaths = new Set([\n    "/api/v1/provider-workspace/me/subscription-status",\n  ]);',
          )
          text = text.replace(
              '      /(payments|invoices|entitlements|webhooks|public-directory|discoverable)/i.test(',
              '      /(payments|invoices|entitlements|webhooks|public-directory|discoverable|chat|attachments|voice-calls|video-calls)/i.test(',
          )
          text = text.replace('`Phase 6 exposed prohibited domain paths:', '`Phase 8 exposed prohibited domain paths:')
          text = text.replace(
              '{ event: "openapi_check_passed", pathCount: Object.keys(paths).length, phase: 6 }',
              '{ event: "openapi_check_passed", pathCount: Object.keys(paths).length, phase: 8 }',
          )
          anchor = '    ["/api/v1/provider-workspace/me/enquiries", "get"],\n'
          operations = '''    ["/api/v1/provider-workspace/me/enquiries", "get"],
    ["/api/v1/enquiries", "post"],
    ["/api/v1/enquiries", "get"],
    ["/api/v1/enquiries/{enquiryId}", "get"],
    ["/api/v1/enquiries/{enquiryId}/cancel", "post"],
    ["/api/v1/provider-workspace/me/enquiries/{enquiryId}", "get"],
    ["/api/v1/provider-workspace/me/enquiries/{enquiryId}/transitions", "post"],
    ["/api/v1/enquiries/{enquiryId}/handoffs", "post"],
    ["/api/v1/enquiries/{enquiryId}/handoffs", "get"],
    ["/api/v1/enquiries/{enquiryId}/handoffs/{handoffId}/revoke", "post"],
    ["/api/v1/interactions", "get"],
    ["/api/v1/interactions/{interactionId}", "get"],
    ["/api/v1/interactions/{interactionId}/review-eligibility", "get"],
    ["/api/v1/provider-workspace/me/interactions", "get"],
    ["/api/v1/provider-workspace/me/enquiries/{enquiryId}/handoff", "get"],
    ["/api/v1/interactions/{interactionId}/reviews", "post"],
    ["/api/v1/reviews", "get"],
    ["/api/v1/reviews/{reviewId}", "get"],
    ["/api/v1/reviews/{reviewId}/appeals", "post"],
    ["/api/v1/reviews/{reviewId}/reports", "post"],
    ["/api/v1/provider-workspace/me/reviews", "get"],
    ["/api/v1/provider-workspace/me/reviews/{reviewId}/response", "post"],
    ["/api/v1/provider-workspace/me/reviews/{reviewId}/appeals", "post"],
    ["/api/v1/operations/reviews", "get"],
    ["/api/v1/operations/reviews/{reviewId}/moderation", "post"],
    ["/api/v1/operations/review-appeals/{appealId}/decisions", "post"],
    ["/api/v1/public/providers/{publicProviderId}/reviews", "get"],
    ["/api/v1/interactions/{interactionId}/complaints", "post"],
    ["/api/v1/complaints", "get"],
    ["/api/v1/complaints/{complaintId}", "get"],
    ["/api/v1/operations/interaction-complaints", "get"],
    ["/api/v1/operations/interaction-complaints/{complaintId}/transitions", "post"],
'''
          if anchor not in text:
              raise SystemExit('OpenAPI insertion anchor missing')
          text = text.replace(anchor, operations)
          public_anchor = '    "GET /api/v1/public/providers/{publicProviderId}/share",\n'
          if public_anchor not in text:
              raise SystemExit('Public OpenAPI anchor missing')
          text = text.replace(
              public_anchor,
              public_anchor + '    "GET /api/v1/public/providers/{publicProviderId}/reviews",\n',
          )
          checker.write_text(text)
          PY
          rm .github/phase8-backend-bundle.tgz
      - name: Validate reviewed application source
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run lint
          npm run typecheck
          npm run build
          npm run openapi:check
      - name: Commit permanent Phase 8 backend source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend database .github/phase8-backend-bundle.tgz
          git diff --cached --check
          git commit -m "feat: complete Phase 8 interaction review backend"
          git push origin HEAD:build/android-v1
