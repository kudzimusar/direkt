name: DIREKT RC2 one-shot Sentry canary dispatcher

on:
  push:
    branches:
      - main
    paths:
      - "docs/integrations/RC2_SENTRY_CANARY_AUTHORIZATION.md"

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: direkt-rc2-sentry-one-shot-dispatch
  cancel-in-progress: false

jobs:
  dispatch-and-watch:
    name: Dispatch and verify managed RC2 Sentry canary
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SOURCE_SHA: ${{ github.sha }}
      CANARY_WORKFLOW: cloud-run-sentry-canary.yml
      ISSUE_NUMBER: "261"

    steps:
      - name: Check out exact main source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate one-shot authorization marker
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          grep -Fq 'RUN-DIREKT-SENTRY-CANARY' docs/integrations/RC2_SENTRY_CANARY_AUTHORIZATION.md
          grep -Fq 'synthetic-only managed canary' docs/integrations/RC2_SENTRY_CANARY_AUTHORIZATION.md

      - name: Dispatch exact-source managed Sentry canary
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail

          previous_id="$(gh run list \
            --repo "${REPO}" \
            --workflow "${CANARY_WORKFLOW}" \
            --branch main \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')"

          gh workflow run "${CANARY_WORKFLOW}" \
            --repo "${REPO}" \
            --ref main \
            -f confirmation=RUN-DIREKT-SENTRY-CANARY \
            -f source_sha="${SOURCE_SHA}"

          run_id=""
          for attempt in $(seq 1 30); do
            runs_json="$(gh run list \
              --repo "${REPO}" \
              --workflow "${CANARY_WORKFLOW}" \
              --branch main \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId,headSha)"
            run_id="$(jq -r \
              --arg sha "${SOURCE_SHA}" \
              --argjson previous "${previous_id}" \
              '[.[] | select(.headSha == $sha and .databaseId != $previous)][0].databaseId // empty' \
              <<< "${runs_json}")"
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 2
          done

          if [[ -z "${run_id}" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "RC2 one-shot dispatcher could not resolve the managed Sentry canary run for exact source \`${SOURCE_SHA}\`. No RC2 ACTIVE claim was made."
            exit 1
          fi

          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "Managed Sentry canary run: ${run_id}"

      - name: Record managed canary start
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.dispatch.outputs.run_id }}"
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPO}" \
            --body "RC2 managed Sentry canary dispatched for exact merged source \`${SOURCE_SHA}\`. Run: \`${run_id}\`. Boundary remains synthetic-only; no real participant or production telemetry is authorized."

      - name: Wait for managed canary result
        id: watch
        shell: bash
        run: |
          set +e
          run_id="${{ steps.dispatch.outputs.run_id }}"
          gh run watch "${run_id}" --repo "${REPO}" --exit-status
          status=$?
          set -e
          echo "watch_status=${status}" >> "${GITHUB_OUTPUT}"

      - name: Publish sanitized managed canary receipt
        if: always() && steps.dispatch.outputs.run_id != ''
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.dispatch.outputs.run_id }}"
          run_json="$(gh run view "${run_id}" --repo "${REPO}" --json status,conclusion,url,headSha)"
          conclusion="$(jq -r '.conclusion // "unknown"' <<< "${run_json}")"
          run_url="$(jq -r '.url' <<< "${run_json}")"
          head_sha="$(jq -r '.headSha' <<< "${run_json}")"

          if [[ "${head_sha}" != "${SOURCE_SHA}" ]]; then
            conclusion="source-mismatch"
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPO}" \
            --body "RC2 managed Sentry canary result for exact source \`${SOURCE_SHA}\`: **${conclusion}**. Run \`${run_id}\`: ${run_url}. This receipt is synthetic-only and does not authorize real participant/production telemetry."

          test "${conclusion}" = "success"

      - name: Enforce successful managed proof
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.watch.outputs.watch_status }}" = "0"
