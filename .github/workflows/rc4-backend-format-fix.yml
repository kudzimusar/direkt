name: DIREKT RC4 one-shot backend formatter

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: direkt-rc4-backend-formatter
  cancel-in-progress: false

jobs:
  format:
    if: github.event.pull_request.head.ref == 'integration/rc4-fcm' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out RC4 head
        uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply canonical backend formatter
        working-directory: backend/direkt-api
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm run format
      - name: Commit formatter-only delta when required
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- backend/direkt-api; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/direkt-api
          git commit -m 'style(rc4): apply final backend formatter'
          git push origin HEAD:integration/rc4-fcm
