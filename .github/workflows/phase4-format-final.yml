name: Phase 4 final format

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/direkt-api/**"
      - "admin/direkt-operations-portal/**"
      - ".github/workflows/phase4-format-final.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase4-final-format
  cancel-in-progress: true

jobs:
  format:
    if: github.event.pull_request.head.ref == 'build/android-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            backend/direkt-api/package-lock.json
            admin/direkt-operations-portal/package-lock.json
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Format operations portal source
        working-directory: admin/direkt-operations-portal
        run: |
          npm ci --ignore-scripts
          npm exec -- prettier --write \
            src \
            test \
            package.json \
            tsconfig.json \
            next.config.ts \
            vitest.config.ts \
            eslint.config.mjs \
            README.md \
            --ignore-unknown
      - name: Commit deterministic formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api admin/direkt-operations-portal
          git commit -m "style: finalize Phase 4 formatting"
          git push origin HEAD:build/android-v1