name: RC4 FCM secret-boundary patch artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/rc4/patch-fcm-secret-version-boundary.py
      - .github/workflows/rc4-fcm-secret-boundary-patcher.yml

permissions:
  contents: read

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/rc4-fcm-secret-version-boundary'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Apply bounded RC4 secret-boundary patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/rc4/patch-fcm-secret-version-boundary.py
          python3 -m py_compile scripts/verify-integration-runtime-contract.py
          grep -Fq 'GCP_FCM_CANARY_SECRET: direkt-fcm-canary-token' .github/workflows/firebase-fcm-canary.yml
          grep -Fq 'FCM_SYNTHETIC_DEVICE_TOKEN=${FCM_TOKEN_SECRET}:${FCM_TOKEN_SECRET_VERSION}' .github/workflows/firebase-fcm-canary.yml
          grep -Fq 'gcloud secrets versions destroy' .github/workflows/firebase-fcm-canary.yml
          ! grep -Fq 'gcloud secrets create' .github/workflows/firebase-fcm-canary.yml
          ! grep -Fq 'gcloud secrets delete' .github/workflows/firebase-fcm-canary.yml

      - name: Package exact patched files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/patched/.github/workflows" "${RUNNER_TEMP}/patched/scripts"
          cp .github/workflows/firebase-fcm-canary.yml "${RUNNER_TEMP}/patched/.github/workflows/"
          cp scripts/verify-integration-runtime-contract.py "${RUNNER_TEMP}/patched/scripts/"

      - name: Upload exact patched files
        uses: actions/upload-artifact@v4
        with:
          name: rc4-fcm-secret-boundary-patch-${{ github.run_id }}
          path: ${{ runner.temp }}/patched
          if-no-files-found: error
          retention-days: 1
