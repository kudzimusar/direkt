name: DIREKT Phase 12A preauthorization release readiness

on:
  push:
    branches:
      - build/android-v1
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/phase12-release-readiness.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/phase12-release-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-phase12a-preauth-release-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PROJECT_DIR: android/direkt-app
  DIREKT_GRADLE_VERSION: "9.4.0"
  DIREKT_RELEASE_SIGNING_ENABLED: "false"
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  release-readiness:
    name: Verify reproducible non-publishable release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android/direkt-app

    steps:
      - name: Check out exact evidence source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}

      - name: Verify exact checkout provenance
        shell: bash
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          test "${CHECKED_OUT_SHA}" = "${SOURCE_SHA}"
          echo "Evidence source: ${CHECKED_OUT_SHA}"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure pinned Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}

      - name: Bootstrap standard Gradle wrapper JAR
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew --version

      - name: Enforce Phase 12A release and signing boundary
        id: contract
        shell: bash
        run: |
          set -euo pipefail

          grep -F 'applicationId = "com.kudzimusar.direkt"' app/build.gradle.kts
          grep -F 'targetSdk = 36' app/build.gradle.kts
          grep -F 'compileSdk = 36' app/build.gradle.kts

          test ! -f app/google-services.json
          test ! -f google-services.json

          if find . -type f \( -name '*.jks' -o -name '*.keystore' -o -name '*.p12' -o -name '*.pfx' \) -print -quit | grep -q .; then
            echo "Signing key material must not exist in the public-repository checkout." >&2
            exit 1
          fi

          for name in \
            DIREKT_UPLOAD_KEYSTORE_PATH \
            DIREKT_UPLOAD_KEYSTORE_PASSWORD \
            DIREKT_UPLOAD_KEY_ALIAS \
            DIREKT_UPLOAD_KEY_PASSWORD; do
            if [[ -n "${!name:-}" ]]; then
              echo "Protected signing input ${name} must not be exposed to the preauthorization workflow." >&2
              exit 1
            fi
          done

          bash scripts/verify-release-contract.sh | tee release-contract.txt

          VERSION_CODE="$(awk -F= '$1 == "release_version_code" { print $2 }' release-contract.txt)"
          VERSION_NAME="$(awk -F= '$1 == "release_version_name" { print $2 }' release-contract.txt)"
          RELEASE_CHANNEL="$(awk -F= '$1 == "release_channel" { print $2 }' release-contract.txt)"

          test -n "${VERSION_CODE}"
          test -n "${VERSION_NAME}"
          test "${RELEASE_CHANNEL}" = "preauthorization"

          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"

          {
            echo "### Phase 12A preauthorization release contract"
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Application ID: \`com.kudzimusar.direkt\`"
            echo "- targetSdk: \`36\`"
            echo "- versionCode: \`${VERSION_CODE}\`"
            echo "- versionName: \`${VERSION_NAME}\`"
            echo "- Channel: \`${RELEASE_CHANNEL}\`"
            echo "- Signing latch: \`false\`"
            echo "- Distribution: prohibited; readiness evidence only"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run release lint independently
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace --no-build-cache clean
          ./gradlew --no-daemon --stacktrace --no-build-cache --rerun-tasks lintRelease

      - name: Build first clean unsigned release AAB
        id: first_build
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "${SOURCE_SHA}")"

          ./gradlew --no-daemon --stacktrace --no-build-cache clean
          ./gradlew --no-daemon --stacktrace --no-build-cache --rerun-tasks bundleRelease

          AAB="$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print -quit)"
          if [[ -z "${AAB}" || ! -f "${AAB}" ]]; then
            echo "First release AAB was not produced." >&2
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/direkt-reproducibility"
          cp "${AAB}" "${RUNNER_TEMP}/direkt-reproducibility/first.aab"
          FIRST_SHA256="$(sha256sum "${RUNNER_TEMP}/direkt-reproducibility/first.aab" | cut -d' ' -f1)"
          echo "sha256=${FIRST_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Rebuild from clean state and prove byte reproducibility
        id: reproducibility
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "${SOURCE_SHA}")"

          ./gradlew --no-daemon --stacktrace --no-build-cache clean
          ./gradlew --no-daemon --stacktrace --no-build-cache --rerun-tasks bundleRelease

          AAB="$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print -quit)"
          if [[ -z "${AAB}" || ! -f "${AAB}" ]]; then
            echo "Second release AAB was not produced." >&2
            exit 1
          fi

          cp "${AAB}" "${RUNNER_TEMP}/direkt-reproducibility/second.aab"
          SECOND_SHA256="$(sha256sum "${RUNNER_TEMP}/direkt-reproducibility/second.aab" | cut -d' ' -f1)"
          FIRST_SHA256="${{ steps.first_build.outputs.sha256 }}"

          if [[ "${FIRST_SHA256}" != "${SECOND_SHA256}" ]]; then
            echo "Release AAB is not byte-for-byte reproducible from the same source and release contract." >&2
            echo "First SHA-256:  ${FIRST_SHA256}" >&2
            echo "Second SHA-256: ${SECOND_SHA256}" >&2
            exit 1
          fi

          cmp --silent \
            "${RUNNER_TEMP}/direkt-reproducibility/first.aab" \
            "${RUNNER_TEMP}/direkt-reproducibility/second.aab"

          echo "sha256=${SECOND_SHA256}" >> "$GITHUB_OUTPUT"
          {
            echo "### Reproducibility proof"
            echo "- Build 1 SHA-256: \`${FIRST_SHA256}\`"
            echo "- Build 2 SHA-256: \`${SECOND_SHA256}\`"
            echo "- Result: **byte-for-byte identical**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package deterministic non-publishable release evidence
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION_CODE="${{ steps.contract.outputs.version_code }}"
          VERSION_NAME="${{ steps.contract.outputs.version_name }}"
          RELEASE_CHANNEL="${{ steps.contract.outputs.release_channel }}"
          SHA256="${{ steps.reproducibility.outputs.sha256 }}"

          mkdir -p release-readiness
          DEST="release-readiness/direkt-${VERSION_NAME}-PREAUTHORIZATION-NOT-FOR-DISTRIBUTION-${SOURCE_SHA}.aab"
          cp "${RUNNER_TEMP}/direkt-reproducibility/second.aab" "${DEST}"
          printf '%s  %s\n' "${SHA256}" "$(basename "${DEST}")" > "${DEST}.sha256"

          cat > release-readiness/RELEASE_METADATA.txt <<EOF
          DIREKT Phase 12A preauthorization release-readiness evidence
          source_commit=${SOURCE_SHA}
          application_id=com.kudzimusar.direkt
          target_sdk=36
          version_code=${VERSION_CODE}
          version_name=${VERSION_NAME}
          release_channel=${RELEASE_CHANNEL}
          signing=disabled
          artifact_sha256=${SHA256}
          reproducibility=byte-for-byte-identical-across-two-clean-builds
          distribution=NOT_FOR_DISTRIBUTION_OR_PLAY_UPLOAD
          EOF

          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Upload non-publishable Phase 12A evidence
        uses: actions/upload-artifact@v4
        with:
          name: direkt-phase12a-preauthorization-aab-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: android/direkt-app/release-readiness/**
          if-no-files-found: error
          retention-days: 7
