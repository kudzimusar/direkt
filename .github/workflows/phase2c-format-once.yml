name: DIREKT Phase 2C Format Once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase2c-format-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase2c-format-once
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npm run format -- --log-level silent
      - name: Bootstrap and format operations portal
        working-directory: admin/direkt-operations-portal
        run: |
          npm install --package-lock-only --ignore-scripts --silent
          npm ci --ignore-scripts --silent
          npm run format -- --log-level silent
      - name: Commit deterministic output
        shell: bash
        run: |
          if [[ -z "$(git status --short)" ]]; then
            echo "No formatting or lockfile changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api admin/direkt-operations-portal
          git commit -m "style(phase2c): apply formatting and lock portal dependencies"
          git push origin HEAD:build/android-v1
