name: Phase 10 hosted Data API quarantine

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-quarantine-activation.yml

permissions:
  contents: read

jobs:
  quarantine:
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROJECT_REF: aeeuscifrxcjmnswqwnq
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Quarantine PostgREST to the empty DIREKT schema
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN}"
          echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"
          RESPONSE="${RUNNER_TEMP}/postgrest-update.json"
          HTTP_STATUS="$(curl --silent --show-error \
            --request PATCH \
            --output "${RESPONSE}" \
            --write-out '%{http_code}' \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/postgrest" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"db_schema":"direkt_api_disabled","db_extra_search_path":"extensions"}')"
          test "${HTTP_STATUS}" = "200"
          jq -e '.db_schema == "direkt_api_disabled" and .db_extra_search_path == "extensions"' "${RESPONSE}" >/dev/null
          jq '{db_schema, max_rows, db_extra_search_path, db_pool}' "${RESPONSE}"
          rm -f "${RESPONSE}"
