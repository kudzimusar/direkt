name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: write
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: af3fe210aeb6385a100e46841ccca34ae4374ead
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Dispatch revision-health inspection
        shell: bash
        run: |
          set -euo pipefail
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run cloud-run-staging-inspect.yml --repo "$GITHUB_REPOSITORY" --ref main \
            -f confirmation=INSPECT-DIREKT-STAGING -f source_sha="$SOURCE_SHA"
          run_id=""
          for attempt in $(seq 1 60); do
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow cloud-run-staging-inspect.yml \
              --branch main --event workflow_dispatch --limit 20 --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$started\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$run_id" && break
            sleep 5
          done
          test -n "$run_id"
          echo "Revision-health inspection run ID: $run_id"
          if ! gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status; then
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed \
              | grep -E 'Sanitized staging structure|revisions: created=|latest-created timestamp|condition .*status=|INSPECTION ASSERTION FAILED|PASS:' \
              | tail -n 140 || true
            exit 1
          fi
