name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print prior managed operations failure tail
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29642190204 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 220
