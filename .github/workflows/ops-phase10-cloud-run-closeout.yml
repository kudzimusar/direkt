name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print sanitized named inspection evidence
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29646134202 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'Sanitized staging structure|API revisions:|Portal revisions:|image matches expected source:|runtime identity:|secret-reference count:|scaling effective min/max:|PASS:|INSPECTION ASSERTION FAILED' \
            | tail -n 100 || true
