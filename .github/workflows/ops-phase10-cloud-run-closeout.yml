name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print Cloud Run API deploy result only
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29645721465 --repo "$GITHUB_REPOSITORY" --log \
            | grep 'Deploy private API revision' \
            | grep -v '36;1m' \
            | tail -n 100 || true
