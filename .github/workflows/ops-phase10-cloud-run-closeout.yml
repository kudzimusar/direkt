name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print monitoring failure evidence
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29642942425 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'monitoring.googleapis.com|alertPolicies|PERMISSION|Permission|permission|403|401|curl:|ERROR|Error|Process completed' \
            | tail -n 140 || true
