name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: List workflow activity after exact-main deploy
        shell: bash
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --limit 50 \
            --json databaseId,name,createdAt,event,headSha,status,conclusion \
            --jq 'map(select(.createdAt >= "2026-07-18T13:13:45Z")) | sort_by(.createdAt)[] | [.createdAt,.databaseId,.name,.event,.headSha,.status,(.conclusion // "")] | @tsv'
