name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: List Cloud Run workflow activity around revision drift
        shell: bash
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json databaseId,name,createdAt,headSha,status,conclusion,event \
            --jq 'map(select(.createdAt >= "2026-07-18T12:45:00Z" and (.name | test("Cloud Run"; "i")))) | sort_by(.createdAt)[] | [.createdAt,.databaseId,.name,.headSha,.event,.status,(.conclusion // "")] | @tsv'
