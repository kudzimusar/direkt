name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: write
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SOURCE_SHA: b1e980e8f2f913228bd5053ec8d8380ab3bcc391
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Independently inspect already-verified private staging
        shell: bash
        run: |
          set -euo pipefail
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run cloud-run-staging-inspect.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f confirmation=INSPECT-DIREKT-STAGING \
            -f source_sha="$SOURCE_SHA"
          run_id=""
          for attempt in $(seq 1 60); do
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
              --workflow cloud-run-staging-inspect.yml \
              --branch main --event workflow_dispatch --limit 20 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$started\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$run_id" && break
            sleep 5
          done
          test -n "$run_id"
          echo "Cloud Run staging inspection run ID: $run_id"
          if ! gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status; then
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed || true
            exit 1
          fi

      - name: Exercise rollback kill switch scaling and monitoring
        shell: bash
        run: |
          set -euo pipefail
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run phase10-managed-cloud-run-operations.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f confirmation=EXERCISE-DIREKT-OPERATIONS \
            -f source_sha="$SOURCE_SHA"
          run_id=""
          for attempt in $(seq 1 60); do
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
              --workflow phase10-managed-cloud-run-operations.yml \
              --branch main --event workflow_dispatch --limit 20 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$started\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$run_id" && break
            sleep 5
          done
          test -n "$run_id"
          echo "Managed Cloud Run operations run ID: $run_id"
          if ! gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status; then
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed || true
            exit 1
          fi
