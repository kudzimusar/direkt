name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print exact-main child run IDs and inspection failure
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29645718385 --repo "$GITHUB_REPOSITORY" --log \
            | grep -E 'Final Cloud Run staging (deploy|inspection) run ID|Final managed Cloud Run operations run ID' \
            | tail -n 20 || true
          echo '--- failed inspection evidence ---'
          gh run view 29645718385 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'inspection run ID|Expected|expected|image|revision|scale|IAM|invoker|secret|readiness|403|401|ERROR|Error|Process completed|curl:' \
            | tail -n 180 || true
