name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print effective-IAM failure message
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29642445600 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'ERROR|Error|error:|PERMISSION|Permission|denied|Denied|Portal remained|bindings:|roles/run|Process completed|policy' \
            | tail -n 120 || true
