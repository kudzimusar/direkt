name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print final Phase 10 managed run identifiers
        shell: bash
        run: |
          set -euo pipefail
          for workflow in cloud-run-staging-deploy-v2.yml cloud-run-staging-inspect.yml phase10-managed-cloud-run-operations.yml; do
            echo "--- ${workflow} ---"
            gh run list --repo "$GITHUB_REPOSITORY" --workflow "${workflow}" --branch main --event workflow_dispatch --limit 5 \
              --json databaseId,createdAt,status,conclusion,headSha \
              --jq '.[] | [.databaseId,.createdAt,.status,(.conclusion // ""),.headSha] | @tsv'
          done
