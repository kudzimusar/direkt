name: Phase 10 Cloud Run closeout bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-cloud-run-closeout.yml

permissions:
  actions: read
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print final exact-main inspection evidence
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29646427656 --repo "$GITHUB_REPOSITORY" --log \
            | grep -E 'Final exact-main (deploy|inspection) run ID' \
            | tail -n 10 || true
          inspect_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow cloud-run-staging-inspect.yml --branch main --event workflow_dispatch --limit 10 --json databaseId,createdAt,headSha --jq 'map(select(.headSha == "af3fe210aeb6385a100e46841ccca34ae4374ead")) | sort_by(.createdAt) | last | .databaseId')"
          echo "Inspection run ID: ${inspect_id}"
          gh run view "${inspect_id}" --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'Sanitized staging structure|API revisions:|Portal revisions:|image matches expected source:|runtime identity:|secret-reference count:|scaling effective min/max:|PASS:|INSPECTION ASSERTION FAILED' \
            | tail -n 100 || true
