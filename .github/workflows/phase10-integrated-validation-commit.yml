name: Create integrated Phase 10 infrastructure validation head

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase10-integrated-validation-commit.yml"

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json
      - name: Apply permanent integrated controls
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          dockerfile = Path('backend/direkt-api/Dockerfile')
          docker = dockerfile.read_text()
          marker = 'FROM node:24-bookworm-slim AS runtime\nENV NODE_ENV=production'
          replacement = '''FROM node:24-bookworm-slim AS runtime
LABEL org.opencontainers.image.title="DIREKT API" \\
      org.opencontainers.image.description="Synthetic-first DIREKT backend API" \\
      org.opencontainers.image.source="https://github.com/kudzimusar/direkt"
ENV NODE_ENV=production'''
          if marker in docker:
              dockerfile.write_text(docker.replace(marker, replacement, 1))
          elif 'org.opencontainers.image.title="DIREKT API"' not in docker:
              raise SystemExit('Dockerfile runtime marker missing')

          route = Path('admin/direkt-operations-portal/src/app/api/health/route.ts')
          text = route.read_text()
          marker = "const HEALTH_TIMEOUT_MS = 5_000;"
          if "export const dynamic = 'force-dynamic';" not in text:
              if marker not in text:
                  raise SystemExit('Portal health marker missing')
              route.write_text(text.replace(marker, "export const dynamic = 'force-dynamic';\n\n" + marker, 1))

          contract = Path('docs/phase10/INFRASTRUCTURE_ACTIVATION_CONTRACT.md')
          text = contract.read_text()
          marker = '## 7. Exit evidence'
          if '## 7. Repository integration evidence' not in text:
              if marker not in text:
                  raise SystemExit('Infrastructure contract exit marker missing')
              evidence = '''## 7. Repository integration evidence

- infrastructure bootstrap PR #43 was reviewed and merged to `main` at `4ef98f9f96f17a4aa22109f807ebed1f0381e0e3`;
- the bootstrap exact reviewed source was `14910e3b632cb213244a966ef41ea928e7494e77`;
- synchronization PR #44 merged the infrastructure history into `build/android-v1` at `3b0dadb5aed34d13d99ade532eb11ebc8f3c1c90` without force-pushing;
- managed environment execution evidence remains separate and must be captured from the protected activation/deployment workflows.

## 8. Exit evidence'''
              contract.write_text(text.replace(marker, evidence, 1))
          PY
      - name: Apply canonical portal formatting
        working-directory: admin/direkt-operations-portal
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npx prettier --write src/app/api/health/route.ts
      - name: Commit the permanent-only validation head
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/phase10-integrated-validation-commit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/direkt-api/Dockerfile \
            admin/direkt-operations-portal/src/app/api/health/route.ts \
            docs/phase10/INFRASTRUCTURE_ACTIVATION_CONTRACT.md
          git commit -m "feat(infra): integrate deployment identity and validation"
          git push origin HEAD:build/android-v1
