name: Phase 5 typed profile test fix

on:
  push:
    branches: [build/android-v1]
    paths:
      - ".github/workflows/phase5-fix-profile-test.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase5-profile-test-fix
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Add explicit response typing
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('backend/direkt-api/test/e2e/discovery.e2e-spec.ts')
          text = path.read_text()
          marker = """interface SearchResponse {
"""
          insert_after = """interface PublicProfileResponse {
  imagePolicy: string;
  locationExplanation: string;
}

"""
          if 'interface PublicProfileResponse' not in text:
              index = text.index(marker)
              text = text[:index] + insert_after + text[index:]

          old = """    expect(mobileProfile.body.imagePolicy).toContain('No public image is required');
    expect(mobileProfile.body.locationExplanation).toContain('private base');
    expect(JSON.stringify(mobileProfile.body)).not.toContain(String(mobile.privateLongitude));
"""
          new = """    const mobileProfileBody = mobileProfile.body as PublicProfileResponse;
    expect(mobileProfileBody.imagePolicy).toContain('No public image is required');
    expect(mobileProfileBody.locationExplanation).toContain('private base');
    expect(JSON.stringify(mobileProfileBody)).not.toContain(String(mobile.privateLongitude));
"""
          if old not in text:
              raise SystemExit('Profile assertion marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Format backend test
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit typed regression
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/discovery.e2e-spec.ts
          git commit -m "test(discovery): type public profile responses"
          git push origin HEAD:build/android-v1
