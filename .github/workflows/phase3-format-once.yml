name: Phase 3 format once

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/direkt-api/**"
      - "admin/direkt-operations-portal/**"
      - ".github/workflows/phase3-format-once.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase3-format-once
  cancel-in-progress: true

jobs:
  format:
    if: github.event.pull_request.head.ref == 'build/android-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            backend/direkt-api/package-lock.json
            admin/direkt-operations-portal/package-lock.json
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Format operations portal source and retain diagnostics
        working-directory: admin/direkt-operations-portal
        shell: bash
        run: |
          npm ci --ignore-scripts
          mkdir -p ../../artifacts/phase3-format
          set +e
          set -o pipefail
          npm exec -- prettier --write \
            src \
            test \
            package.json \
            tsconfig.json \
            next.config.ts \
            vitest.config.ts \
            eslint.config.mjs \
            README.md \
            --ignore-unknown 2>&1 | tee ../../artifacts/phase3-format/portal-prettier.txt
          status=${PIPESTATUS[0]}
          echo "$status" > ../../artifacts/phase3-format/portal-prettier-status.txt
          exit 0
      - name: Commit deterministic formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/direkt-api admin/direkt-operations-portal
            git commit -m "style: apply Phase 3 deterministic formatting"
            git push origin HEAD:build/android-v1
          fi
      - name: Upload formatter diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-format-diagnostics-${{ github.run_number }}
          path: artifacts/phase3-format/**
          if-no-files-found: warn
          retention-days: 2