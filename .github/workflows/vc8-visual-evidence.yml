name: DIREKT VC8 visual evidence

on:
  pull_request:
    branches:
      - main
    paths:
      - "web/direkt-app/**"
      - "admin/direkt-operations-portal/**"
      - "android/direkt-app/**"
      - ".github/workflows/vc8-visual-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-vc8-visual-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  web-operations-evidence:
    name: Web and operations synthetic visual evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Verify exact source
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - name: Install locked product dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund --prefix web/direkt-app
          npm ci --ignore-scripts --no-audit --no-fund --prefix admin/direkt-operations-portal
      - name: Install isolated screenshot tooling
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/vc8-playwright"
          npm install --prefix "${RUNNER_TEMP}/vc8-playwright" --package-lock=false --no-save playwright@1.55.0
          node "${RUNNER_TEMP}/vc8-playwright/node_modules/playwright/cli.js" install --with-deps chromium
      - name: Start synthetic public-safe fixture API
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/vc8-fixture-api.cjs" <<'NODE'
          const http = require('node:http');
          const providerId = '11111111-1111-4111-8111-111111111111';
          const claim = {
            claimKey: 'identity.current',
            statement: 'Representative identity check is current',
            limitation: 'Confirms the reviewed identity evidence only; it does not guarantee workmanship or future conduct.',
            evidenceClass: 'identity',
            checkedAt: '2026-07-01T10:00:00.000Z',
            validUntil: '2027-07-01T10:00:00.000Z',
            policyVersion: 'synthetic-v1',
          };
          const card = {
            publicProviderId: providerId,
            categoryKey: 'plumbing',
            categoryName: 'Plumbing',
            displayName: 'Synthetic Copperbelt Repairs',
            operatingModel: 'mobile',
            locality: 'Woodlands, Lusaka',
            publicPremises: null,
            serviceAreaGeoJson: { type: 'Polygon', coordinates: [] },
            availability: 'available',
            nextAvailableAt: '2026-07-22T08:00:00.000Z',
            image: { lowBandwidthUrl: null, standardUrl: null, altText: null },
            claims: [claim],
            reasons: ['Current mandatory checks', 'Serves your selected area', 'Currently marked available'],
            distanceKm: null,
            sharePath: `/providers/${providerId}`,
            synthetic: true,
          };
          const profile = {
            ...card,
            trustSummary: 'Every check below is scoped, dated and limited. DIREKT does not provide a blanket provider guarantee.',
            locationExplanation: 'This mobile provider is matched by its public service area. DIREKT does not expose a private base.',
            imagePolicy: 'No public image is required; the profile remains usable with text and area information.',
          };
          const review = {
            reviewId: '22222222-2222-4222-8222-222222222222',
            publicProviderId: providerId,
            providerDisplayName: card.displayName,
            categoryKey: 'plumbing',
            rating: 5,
            title: 'Clear communication',
            body: 'Synthetic review: the provider explained the repair options clearly and kept the tracked enquiry updated.',
            publishedAt: '2026-07-10T09:00:00.000Z',
            providerResponse: null,
            contactIncluded: false,
            interactionIdentifierIncluded: false,
            moderationRationaleIncluded: false,
            synthetic: true,
          };
          const categories = [
            { key: 'plumbing', name: 'Plumbing', description: 'Leaks, pipes, taps and water fixtures' },
            { key: 'electrical', name: 'Electrical repair', description: 'Wiring, sockets, lights and electrical faults' },
            { key: 'moving', name: 'Moving help', description: 'Local moving and item transport support' },
            { key: 'cleaning', name: 'Cleaning', description: 'Home and small-business cleaning services' },
          ];
          function send(res, value, status = 200) {
            res.writeHead(status, { 'content-type': 'application/json', 'cache-control': 'no-store' });
            res.end(JSON.stringify(value));
          }
          const server = http.createServer((req, res) => {
            const url = new URL(req.url, 'http://127.0.0.1:4100');
            const path = url.pathname;
            if (req.method === 'GET' && path === '/api/v1/public/categories') return send(res, categories);
            if (req.method === 'GET' && path === '/api/v1/public/providers/search') {
              return send(res, { items: [card], nextCursor: null, searchContext: { manualArea: url.searchParams.get('area'), usedOneTimeLocation: false, backgroundLocationUsed: false, resultCount: 1, noResultsSuggestions: [] } });
            }
            if (req.method === 'GET' && path === `/api/v1/public/providers/${providerId}`) return send(res, profile);
            if (req.method === 'GET' && path === `/api/v1/public/providers/${providerId}/claims`) return send(res, [claim]);
            if (req.method === 'GET' && path === `/api/v1/public/providers/${providerId}/availability`) return send(res, { publicProviderId: providerId, state: 'available', nextAvailableAt: '2026-07-22T08:00:00.000Z', synthetic: true });
            if (req.method === 'GET' && path === `/api/v1/public/providers/${providerId}/reviews`) return send(res, [review]);
            if (req.method === 'GET' && path === `/api/v1/public/providers/${providerId}/share`) return send(res, { publicProviderId: providerId, title: 'Synthetic Copperbelt Repairs on DIREKT', text: 'Synthetic Copperbelt Repairs provides plumbing services in Woodlands, Lusaka. Review current scoped checks and limitations in DIREKT.', path: `/providers/${providerId}`, containsPrivateLocation: false });
            if (req.method === 'POST' && path === '/api/v1/public/discovery/assist') return send(res, { source: 'deterministic', normalizedQuery: 'leaking pipe', clarificationQuestion: null, suggestions: [{ categoryKey: 'plumbing', categoryName: 'Plumbing', confidence: 0.84, reason: 'Your description shares terms with Plumbing. Confirm this service before searching.', searchTerms: ['plumbing', 'leaking pipe'] }], ai: { attempted: false, available: false, provider: null, model: null, fallbackReason: 'Synthetic visual evidence uses deterministic fallback.' }, limitations: ['Suggestions do not select or endorse a provider.', 'Trust checks remain backend-authoritative.', 'You can ignore the suggestion and search normally.'] });
            if (req.method === 'POST' && path === '/api/v1/public/support/assist') return send(res, { source: 'deterministic', answer: 'DIREKT shows check-specific trust information rather than a blanket provider guarantee. Each public check explains what was checked and its limitation.', sources: [{ id: 'trust.checks', title: 'How DIREKT trust information works' }], limitations: ['Help cannot change trust or account state.'] });
            return send(res, { title: 'Not found', status: 404 }, 404);
          });
          server.listen(4100, '127.0.0.1');
          NODE
          node "${RUNNER_TEMP}/vc8-fixture-api.cjs" > "${RUNNER_TEMP}/vc8-fixture-api.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/vc8-fixture-api.pid"
      - name: Start customer/provider web and operations portal
        shell: bash
        run: |
          set -euo pipefail
          (
            cd web/direkt-app
            DIREKT_WEB_API_MODE=public \
            DIREKT_API_BASE_URL=http://127.0.0.1:4100 \
            DIREKT_WEB_AUTH_MODE=disabled \
            NEXT_TELEMETRY_DISABLED=1 \
            npm run dev -- --hostname 127.0.0.1 --port 3100
          ) > "${RUNNER_TEMP}/vc8-web.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/vc8-web.pid"
          (
            cd admin/direkt-operations-portal
            NEXT_TELEMETRY_DISABLED=1 npm run dev -- --hostname 127.0.0.1 --port 3200
          ) > "${RUNNER_TEMP}/vc8-ops.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/vc8-ops.pid"
          for url in http://127.0.0.1:3100 http://127.0.0.1:3200/operations; do
            for attempt in $(seq 1 60); do
              if curl --fail --silent --show-error "$url" >/dev/null; then break; fi
              if [[ "$attempt" == "60" ]]; then
                echo "::error title=Visual evidence server unavailable::$url did not become ready"
                cat "${RUNNER_TEMP}/vc8-web.log" || true
                cat "${RUNNER_TEMP}/vc8-ops.log" || true
                exit 1
              fi
              sleep 2
            done
          done
      - name: Capture responsive customer, provider-public, help and operations evidence
        shell: bash
        env:
          PLAYWRIGHT_MODULE: ${{ runner.temp }}/vc8-playwright/node_modules/playwright
        run: |
          set -euo pipefail
          mkdir -p visual-evidence/web
          cat > "${RUNNER_TEMP}/capture-vc8.cjs" <<'NODE'
          const fs = require('node:fs');
          const { chromium } = require(process.env.PLAYWRIGHT_MODULE);
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            await desktop.goto('http://127.0.0.1:3100', { waitUntil: 'networkidle' });
            await desktop.getByLabel('Service or problem').fill('leaking pipe');
            await desktop.getByLabel('Area or landmark').fill('Woodlands');
            await desktop.getByRole('button', { name: 'Find providers' }).click();
            await desktop.getByRole('heading', { name: 'Synthetic Copperbelt Repairs' }).waitFor();
            await desktop.screenshot({ path: 'visual-evidence/web/customer-discovery-desktop.png', fullPage: true });

            await desktop.goto('http://127.0.0.1:3100/providers/11111111-1111-4111-8111-111111111111', { waitUntil: 'networkidle' });
            await desktop.getByRole('heading', { name: 'Synthetic Copperbelt Repairs' }).waitFor();
            await desktop.screenshot({ path: 'visual-evidence/web/provider-public-profile-desktop.png', fullPage: true });

            await desktop.goto('http://127.0.0.1:3100/?view=account', { waitUntil: 'networkidle' });
            await desktop.getByLabel('Your question').fill('How do provider trust checks work?');
            await desktop.getByRole('button', { name: 'Get help' }).click();
            await desktop.getByText('How DIREKT trust information works').waitFor();
            await desktop.screenshot({ path: 'visual-evidence/web/account-help-desktop.png', fullPage: true });

            const mobile = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true });
            await mobile.goto('http://127.0.0.1:3100', { waitUntil: 'networkidle' });
            await mobile.getByLabel('Service or problem').fill('leaking pipe');
            await mobile.getByRole('button', { name: 'Help me choose' }).click();
            await mobile.getByText('DIREKT category match').waitFor();
            await mobile.screenshot({ path: 'visual-evidence/web/customer-ai-fallback-mobile.png', fullPage: true });

            await desktop.goto('http://127.0.0.1:3200/operations', { waitUntil: 'networkidle' });
            await desktop.screenshot({ path: 'visual-evidence/web/operations-mission-control-desktop.png', fullPage: true });
            await desktop.goto('http://127.0.0.1:3200/operations/evidence-review', { waitUntil: 'networkidle' });
            await desktop.screenshot({ path: 'visual-evidence/web/operations-evidence-review-desktop.png', fullPage: true });

            fs.writeFileSync('visual-evidence/web/metadata.json', JSON.stringify({
              sourceSha: process.env.SOURCE_SHA,
              data: 'synthetic/public-safe only',
              designDirection: 'Structured Trust + Neighbourhood Marketplace + Field Utility',
              captures: [
                { file: 'customer-discovery-desktop.png', viewport: '1440x1000', state: 'search results' },
                { file: 'provider-public-profile-desktop.png', viewport: '1440x1000', state: 'check-specific trust profile' },
                { file: 'account-help-desktop.png', viewport: '1440x1000', state: 'deterministic grounded help fallback' },
                { file: 'customer-ai-fallback-mobile.png', viewport: '390x844', state: 'AI unavailable/deterministic category fallback' },
                { file: 'operations-mission-control-desktop.png', viewport: '1440x1000', state: 'mission control' },
                { file: 'operations-evidence-review-desktop.png', viewport: '1440x1000', state: 'restricted-AI inactive evidence review' }
              ]
            }, null, 2));
            await browser.close();
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE
          SOURCE_SHA="${SOURCE_SHA}" node "${RUNNER_TEMP}/capture-vc8.cjs"
      - name: Upload web and operations visual evidence
        uses: actions/upload-artifact@v4
        with:
          name: direkt-vc8-web-visual-evidence-${{ env.SOURCE_SHA }}
          path: visual-evidence/web/**
          if-no-files-found: error
          retention-days: 30

  android-evidence:
    name: Android customer and provider synthetic visual evidence
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DIREKT_GRADLE_VERSION: "9.4.0"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}
      - name: Build debug APK
        working-directory: android/direkt-app
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            gradle wrapper --gradle-version "${DIREKT_GRADLE_VERSION}" --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleDebug
      - name: Provision headless Android emulator
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "emulator" "system-images;android-35;google_apis;x86_64"
          echo no | avdmanager create avd --force --name direkt-vc8 --package "system-images;android-35;google_apis;x86_64" --device "pixel_2"
          nohup "${ANDROID_HOME}/emulator/emulator" -avd direkt-vc8 -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot > "${RUNNER_TEMP}/vc8-emulator.log" 2>&1 &
          adb wait-for-device
          for attempt in $(seq 1 90); do
            if [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" == "1" ]]; then break; fi
            if [[ "$attempt" == "90" ]]; then cat "${RUNNER_TEMP}/vc8-emulator.log"; exit 1; fi
            sleep 2
          done
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
      - name: Capture native customer and provider/evidence views
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p visual-evidence/android
          adb install -r android/direkt-app/app/build/outputs/apk/debug/app-debug.apk
          adb shell monkey -p com.kudzimusar.direkt.debug -c android.intent.category.LAUNCHER 1 >/dev/null
          sleep 4
          adb exec-out screencap -p > visual-evidence/android/android-customer-discovery.png

          tap_text() {
            local target="$1"
            adb shell uiautomator dump /sdcard/window.xml >/dev/null
            adb pull /sdcard/window.xml "${RUNNER_TEMP}/window.xml" >/dev/null
            TARGET="$target" python - <<'PY' > "${RUNNER_TEMP}/coords.txt"
          import os, re, xml.etree.ElementTree as ET
          target = os.environ['TARGET']
          root = ET.parse(os.environ['RUNNER_TEMP'] + '/window.xml').getroot()
          for node in root.iter('node'):
              if node.attrib.get('text') == target:
                  m = re.match(r'\[(\d+),(\d+)\]\[(\d+),(\d+)\]', node.attrib.get('bounds',''))
                  if m:
                      x1,y1,x2,y2 = map(int,m.groups())
                      print((x1+x2)//2, (y1+y2)//2)
                      raise SystemExit(0)
          raise SystemExit(f'Unable to find Android text node: {target}')
          PY
            read -r x y < "${RUNNER_TEMP}/coords.txt"
            adb shell input tap "$x" "$y"
            sleep 2
          }

          tap_text "Provider"
          adb exec-out screencap -p > visual-evidence/android/android-provider-overview.png
          tap_text "Evidence"
          adb exec-out screencap -p > visual-evidence/android/android-provider-evidence.png

          cat > visual-evidence/android/metadata.json <<EOF
          {
            "sourceSha": "${SOURCE_SHA}",
            "data": "synthetic review data only",
            "device": "Pixel 2 class emulator / Android API 35",
            "captures": [
              {"file":"android-customer-discovery.png","state":"customer discovery"},
              {"file":"android-provider-overview.png","state":"provider overview"},
              {"file":"android-provider-evidence.png","state":"provider evidence/recovery"}
            ]
          }
          EOF
      - name: Upload Android visual evidence
        uses: actions/upload-artifact@v4
        with:
          name: direkt-vc8-android-visual-evidence-${{ env.SOURCE_SHA }}
          path: visual-evidence/android/**
          if-no-files-found: error
          retention-days: 30
