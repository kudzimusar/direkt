name: DIREKT RC3 one-shot Crashlytics canary dispatcher

on:
  push:
    branches:
      - main
    paths:
      - "docs/integrations/RC3_CRASHLYTICS_CANARY_AUTHORIZATION.md"

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: direkt-rc3-crashlytics-one-shot-dispatch
  cancel-in-progress: false

jobs:
  dispatch-and-watch:
    name: Dispatch and verify managed RC3 Crashlytics canary
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PUSH_SHA: ${{ github.sha }}
      CANARY_WORKFLOW: firebase-crashlytics-canary.yml
      ISSUE_NUMBER: "261"
      MARKER_PATH: docs/integrations/RC3_CRASHLYTICS_CANARY_AUTHORIZATION.md

    steps:
      - name: Check out exact main source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate one-shot authorization marker and pinned source
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "${PUSH_SHA}"
          grep -Fq 'RUN-DIREKT-CRASHLYTICS-CANARY' "${MARKER_PATH}"
          grep -Fq 'synthetic-only debug crash and ANR canary' "${MARKER_PATH}"

          source_sha="$(sed -nE 's/^\*\*Exact merged source under proof:\*\* `([0-9a-f]{40})`\.$/\1/p' "${MARKER_PATH}")"
          test "$(printf '%s\n' "${source_sha}" | grep -Ec '^[0-9a-f]{40}$')" -eq 1
          git cat-file -e "${source_sha}^{commit}"
          git merge-base --is-ancestor "${source_sha}" "${PUSH_SHA}"
          echo "SOURCE_SHA=${source_sha}" >> "${GITHUB_ENV}"

      - name: Dispatch exact-source managed Crashlytics canary
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          previous_id="$(gh run list \
            --repo "${REPO}" \
            --workflow "${CANARY_WORKFLOW}" \
            --branch main \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')"

          gh workflow run "${CANARY_WORKFLOW}" \
            --repo "${REPO}" \
            --ref main \
            -f confirmation=RUN-DIREKT-CRASHLYTICS-CANARY \
            -f source_sha="${SOURCE_SHA}"

          run_id=""
          for attempt in $(seq 1 30); do
            runs_json="$(gh run list \
              --repo "${REPO}" \
              --workflow "${CANARY_WORKFLOW}" \
              --branch main \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId,headSha)"
            run_id="$(jq -r \
              --arg sha "${SOURCE_SHA}" \
              --argjson previous "${previous_id}" \
              '[.[] | select(.headSha == $sha and .databaseId != $previous)][0].databaseId // empty' \
              <<< "${runs_json}")"
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 2
          done

          if [[ -z "${run_id}" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "RC3 one-shot dispatcher could not resolve the managed Crashlytics canary run for marker-pinned exact source \`${SOURCE_SHA}\`. RC3 remains IMPLEMENTED_GATED; no ACTIVE claim was made."
            exit 1
          fi

          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "Managed Crashlytics canary run: ${run_id}"

      - name: Record managed canary start
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.dispatch.outputs.run_id }}"
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPO}" \
            --body "RC3 managed Firebase Crashlytics canary dispatched for marker-pinned exact merged source \`${SOURCE_SHA}\`. Run: \`${run_id}\`. Boundary remains synthetic-only debug crash/ANR proof; participant/production crash telemetry is not authorized."

      - name: Wait for managed canary result
        id: watch
        shell: bash
        run: |
          set +e
          run_id="${{ steps.dispatch.outputs.run_id }}"
          gh run watch "${run_id}" --repo "${REPO}" --exit-status
          status=$?
          set -e
          echo "watch_status=${status}" >> "${GITHUB_OUTPUT}"

      - name: Publish sanitized managed canary receipt
        if: always() && steps.dispatch.outputs.run_id != ''
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.dispatch.outputs.run_id }}"
          run_json="$(gh run view "${run_id}" --repo "${REPO}" --json status,conclusion,url,headSha)"
          conclusion="$(jq -r '.conclusion // "unknown"' <<< "${run_json}")"
          run_url="$(jq -r '.url' <<< "${run_json}")"
          head_sha="$(jq -r '.headSha' <<< "${run_json}")"

          if [[ "${head_sha}" != "${SOURCE_SHA}" ]]; then
            conclusion="source-mismatch"
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPO}" \
            --body "RC3 managed Crashlytics canary result for marker-pinned exact source \`${SOURCE_SHA}\`: **${conclusion}**. Run \`${run_id}\`: ${run_url}. Receipt covers synthetic debug crash/ANR proof only and does not authorize participant/production telemetry."

          test "${conclusion}" = "success"

      - name: Enforce successful managed proof
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.watch.outputs.watch_status }}" = "0"
