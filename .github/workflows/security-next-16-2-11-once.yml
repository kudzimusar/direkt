name: DIREKT one-shot Next.js 16.2.11 security lock refresh

on:
  push:
    branches:
      - security/next-16.2.11
    paths:
      - ".github/workflows/security-next-16-2-11-once.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: security/next-16.2.11
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Pin repository npm toolchain
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@11.16.0
          test "$(npm --version)" = "11.16.0"
      - name: Refresh only Next.js security patch dependencies
        working-directory: admin/direkt-operations-portal
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --save-exact next@16.2.11 eslint-config-next@16.2.11
          test "$(node -p "require('./package.json').dependencies.next")" = "16.2.11"
          test "$(node -p "require('./package.json').devDependencies['eslint-config-next']")" = "16.2.11"
          npm ci --ignore-scripts
          npm audit --audit-level=high
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build
      - name: Commit deterministic package and lock update
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short
          git add admin/direkt-operations-portal/package.json admin/direkt-operations-portal/package-lock.json
          test -n "$(git diff --cached --name-only)"
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = "2"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(security): update Next.js to 16.2.11"
          git push origin HEAD:security/next-16.2.11
