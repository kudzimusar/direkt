name: DIREKT Phase 10 portal security upgrade

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase10-portal-security-upgrade.yml"

permissions:
  contents: write

jobs:
  upgrade:
    name: Upgrade vulnerable portal framework and lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json

      - name: Upgrade Next.js security patch and regenerate lockfile
        working-directory: admin/direkt-operations-portal
        shell: bash
        run: |
          set -euo pipefail
          npm install \
            --save-exact \
            --ignore-scripts \
            next@16.2.10 \
            eslint-config-next@16.2.10
          npm audit --audit-level=high
          npm run verify

      - name: Commit exact dependency remediation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            admin/direkt-operations-portal/package.json \
            admin/direkt-operations-portal/package-lock.json
          if git diff --cached --quiet; then
            echo "Portal dependency remediation was already current."
            exit 0
          fi
          git commit -m "fix(security): upgrade portal Next.js to 16.2.10"
          git push origin HEAD:build/android-v1
