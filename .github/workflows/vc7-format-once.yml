name: VC7 backend format once

on:
  push:
    branches:
      - vc/ai-quality-7-8
    paths:
      - ".github/workflows/vc7-format-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: vc/ai-quality-7-8
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Install locked backend dependencies
        working-directory: backend/direkt-api
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Apply repository-pinned Prettier
        working-directory: backend/direkt-api
        run: >-
          npx prettier --write
          src/discovery/discovery-ai-assist.service.ts
          src/discovery/discovery-ai-assist.service.spec.ts
          src/discovery/discovery-ai.dto.ts
          src/discovery/discovery.controller.ts
          src/discovery/discovery.module.ts
      - name: Commit canonical formatting if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- backend/direkt-api/src/discovery; then
            exit 0
          fi
          git config user.name "direkt-vc-formatter[bot]"
          git config user.email "direkt-vc-formatter[bot]@users.noreply.github.com"
          git add backend/direkt-api/src/discovery
          git commit -m "style(vc7): apply canonical backend formatting"
          git push origin HEAD:vc/ai-quality-7-8
