name: DIREKT Phase 11 managed activation checksum

on:
  push:
    branches:
      - phase11/managed-synthetic-activation
    paths:
      - "database/migrations/202607190100_phase11_external_identity_binding.sql"
      - ".github/workflows/phase11-managed-checksum.yml"

permissions:
  contents: read

jobs:
  checksum:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Capture canonical Phase 11 migration checksum
        shell: bash
        run: |
          mkdir -p artifacts/phase11
          sha256sum database/migrations/202607190100_phase11_external_identity_binding.sql \
            | tee artifacts/phase11/phase11-migration-sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: phase11-managed-checksum-${{ github.sha }}
          path: artifacts/phase11/phase11-migration-sha256.txt
          if-no-files-found: error
          retention-days: 1
