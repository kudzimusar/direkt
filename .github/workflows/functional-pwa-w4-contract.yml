name: DIREKT functional web W4 customer contract

on:
  push:
    branches: [main, build/android-v1]
    paths:
      - "web/direkt-app/**"
      - "backend/direkt-api/src/account-contact/**"
      - "backend/direkt-api/src/discovery/**"
      - "backend/direkt-api/src/interaction/**"
      - "backend/direkt-api/src/app.module.ts"
      - ".github/workflows/functional-pwa-w4-contract.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/direkt-app/**"
      - "backend/direkt-api/src/account-contact/**"
      - "backend/direkt-api/src/discovery/**"
      - "backend/direkt-api/src/interaction/**"
      - "backend/direkt-api/src/app.module.ts"
      - ".github/workflows/functional-pwa-w4-contract.yml"

permissions:
  contents: read

env:
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  verify-w4:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/direkt-app/package-lock.json
      - working-directory: web/direkt-app
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Typecheck functional web W4 source
        working-directory: web/direkt-app
        run: npm run typecheck
      - name: Verify W4 customer/backend contract parity
        working-directory: web/direkt-app
        run: npm run verify:customer
      - name: Build functional web W4 source
        working-directory: web/direkt-app
        env:
          DIREKT_WEB_API_MODE: disabled
          DIREKT_WEB_AUTH_MODE: disabled
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
      - name: Ensure build did not rewrite tracked source
        run: git diff --exit-code -- web/direkt-app
      - name: Preserve post-W7 Android ownership boundary
        shell: bash
        run: |
          set -euo pipefail
          # W4 is a historical web/backend contract. After W7 closure, legitimate Android
          # evolution is validated by Android CI and the exact-head W7 cross-client regression
          # instead of being prohibited by this older gate.
          test -f .github/workflows/functional-pwa-w7-regression.yml
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            git fetch --no-tags origin main
            base_sha="$(git merge-base HEAD origin/main)"
          fi
          test -n "${base_sha}"
          if ! git diff --quiet "${base_sha}" "${SOURCE_SHA}" -- android/direkt-app; then
            echo "Android changed after W7 closure; validation is delegated to Android CI + W7 exact-head regression."
            git diff --name-status "${base_sha}" "${SOURCE_SHA}" -- android/direkt-app
          fi
