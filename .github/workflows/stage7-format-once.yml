name: Stage 7 backend format once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7-format-once.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format
      - name: Commit formatter output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src scripts test package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No formatter changes were required."
            exit 0
          fi
          git diff --cached --check
          git commit -m "style: apply pinned Stage 7 backend formatter [formatted]"
          git push origin HEAD:build/android-v1
