name: AI0 canonical format once

on:
  push:
    branches:
      - integration/ai-provider-foundation
    paths:
      - ".github/workflows/ai0-format-once.yml"
      - "backend/direkt-api/**"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/ai-provider-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Install pinned backend dependencies
        working-directory: backend/direkt-api
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Apply canonical Prettier formatting
        working-directory: backend/direkt-api
        run: npm run format
      - name: Commit canonical formatting when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- backend/direkt-api; then
            echo "Backend already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api
          git commit -m "style(ai): apply canonical backend formatting"
          git push origin HEAD:integration/ai-provider-foundation
