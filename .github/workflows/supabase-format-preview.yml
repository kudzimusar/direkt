name: Supabase integration formatting preview

on:
  push:
    branches:
      - integration/supabase-development
    paths:
      - ".github/workflows/supabase-format-preview.yml"
      - "backend/direkt-api/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/supabase-format-preview.yml"
      - "backend/direkt-api/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-format-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    name: Generate backend formatting patch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Create deterministic patch
        shell: bash
        run: |
          mkdir -p artifacts
          git diff --binary -- backend/direkt-api > artifacts/supabase-format.patch
          git diff --name-only -- backend/direkt-api > artifacts/supabase-format-files.txt
          test -s artifacts/supabase-format.patch
      - uses: actions/upload-artifact@v4
        with:
          name: supabase-format-patch-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 1
