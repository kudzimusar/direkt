name: DIREKT Phase 10 Cloud Run revision diagnostic

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DIAGNOSE-DIREKT-REVISION to continue
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  diagnose:
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api

    steps:
      - name: Validate diagnostic control
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DIAGNOSE-DIREKT-REVISION"

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Print sanitized latest-created API revision health
        shell: bash
        run: |
          set -euo pipefail
          service_file="${RUNNER_TEMP}/service.json"
          revision_file="${RUNNER_TEMP}/revision.json"
          gcloud run services describe "${GCP_API_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format=json > "${service_file}"
          created="$(jq -r '.status.latestCreatedRevisionName' "${service_file}")"
          ready="$(jq -r '.status.latestReadyRevisionName' "${service_file}")"
          echo "API latest-created revision: ${created}"
          echo "API latest-ready revision: ${ready}"
          gcloud run revisions describe "${created}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format=json > "${revision_file}"
          python3 - "${revision_file}" <<'PY'
          import json
          import sys
          path = sys.argv[1]
          with open(path, encoding="utf-8") as fh:
              data = json.load(fh)
          print("Revision created:", data.get("metadata", {}).get("creationTimestamp", "unknown"))
          for condition in data.get("status", {}).get("conditions", []):
              print(
                  "Condition:",
                  f"type={condition.get('type', 'unknown')}",
                  f"status={condition.get('status', 'unknown')}",
                  f"reason={condition.get('reason', 'none')}",
              )
          PY
