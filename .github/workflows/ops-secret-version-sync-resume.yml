name: Cloud Run inspection evidence

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print inspection evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29625635650 --repo "$GITHUB_REPOSITORY" --log \
            | grep -E 'Service URL:|Ready revision:|Image:|Runtime identity:|Secret references:|Public invocation bindings:|Readiness: passed' \
            | sort -u
