name: Secret version sync resume diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print synchronization error lines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29625135961 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -Ei 'permission|forbidden|resource not accessible|http [0-9]{3}|gh:|error|process completed' \
            | tail -n 30
