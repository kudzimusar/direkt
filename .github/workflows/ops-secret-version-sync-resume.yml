name: Cloud Run revision evidence

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print revision evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LOG_FILE="$RUNNER_TEMP/cloud-run.log"
          gh run view 29625346221 --repo "$GITHUB_REPOSITORY" --log > "$LOG_FILE"
          grep -Ei 'deployed|revision|traffic|service url' "$LOG_FILE" \
            | grep -Evi 'revision conflict|echo|jq|containers\[|source_sha|secret_version' \
            | tail -n 25
