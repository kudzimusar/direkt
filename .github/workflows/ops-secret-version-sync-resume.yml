name: Cloud Run deployment evidence

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29625346221 --repo "$GITHUB_REPOSITORY" --json status,conclusion,jobs
          gh run view 29625346221 --repo "$GITHUB_REPOSITORY" --log | grep -E 'Service|Revision|URL|Readiness|c6530f18792b498d5603885d5871f4ecdf91979d' | tail -n 60
