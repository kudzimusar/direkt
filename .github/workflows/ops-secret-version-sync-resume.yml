name: Active Cloud Run deployment diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print active deployment state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow cloud-run-development-deploy.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Deployment run ID: ${RUN_ID}"
          gh run view "${RUN_ID}" --repo "$GITHUB_REPOSITORY" --json status,conclusion,jobs
