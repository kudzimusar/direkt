name: Cloud Run final evidence

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print final deployment evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LOG_FILE="$RUNNER_TEMP/cloud-run.log"
          gh run view 29625346221 --repo "$GITHUB_REPOSITORY" --log > "$LOG_FILE"
          echo "Secret version evidence:"
          grep -E 'DIREKT_(DATABASE_URL|SUPABASE_URL|SUPABASE_SECRET_KEY|ACCESS_TOKEN|CONTACT_HASH_PEPPER|CHALLENGE_HASH_PEPPER)_SECRET_VERSION: [0-9]+' "$LOG_FILE" \
            | sed -E 's/^.*  (DIREKT_[A-Z_]+_SECRET_VERSION: [0-9]+)$/\1/' \
            | sort -u
          echo "Deployment evidence:"
          grep -E 'digest: sha256:|Service \[direkt-api\]|revision|Service URL|Readiness: passed|readiness smoke test' "$LOG_FILE" \
            | tail -n 30
