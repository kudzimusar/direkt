name: Secret version sync resume

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-secret-version-sync-resume.yml

permissions:
  actions: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch reviewed version synchronization
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "started=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          gh workflow run cloud-run-secret-version-sync.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f confirmation=SYNC-DIREKT-SECRET-VERSIONS

      - name: Wait for synchronization result
        env:
          GH_TOKEN: ${{ github.token }}
          STARTED: ${{ steps.dispatch.outputs.started }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow cloud-run-secret-version-sync.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$STARTED\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$RUN_ID" && break
            sleep 5
          done
          test -n "$RUN_ID"
          echo "Secret synchronization run ID: $RUN_ID"
          gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
