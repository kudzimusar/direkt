name: Stage 7G field audit type fix once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7g-field-audit-type-fix-once.yml"

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'activate Stage 7G field audit type fix')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Align exact optional property contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/src/operations/operations-field.repository.ts')
          text = path.read_text()
          marker = '      requestId?: string;'
          if text.count(marker) != 1:
              raise SystemExit(f'field audit requestId marker count={text.count(marker)}')
          path.write_text(text.replace(marker, '      requestId: string | undefined;', 1))
          PY
      - name: Commit and remove helper
        shell: bash
        run: |
          rm .github/workflows/stage7g-field-audit-type-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/src/operations/operations-field.repository.ts .github/workflows/stage7g-field-audit-type-fix-once.yml
          git diff --cached --check
          git commit -m "fix: align Stage 7 field audit request identifier type"
          git push origin HEAD:build/android-v1

# second-commit activation marker
