name: DIREKT Secret Manager version sync

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type SYNC-DIREKT-SECRET-VERSIONS to continue
        required: true
        type: string

permissions:
  actions: write
  contents: read
  id-token: write

concurrency:
  group: direkt-secret-version-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Pin enabled Secret Manager versions
    if: github.ref == 'refs/heads/main'
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Validate synchronization control
        run: test "${{ inputs.confirmation }}" = "SYNC-DIREKT-SECRET-VERSIONS"

      - name: Authenticate to Google Cloud with GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve and pin enabled versions
        shell: bash
        run: |
          set -euo pipefail

          mappings=(
            "DIREKT_DATABASE_URL_SECRET_VERSION:direkt-database-url"
            "DIREKT_SUPABASE_URL_SECRET_VERSION:direkt-supabase-url"
            "DIREKT_SUPABASE_SECRET_KEY_SECRET_VERSION:direkt-supabase-secret-key"
            "DIREKT_ACCESS_TOKEN_SECRET_VERSION:direkt-access-token-secret"
            "DIREKT_CONTACT_HASH_PEPPER_SECRET_VERSION:direkt-contact-hash-pepper"
            "DIREKT_CHALLENGE_HASH_PEPPER_SECRET_VERSION:direkt-challenge-hash-pepper"
          )

          for mapping in "${mappings[@]}"; do
            variable_name="${mapping%%:*}"
            secret_name="${mapping#*:}"
            version_path="$(gcloud secrets versions list "${secret_name}" \
              --project "${GCP_PROJECT_ID}" \
              --filter='state=ENABLED' \
              --sort-by='~createTime' \
              --limit=1 \
              --format='value(name)')"
            version="${version_path##*/}"

            if [[ ! "${version}" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error title=Enabled secret version missing::${secret_name} has no enabled numeric version."
              exit 1
            fi

            if gh api "repos/${GITHUB_REPOSITORY}/actions/variables/${variable_name}" >/dev/null 2>&1; then
              gh api --method PATCH \
                "repos/${GITHUB_REPOSITORY}/actions/variables/${variable_name}" \
                -f name="${variable_name}" \
                -f value="${version}" >/dev/null
            else
              gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/actions/variables" \
                -f name="${variable_name}" \
                -f value="${version}" >/dev/null
            fi

            echo "${variable_name}=${version}" >> "${GITHUB_STEP_SUMMARY}"
          done
