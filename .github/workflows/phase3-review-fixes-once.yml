name: DIREKT Phase 3 Review Fixes Once

on:
  push:
    branches: [build/android-v1]
    paths: [.github/workflows/phase3-review-fixes-once.yml]

permissions:
  contents: write

concurrency:
  group: direkt-phase3-review-fixes-once
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply review fixes and regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path('database/migrations/202607142330_provider_category_core.sql')
          text = migration.read_text()
          old = 'BEFORE UPDATE OR DELETE ON catalog.requirements'
          new = 'BEFORE INSERT OR UPDATE OR DELETE ON catalog.requirements'
          if old not in text:
              raise SystemExit('Requirement mutation trigger definition was not found')
          migration.write_text(text.replace(old, new, 1))

          integration = Path('backend/direkt-api/test/integration/provider-category.integration.spec.ts')
          text = integration.read_text()
          needle = """    await expect(
              pool.query(
                `UPDATE catalog.requirements
                 SET guidance = 'Silently rewritten guidance'
                 WHERE requirement_version_id = $1`,
                [versionId],
              ),
            ).rejects.toThrow(/immutable/i);
          """
          addition = needle + """
            await expect(
              pool.query(
                `INSERT INTO catalog.requirements (
                   requirement_version_id,
                   requirement_key,
                   label,
                   requirement_kind,
                   required,
                   guidance
                 ) VALUES (
                   $1,
                   'late_requirement',
                   'Late requirement',
                   'experience',
                   true,
                   'This insert must be rejected for an active requirement version.'
                 )`,
                [versionId],
              ),
            ).rejects.toThrow(/immutable/i);
          """
          if needle not in text:
              raise SystemExit('Active requirement update regression was not found')
          integration.write_text(text.replace(needle, addition, 1))

          e2e = Path('backend/direkt-api/test/e2e/provider-core.e2e.spec.ts')
          text = e2e.read_text()
          marker = """  it('rejects pathway and operating-model combinations that lack required fields', async () => {
          """
          regression = """  it('maps customer profile constraint failures to HTTP 400', async () => {
            await request(httpServer())
              .put('/api/v1/account/profile')
              .set('authorization', `Bearer ${owner.accessToken}`)
              .send({ displayName: '  ' })
              .expect(400);
          });

          """
          if marker not in text:
              raise SystemExit('Provider e2e insertion point was not found')
          e2e.write_text(text.replace(marker, regression + marker, 1))
          PY
      - name: Format and typecheck backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run typecheck
      - name: Commit review fixes and remove this workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase3-review-fixes-once.yml
          git add database/migrations/202607142330_provider_category_core.sql \
            backend/direkt-api/test/integration/provider-category.integration.spec.ts \
            backend/direkt-api/test/e2e/provider-core.e2e.spec.ts
          git commit -m "fix(phase3): close category immutability review gaps"
          git push origin HEAD:build/android-v1