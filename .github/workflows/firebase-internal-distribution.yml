name: DIREKT Firebase internal Android distribution

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DISTRIBUTE-DIREKT-INTERNAL to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-firebase-internal-distribution
  cancel-in-progress: false

jobs:
  distribute:
    name: Build and distribute the controlled debug APK
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_PROJECT_NUMBER: "264358173369"
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      FIREBASE_PACKAGE_NAME: com.kudzimusar.direkt.debug
      FIREBASE_TESTER_GROUP: direkt-internal-testers
      FIREBASE_TOOLS_VERSION: 15.23.0
      DIREKT_GRADLE_VERSION: "9.4.0"

    steps:
      - name: Validate distribution controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DISTRIBUTE-DIREKT-INTERNAL"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact reviewed source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.source_sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${{ inputs.source_sha }}" origin/main

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure pinned Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}

      - name: Bootstrap standard Gradle wrapper JAR
        working-directory: android/direkt-app
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            wrapper_checksum="$(sed -n 's/^distributionSha256Sum=//p' gradle/wrapper/gradle-wrapper.properties)"
            [[ "${wrapper_checksum}" =~ ^[0-9a-f]{64}$ ]]
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin \
              --gradle-distribution-sha256-sum "${wrapper_checksum}"
          fi
          chmod +x gradlew
          ./gradlew --version

      - name: Build exact debug APK
        working-directory: android/direkt-app
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean testDebugUnitTest lintDebug assembleDebug
          APK_PATH="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*-debug.apk' | head -n 1)"
          test -n "${APK_PATH}"
          test -s "${APK_PATH}"
          echo "APK_PATH=${PWD}/${APK_PATH}" >> "${GITHUB_ENV}"
          echo "APK_SHA256=$(sha256sum "${APK_PATH}" | awk '{print $1}')" >> "${GITHUB_ENV}"
          echo "APK_BYTES=$(stat -c '%s' "${APK_PATH}")" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve exact Firebase Android app
        shell: bash
        run: |
          set -euo pipefail
          token="$(gcloud auth print-access-token)"
          echo "::add-mask::${token}"
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${token}" \
            "https://firebase.googleapis.com/v1beta1/projects/${GCP_PROJECT_ID}/androidApps?pageSize=100" \
            > "${RUNNER_TEMP}/firebase-android-apps.json"

          FIREBASE_APP_ID="$(jq -r --arg package "${FIREBASE_PACKAGE_NAME}" '[.apps[]? | select(.packageName == $package) | .appId][0] // empty' "${RUNNER_TEMP}/firebase-android-apps.json")"
          if [[ -z "${FIREBASE_APP_ID}" ]]; then
            echo "::error title=Firebase Android app missing::No Firebase Android app is registered for ${FIREBASE_PACKAGE_NAME} in ${GCP_PROJECT_ID}."
            jq -r '[.apps[]? | .packageName] | sort | .[]' "${RUNNER_TEMP}/firebase-android-apps.json" || true
            exit 1
          fi
          echo "FIREBASE_APP_ID=${FIREBASE_APP_ID}" >> "${GITHUB_ENV}"

      - name: Verify internal tester group
        shell: bash
        run: |
          set -euo pipefail
          token="$(gcloud auth print-access-token)"
          echo "::add-mask::${token}"
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${token}" \
            "https://firebaseappdistribution.googleapis.com/v1/projects/${GCP_PROJECT_NUMBER}/groups/${FIREBASE_TESTER_GROUP}" \
            > "${RUNNER_TEMP}/firebase-group.json"
          jq -e \
            --arg expected "projects/${GCP_PROJECT_NUMBER}/groups/${FIREBASE_TESTER_GROUP}" \
            '.name == $expected' \
            "${RUNNER_TEMP}/firebase-group.json" >/dev/null

      - name: Distribute APK to internal group only
        shell: bash
        run: |
          set -euo pipefail
          notes="DIREKT Phase 10 synthetic-only internal build from ${{ inputs.source_sha }}. No pilot, public release, real participant data or payment activation."
          npx --yes "firebase-tools@${FIREBASE_TOOLS_VERSION}" appdistribution:distribute "${APK_PATH}" \
            --app "${FIREBASE_APP_ID}" \
            --groups "${FIREBASE_TESTER_GROUP}" \
            --release-notes "${notes}" \
            --json > "${RUNNER_TEMP}/firebase-distribution.json"
          jq -e '.status == "success" or (.result != null)' "${RUNNER_TEMP}/firebase-distribution.json" >/dev/null

      - name: Publish sanitized distribution summary
        shell: bash
        run: |
          {
            echo "### DIREKT Firebase internal distribution"
            echo "- Source: `${{ inputs.source_sha }}`"
            echo "- Package: `${FIREBASE_PACKAGE_NAME}`"
            echo "- Tester group: `${FIREBASE_TESTER_GROUP}`"
            echo "- APK bytes: `${APK_BYTES}`"
            echo "- APK SHA-256: `${APK_SHA256}`"
            echo "- Distribution: internal only"
            echo "- Public release: disabled"
          } >> "${GITHUB_STEP_SUMMARY}"
