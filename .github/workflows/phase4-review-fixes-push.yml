name: Phase 4 review fix runner

on:
  push:
    branches: [build/android-v1]
    paths:
      - "scripts/phase4-review-fixes.py"
      - ".github/workflows/phase4-review-fixes-push.yml"
      - "backend/direkt-api/**"
      - "database/migrations/**"

permissions:
  contents: write

concurrency:
  group: direkt-phase4-review-fix-runner
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Apply reviewed fixes
        run: python3 scripts/phase4-review-fixes.py

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Format backend changes
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format

      - name: Commit reviewed implementation
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- backend/direkt-api database/migrations)" ]; then
            echo "Review fixes are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api database/migrations
          git commit -m "fix(verification): resolve Phase 4 review findings"
          git push origin HEAD:build/android-v1
