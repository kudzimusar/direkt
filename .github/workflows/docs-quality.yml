name: Documentation quality

on:
  push:
    branches: [main, build/android-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direkt-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Commit staged Phase 6 record
        shell: bash
        run: |
          if [[ -f .github/scripts/promote-phase6-record.py ]]; then
            python .github/scripts/promote-phase6-record.py
            git fetch origin main
            git checkout origin/main -- .github/workflows/docs-quality.yml
            rm .github/scripts/promote-phase6-record.py
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --check
            git commit -m "docs: promote Phase 6 final-validation record"
            git push origin HEAD:build/android-v1
          fi
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt
      - name: Validate documentation
        run: python scripts/validate_docs.py
      - name: Package downloadable planning archive
        run: python scripts/package_planning_docs.py
      - name: Build Pages source
        run: python scripts/build_pages_source.py
      - name: Build MkDocs strictly
        shell: bash
        run: |
          mkdir -p artifacts/docs
          set -o pipefail
          mkdocs build --strict 2>&1 | tee artifacts/docs/mkdocs.txt
      - name: Upload documentation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-docs-reports-${{ github.run_number }}-${{ github.sha }}
          path: artifacts/docs/**
          if-no-files-found: warn
          retention-days: 14
