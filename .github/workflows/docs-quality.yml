name: Documentation quality

on:
  push:
    branches: [main, build/android-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Materialize staged Phase 6 record
        shell: bash
        run: |
          mkdir -p artifacts/docs/phase6-record
          python .github/scripts/promote-phase6-record.py
          cp PROJECT_STATUS.md artifacts/docs/phase6-record/PROJECT_STATUS.md
          cp WORKSTREAM_LOCK.md artifacts/docs/phase6-record/WORKSTREAM_LOCK.md
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt
      - name: Validate documentation
        run: python scripts/validate_docs.py
      - name: Package downloadable planning archive
        run: python scripts/package_planning_docs.py
      - name: Build Pages source
        run: python scripts/build_pages_source.py
      - name: Build MkDocs strictly
        shell: bash
        run: |
          mkdir -p artifacts/docs
          set -o pipefail
          mkdocs build --strict 2>&1 | tee artifacts/docs/mkdocs.txt
      - name: Upload documentation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-docs-reports-${{ github.run_number }}-${{ github.sha }}
          path: artifacts/docs/**
          if-no-files-found: warn
          retention-days: 14
