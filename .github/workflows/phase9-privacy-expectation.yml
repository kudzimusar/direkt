name: Phase 9 privacy expectation correction

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase9-privacy-expectation.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - run: python3 .github/scripts/phase9_privacy_expectation.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/commercial-lifecycle.e2e.spec.ts
          git commit -m "test(commercial): assert actual contact values remain absent"
          git push origin HEAD:build/android-v1
