name: DIREKT Phase 11 activator repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Repair activator boundaries and lifecycle
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/direkt-api/scripts/phase11-synthetic-pilot.ts')
          text = path.read_text()

          activation_start = text.index('function requireSyntheticActivation(): void {')
          activation_end = text.index('\n\nasync function assertCleanSyntheticTarget', activation_start)
          activation = """function requireSyntheticActivation(): void {
            const dataMode = process.env.DIREKT_DATA_MODE;
            const activation = process.env.PHASE11_SYNTHETIC_PILOT_ACTIVATION;
            const pilotEntryApproved = process.env.PILOT_ENTRY_APPROVED;
            if (process.env.NODE_ENV === 'production') {
              throw new Error('Phase 11 synthetic pilot seeding is prohibited in NODE_ENV=production.');
            }
            if (dataMode !== 'synthetic-only') {
              throw new Error(
                'Phase 11 synthetic pilot seeding requires explicit DIREKT_DATA_MODE=synthetic-only.',
              );
            }
            if (pilotEntryApproved !== 'false') {
              throw new Error(
                'Phase 11 synthetic pilot seeding requires explicit PILOT_ENTRY_APPROVED=false.',
              );
            }
            if (activation !== 'true') {
              throw new Error(
                'Set PHASE11_SYNTHETIC_PILOT_ACTIVATION=true to seed the bounded synthetic cohort.',
              );
            }
          }"""
          text = text[:activation_start] + activation + text[activation_end:]

          loop_start = text.index(
              '  for (const requirement of requirements.rows) {',
              text.index('async function seedProvider'),
          )
          loop_end = text.index(
              '\n\n  const publication = await client.query<{ publication_id: string }>(',
              loop_start,
          )
          lifecycle = """  for (const requirement of requirements.rows) {
            const lifecycleIndex = globalIndex * 10 + requirements.rows.indexOf(requirement) + 1;
            const caseId = deterministicUuid('11040000', lifecycleIndex);
            const uploadSessionId = deterministicUuid('11080000', lifecycleIndex);
            const evidenceId = deterministicUuid('11081000', lifecycleIndex);
            const evidenceVersionId = deterministicUuid('11082000', lifecycleIndex);
            const objectKey = `private/${providerId}/${uploadSessionId}/${evidenceVersionId}`;
            const evidenceSha256 = sha256(
              `phase11-synthetic-evidence:${providerId}:${requirement.requirement_key}`,
            );
            const documentType = `${requirement.requirement_key}_fixture`;

            await client.query(
              `INSERT INTO verification.cases (
                 id, provider_id, category_id, requirement_version_id, requirement_id,
                 check_key, check_family, policy_version, created_by_identity_id
               ) VALUES ($1, $2, $3, $4, $5, $6, $7, $8, $9)`,
              [
                caseId,
                providerId,
                category.categoryId,
                category.requirementVersionId,
                requirement.id,
                `${requirement.requirement_key}_check`,
                requirement.requirement_kind === 'identity'
                  ? 'representative_identity'
                  : 'category_eligibility',
                POLICY_VERSION,
                ownerIdentityId,
              ],
            );
            await client.query(
              `UPDATE verification.cases
               SET status = 'awaiting_evidence'
               WHERE id = $1 AND status = 'draft'`,
              [caseId],
            );

            await client.query(
              `INSERT INTO evidence.upload_sessions (
                 id, provider_id, requirement_id, created_by_identity_id, evidence_class,
                 document_type, object_key, expected_content_type, max_bytes,
                 consent_confirmed, status, expires_at, completed_at
               ) VALUES (
                 $1, $2, $3, $4, $5, $6, $7, 'application/pdf', 4096,
                 true, 'completed', now() + interval '1 hour', now()
               )`,
              [
                uploadSessionId,
                providerId,
                requirement.id,
                ownerIdentityId,
                requirement.requirement_kind,
                documentType,
                objectKey,
              ],
            );
            await client.query(
              `INSERT INTO evidence.items (
                 id, provider_id, requirement_id, submitted_by_identity_id, status, retention_class
               ) VALUES ($1, $2, $3, $4, 'processing', 'short')`,
              [evidenceId, providerId, requirement.id, ownerIdentityId],
            );
            await client.query(
              `INSERT INTO evidence.versions (
                 id, evidence_id, version_number, upload_session_id, object_key, evidence_class,
                 document_type, content_type, size_bytes, sha256, processing_status,
                 submitted_by_identity_id
               ) VALUES (
                 $1, $2, 1, $3, $4, $5, $6, 'application/pdf', 2048, $7, 'clean', $8
               )`,
              [
                evidenceVersionId,
                evidenceId,
                uploadSessionId,
                objectKey,
                requirement.requirement_kind,
                documentType,
                evidenceSha256,
                ownerIdentityId,
              ],
            );
            await client.query(
              `UPDATE evidence.items
               SET current_version_id = $2, status = 'ready_for_review'
               WHERE id = $1 AND status = 'processing'`,
              [evidenceId, evidenceVersionId],
            );
            await client.query(
              `INSERT INTO verification.case_evidence (case_id, evidence_id, linked_by_identity_id)
               VALUES ($1, $2, $3)`,
              [caseId, evidenceId, ownerIdentityId],
            );
            await client.query(
              `UPDATE verification.cases
               SET status = 'ready_for_review'
               WHERE id = $1 AND status = 'awaiting_evidence'`,
              [caseId],
            );
            await client.query(
              `INSERT INTO verification.assignments (
                 case_id, assignee_identity_id, assignment_kind, assigned_by_identity_id, reason
               ) VALUES ($1, $2, 'reviewer', $2, $3)`,
              [caseId, REVIEWER_ID, 'Independent Phase 11 synthetic review assignment'],
            );
            await client.query(
              `UPDATE verification.cases
               SET status = 'assigned'
               WHERE id = $1 AND status = 'ready_for_review'`,
              [caseId],
            );
            await client.query(
              `UPDATE verification.cases
               SET status = 'in_review'
               WHERE id = $1 AND status = 'assigned'`,
              [caseId],
            );
            await client.query(
              `INSERT INTO verification.recommendations (
                 case_id, reviewer_identity_id, result, reason_code, rationale,
                 limitation, recommended_valid_until
               ) VALUES ($1, $2, 'approve', 'CHECK_PASSED', $3, $4, $5)`,
              [
                caseId,
                REVIEWER_ID,
                `Synthetic reviewer recommendation for ${requirement.requirement_key}; functional validation only.`,
                'Synthetic-only evidence fixture; no real-world competence, licence, identity or field-visit guarantee.',
                CLAIM_VALID_UNTIL,
              ],
            );
            await client.query(
              `SELECT verification.record_decision(
                 $1, $2, 'approved', 'CHECK_PASSED', $3, $4, $5, $6, $7, $8
               )`,
              [
                caseId,
                REVIEWER_ID,
                `Synthetic scoped ${requirement.requirement_key} check passed for functional validation only.`,
                `${requirement.requirement_key}_checked`,
                `${requirement.requirement_key.replaceAll('_', ' ')} checked in synthetic demo`,
                'Synthetic functional evidence only; this is not a real-world guarantee, licence or participant finding.',
                CLAIM_VALID_UNTIL,
                POLICY_VERSION,
              ],
            );
          }"""
          text = text[:loop_start] + lifecycle + text[loop_end:]

          text = text.replace(
              '    cases: string;\n    claims: string;',
              '    cases: string;\n    approved_cases: string;\n    upload_sessions: string;\n    evidence_items: string;\n    evidence_versions: string;\n    case_evidence_links: string;\n    assignments: string;\n    recommendations: string;\n    claims: string;',
              1,
          )
          text = text.replace(
              "       (SELECT count(*) FROM verification.cases WHERE policy_version = $2)::text AS cases,\n       (SELECT count(*) FROM verification.claims WHERE policy_version = $2 AND status = 'active')::text AS claims,",
              "       (SELECT count(*) FROM verification.cases WHERE policy_version = $2)::text AS cases,\n       (SELECT count(*) FROM verification.cases WHERE policy_version = $2 AND status = 'approved')::text AS approved_cases,\n       (SELECT count(*) FROM evidence.upload_sessions WHERE status = 'completed' AND object_key LIKE 'private/1102%')::text AS upload_sessions,\n       (SELECT count(*) FROM evidence.items WHERE status = 'approved' AND provider_id::text LIKE '11020000-%')::text AS evidence_items,\n       (SELECT count(*) FROM evidence.versions WHERE processing_status = 'clean' AND object_key LIKE 'private/1102%')::text AS evidence_versions,\n       (SELECT count(*) FROM verification.case_evidence AS links JOIN verification.cases AS cases ON cases.id = links.case_id WHERE cases.policy_version = $2)::text AS case_evidence_links,\n       (SELECT count(*) FROM verification.assignments AS assignments JOIN verification.cases AS cases ON cases.id = assignments.case_id WHERE cases.policy_version = $2 AND assignments.assignment_kind = 'reviewer')::text AS assignments,\n       (SELECT count(*) FROM verification.recommendations AS recommendations JOIN verification.cases AS cases ON cases.id = recommendations.case_id WHERE cases.policy_version = $2 AND recommendations.result = 'approve')::text AS recommendations,\n       (SELECT count(*) FROM verification.claims WHERE policy_version = $2 AND status = 'active')::text AS claims,",
              1,
          )
          text = text.replace(
              '    cases: 48,\n    claims: 48,',
              '    cases: 48,\n    approved_cases: 48,\n    upload_sessions: 48,\n    evidence_items: 48,\n    evidence_versions: 48,\n    case_evidence_links: 48,\n    assignments: 48,\n    recommendations: 48,\n    claims: 48,',
              1,
          )
          path.write_text(text)
          PY
      - name: Format activator
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npx prettier --write scripts/phase11-synthetic-pilot.ts
      - name: Commit activator repair
        shell: bash
        run: |
          if git diff --quiet -- backend/direkt-api/scripts/phase11-synthetic-pilot.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/scripts/phase11-synthetic-pilot.ts
          git commit -m "fix: enforce synthetic pilot lifecycle boundaries"
          git push origin HEAD:${{ github.head_ref }}
