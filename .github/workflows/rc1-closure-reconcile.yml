name: RC1 closure reconcile

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'integration/rc1-resend-closure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc1-resend-closure
          fetch-depth: 0

      - name: Reconcile RC1 closure documents
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_line(path: str, prefix: str, replacement: str):
              p = Path(path)
              text = p.read_text()
              pattern = rf'^{re.escape(prefix)}.*$'
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)
              if count == 0 and replacement not in text:
                  raise SystemExit(f'missing line prefix in {path}: {prefix}')
              p.write_text(updated)

          replace_line('WORKSTREAM_LOCK.md', '| Status |', '| Status | RELEASED — RC1 Resend closed; RC2 Sentry is next |')
          replace_line('WORKSTREAM_LOCK.md', '| Authorized scope |', '| Authorized scope | RC1 closure evidence only on this branch; no new integration runtime source changes until the RC1 closure PR merges and RC2 is separately claimed |')
          replace_line('WORKSTREAM_LOCK.md', '| Implementation branch |', '| Implementation branch | `integration/rc1-resend-closure` from `main` after RC1 source/runtime hotfixes; RC2 must start from the merged RC1 closure baseline |')
          replace_line('WORKSTREAM_LOCK.md', '| Stable baseline |', '| Stable baseline | RC1 source PR #269 merged; managed Resend canary execution `direkt-resend-canary-ct9mp` completed successfully on exact source `8e367f47f16b3f9f28a26a62ee8bdd305a286153`; reporting compatibility hotfix PR #272 merged at `d704d29a11719c6a05582e58b492479feedebf68` |')
          replace_line('WORKSTREAM_LOCK.md', '| Current task |', '| Current task | RC1 closure promotion complete in this branch; next bounded checkpoint after merge is RC2 — Sentry API/portal runtime observability closure |')
          replace_line('WORKSTREAM_LOCK.md', '- RC1 — Resend runtime email adapter', '- RC1 — Resend runtime email adapter through the transactional outbox, idempotency/retry/privacy/templates and managed canary. **Closed — source PR #269; managed execution `direkt-resend-canary-ct9mp` succeeded on exact source `8e367f47f16b3f9f28a26a62ee8bdd305a286153`; workflow-reporting hotfixes #271/#272 merged. Real-participant/production email remains disabled.**')

          p = Path('docs/integrations/RESEND_RUNTIME_CLOSURE.md')
          text = p.read_text()
          text = re.sub(r'^\*\*Source status:\*\*.*$', '**Source status:** `ACTIVE — SYNTHETIC-ONLY MANAGED CANARY PROVEN`', text, count=1, flags=re.MULTILINE)
          receipt = '''## Managed-phase closure receipt

RC1 managed proof is complete for the approved synthetic-only boundary:

- source PR: #269;
- exact canary source: `8e367f47f16b3f9f28a26a62ee8bdd305a286153`;
- Cloud Run Job: `direkt-resend-canary`;
- execution: `direkt-resend-canary-ct9mp`;
- region: `asia-northeast1`;
- runtime identity: `direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com`;
- sender: `DIREKT <canary@notify.direkt.forum>`;
- recipient: Resend delivered test sink `delivered@resend.dev`;
- Resend API key: sending-access only, restricted to `notify.direkt.forum`;
- Secret Manager: `direkt-resend-api-key` version `1` enabled;
- Cloud Run execution result: completed successfully.

The canary executable exits successfully only after `EmailOutboxService.runSyntheticCanary()` returns a receipt whose event has been marked `published`; therefore the successful Cloud Run execution is managed evidence for the full outbox insert → claim → Resend send → durable published-state path.

Two pre-send workflow defects were found and repaired: deployer secret-version metadata permission and a shell-quoting defect in the secret-pin guard. After those fixes, execution `direkt-resend-canary-ct9mp` completed successfully. The workflow then failed only in a post-success execution-name lookup because the runner's installed `gcloud` lacked `describe-latest`; PR #272 replaced that reporting lookup with the compatible executions-list path. No additional duplicate send was required to prove the already-successful canary.

RC1 promotion is intentionally narrow: **synthetic-only managed Resend delivery is proven; continuous external delivery, controlled-pilot participant email and production email remain disabled and require separate authorization.**

'''
          if '## Managed-phase closure receipt' not in text:
              marker = '## Stop conditions\n'
              if marker not in text:
                  raise SystemExit('missing RESEND stop-condition marker')
              text = text.replace(marker, receipt + marker, 1)
          p.write_text(text)

          replace_line('docs/integrations/CURRENT_INTEGRATION_STATUS.md', '| Resend |', '| Resend | **ACTIVE — SYNTHETIC-ONLY MANAGED CANARY** | Provider-neutral HTTP adapter and transactional-outbox consumer are proven through Cloud Run execution `direkt-resend-canary-ct9mp` on exact source `8e367f47f16b3f9f28a26a62ee8bdd305a286153`; the durable path reached `published`. Sending key is sending-only/domain-restricted to verified `notify.direkt.forum`; `direkt-resend-api-key` v1 is enabled. Continuous, controlled-pilot participant and production external email remain disabled. |')
          replace_line('docs/integrations/CURRENT_INTEGRATION_STATUS.md', 'RC1 source integration', 'RC1 is closed for the approved synthetic-only boundary: least-privilege key/domain restriction and runtime secret access are proven, and managed Cloud Run execution `direkt-resend-canary-ct9mp` completed the exact-source outbox-to-Resend path successfully. This does not authorize continuous, controlled-pilot participant or production external email.')

          replace_line('docs/integrations/LIVE_INTEGRATION_LEDGER.md', '| Resend |', '| Resend | `ACTIVE — SYNTHETIC-ONLY MANAGED CANARY` | Managed Cloud Run execution `direkt-resend-canary-ct9mp` succeeded on exact source `8e367f47f16b3f9f28a26a62ee8bdd305a286153`, proving outbox insert → claim → Resend send → durable `published` state. Sending key is sending-only/domain-restricted to verified `notify.direkt.forum`; `direkt-resend-api-key` v1 enabled; runtime secret access proven. Continuous, controlled-pilot participant and production email remain disabled. |')
          replace_line('docs/integrations/LIVE_INTEGRATION_LEDGER.md', '3. RC1 Resend', '3. RC1 Resend — **CLOSED — ACTIVE SYNTHETIC-ONLY MANAGED CANARY**. Source PR #269 merged; least-privilege sending/domain restriction and runtime secret access proven; Cloud Run execution `direkt-resend-canary-ct9mp` succeeded on exact source `8e367f47f16b3f9f28a26a62ee8bdd305a286153`; workflow-reporting compatibility hotfixes #271/#272 merged. Real-participant/production email remains disabled.')
          replace_line('docs/integrations/LIVE_INTEGRATION_LEDGER.md', '4. RC2 Sentry API/portal', '4. RC2 Sentry API/portal — **NEXT CHECKPOINT after RC1 closure merge.**')
          PY

          git diff --check
          if git diff --quiet; then
            echo 'RC1 closure documents already reconciled.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add WORKSTREAM_LOCK.md docs/integrations/RESEND_RUNTIME_CLOSURE.md docs/integrations/CURRENT_INTEGRATION_STATUS.md docs/integrations/LIVE_INTEGRATION_LEDGER.md
          git commit -m 'docs: close RC1 Resend managed canary'
          git push origin HEAD:integration/rc1-resend-closure
