name: DIREKT Android Tester Distribution

on:
  workflow_dispatch:
    inputs:
      tester_groups:
        description: Firebase App Distribution tester group aliases, comma-separated
        required: true
        default: direkt-testers
        type: string
      release_notes:
        description: Release notes shown to testers
        required: true
        default: Manual DIREKT Android test build
        type: string

permissions:
  contents: read

concurrency:
  group: direkt-android-tester-distribution
  cancel-in-progress: false

env:
  ANDROID_PROJECT_DIR: android/direkt-app

jobs:
  distribute:
    name: Build and distribute test APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify project and required secrets
        shell: bash
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          test -f "${ANDROID_PROJECT_DIR}/gradlew" || {
            echo "Android project is not yet scaffolded at ${ANDROID_PROJECT_DIR}." >&2
            exit 1
          }
          test -n "$FIREBASE_ANDROID_APP_ID" || {
            echo "Missing repository secret: FIREBASE_ANDROID_APP_ID" >&2
            exit 1
          }
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || {
            echo "Missing repository secret: FIREBASE_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          }

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build test APK
        working-directory: android/direkt-app
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace testDebugUnitTest lintDebug assembleDebug

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(find "${ANDROID_PROJECT_DIR}" -path '*/build/outputs/apk/debug/*.apk' -type f | head -n 1)"
          test -n "$APK_PATH" || {
            echo "No debug APK was produced." >&2
            exit 1
          }
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js for Firebase CLI
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Prepare Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_PATH"
          chmod 600 "$CREDENTIALS_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Distribute APK to Firebase testers
        shell: bash
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          TESTER_GROUPS: ${{ inputs.tester_groups }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -euo pipefail
          npx --yes firebase-tools@latest appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups "$TESTER_GROUPS" \
            --release-notes "$RELEASE_NOTES"

      - name: Retain distributed APK in GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: direkt-distributed-apk-${{ github.run_number }}-${{ github.sha }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish distribution summary
        shell: bash
        env:
          TESTER_GROUPS: ${{ inputs.tester_groups }}
        run: |
          echo "### DIREKT tester distribution" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tester groups: \`${TESTER_GROUPS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: Firebase App Distribution" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build type: debug APK for controlled pre-release testing" >> "$GITHUB_STEP_SUMMARY"
