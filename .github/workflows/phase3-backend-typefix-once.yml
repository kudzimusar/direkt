name: DIREKT Phase 3 Backend Type Fix Once

on:
  push:
    branches: [build/android-v1]
    paths: [.github/workflows/phase3-backend-typefix-once.yml]

permissions:
  contents: write

concurrency:
  group: direkt-phase3-backend-typefix-once
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Correct exact optional audit contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/direkt-api/src/provider-core/provider.repository.ts')
          text = path.read_text()
          old = '      requestId?: string;\n'
          new = '      requestId?: string | undefined;\n'
          if old not in text:
              raise SystemExit('Expected audit requestId contract was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Verify formatting and typecheck
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
          npm run typecheck
      - name: Commit fix and remove this workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase3-backend-typefix-once.yml
          git add backend/direkt-api/src/provider-core/provider.repository.ts
          git commit -m "fix(api): accept optional audit request IDs"
          git push origin HEAD:build/android-v1