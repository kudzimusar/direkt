name: Phase 10 Firebase distribution bridge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-firebase-distribution.yml

permissions:
  actions: write
  contents: read

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Dispatch internal Firebase distribution
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "started=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          gh workflow run firebase-internal-distribution.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f confirmation=DISTRIBUTE-DIREKT-INTERNAL \
            -f source_sha=c52b83deab1c5d49a47f9bc98b90e32d972d721b

      - name: Require internal distribution success
        env:
          GH_TOKEN: ${{ github.token }}
          STARTED: ${{ steps.dispatch.outputs.started }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow firebase-internal-distribution.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"$STARTED\")) | sort_by(.createdAt) | last | .databaseId // empty")
            test -n "$RUN_ID" && break
            sleep 5
          done
          test -n "$RUN_ID"
          echo "Firebase distribution run ID: $RUN_ID"
          gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
