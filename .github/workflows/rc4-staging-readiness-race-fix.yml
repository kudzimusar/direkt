name: DIREKT RC4 one-shot staging readiness race fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: direkt-rc4-staging-readiness-race-fix
  cancel-in-progress: false

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'integration/rc4-fcm' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm
          fetch-depth: 0
      - name: Replace temporary PostGIS readiness race with final-start readiness
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/staging-container-readiness.yml')
          text = path.read_text()
          old = '''          for attempt in {1..30}; do
            if docker exec direkt-postgres-readiness pg_isready -U direkt -d direkt_test >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "Disposable PostGIS did not become ready." >&2
              exit 1
            fi
            sleep 2
          done
'''
          new = '''          init_complete=false
          for attempt in {1..60}; do
            if docker logs direkt-postgres-readiness 2>&1 | grep -Fq "PostgreSQL init process complete; ready for start up."; then
              init_complete=true
              break
            fi
            if [[ "$(docker inspect --format='{{.State.Running}}' direkt-postgres-readiness)" != "true" ]]; then
              echo "Disposable PostGIS exited before initialization completed." >&2
              docker logs direkt-postgres-readiness >&2 || true
              exit 1
            fi
            sleep 1
          done
          if [[ "${init_complete}" != "true" ]]; then
            echo "Disposable PostGIS initialization did not complete." >&2
            exit 1
          fi

          stable_ready=0
          for attempt in {1..30}; do
            if docker exec direkt-postgres-readiness pg_isready -U direkt -d direkt_test >/dev/null 2>&1; then
              stable_ready=$((stable_ready + 1))
              if [[ "${stable_ready}" -ge 3 ]]; then
                break
              fi
            else
              stable_ready=0
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "Disposable PostGIS did not become stably ready after initialization." >&2
              exit 1
            fi
            sleep 1
          done
'''
          if old not in text:
              if 'PostgreSQL init process complete; ready for start up.' in text:
                  raise SystemExit(0)
              raise SystemExit('expected readiness fragment not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git diff --check
      - name: Commit readiness race fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/workflows/staging-container-readiness.yml; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/staging-container-readiness.yml
          git commit -m 'fix(ci): wait for final PostGIS readiness'
          git push origin HEAD:integration/rc4-fcm
