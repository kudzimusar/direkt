name: VC W5 diagnose once

on:
  push:
    branches:
      - vc/world-class-1-8
    paths:
      - ".github/workflows/vc-w5-diagnose-once.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: vc/world-class-1-8
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/direkt-app/package-lock.json
      - name: Install locked web dependencies
        working-directory: web/direkt-app
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture W5 verifier result
        id: verify
        continue-on-error: true
        working-directory: web/direkt-app
        shell: bash
        run: |
          set +e
          npm run verify:provider > ../../w5-diagnostic.txt 2>&1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          cat ../../w5-diagnostic.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: vc-w5-diagnostic
          path: w5-diagnostic.txt
          if-no-files-found: error
      - name: Fail if verifier failed
        if: steps.verify.outputs.exit_code != '0'
        run: exit 1
