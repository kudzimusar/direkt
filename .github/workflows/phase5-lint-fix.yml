name: Phase 5 lint fix

on:
  push:
    branches: [build/android-v1]
    paths:
      - ".github/workflows/phase5-lint-fix.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase5-lint-fix
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply type-only import correction
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npx eslint test/unit/discovery.service.spec.ts --fix
          npm run format:check
          npm run lint
          npm run typecheck
      - name: Commit clean source and remove helper
        shell: bash
        run: |
          rm .github/workflows/phase5-lint-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/unit/discovery.service.spec.ts \
                  .github/workflows/phase5-lint-fix.yml
          git diff --cached --check
          git commit -m "test: use type-only discovery repository import"
          git push origin HEAD:build/android-v1