name: Phase 5 checkpoint record

on:
  push:
    branches: [docs/phase5-checkpoint-record]
    paths:
      - ".github/workflows/phase5-checkpoint-record.yml"

permissions:
  contents: write

concurrency:
  group: direkt-phase5-checkpoint-record
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: docs/phase5-checkpoint-record
          fetch-depth: 0

      - name: Promote Phase 5 stable checkpoint
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          status_path = Path('PROJECT_STATUS.md')
          status = status_path.read_text()
          status = status.replace(
              '**Current programme state:** Phase 4 verification and private evidence engine is complete and stable. Phase 5 Android customer discovery is review-complete on an exact green implementation head and is awaiting final record validation and merge through PR #24.',
              '**Current programme state:** Phase 5 Android customer discovery is complete and stable. Phase 6 provider onboarding/workspace is not claimed.'
          )
          status = status.replace(
              '| Phase 5 Android customer discovery | Review complete; PR #24 final record validation pending |',
              '| Phase 5 Android customer discovery | Complete; PR #24 merged and Issue #23 closed |\n| Phase 6 provider onboarding/workspace | Not claimed |'
          )
          status = status.replace(
              'Issue #23 remains the sole active implementation tracker until PR #24 merges. Issue #5 remains a deliberate later validation obligation and is not a current implementation blocker.',
              'No implementation issue is currently active. Issue #5 remains a deliberate later validation obligation and is not a current implementation blocker.'
          )
          status = status.replace(
              'reviewed implementation head: 4107aff54b098d299fd41dd60f63256150aab573\nmerge commit: pending final record validation\nIssue #23: pending automatic closure on merge',
              'reviewed implementation head: 4107aff54b098d299fd41dd60f63256150aab573\nfinal validation head: 28f03c196f0c6dc47c77c61cbe70d6448d179755\nmerge commit: 11541db4d5ea856404f8fee03c0ca55cf6bab36c\nIssue #23: closed as completed'
          )
          status = status.replace('Exact reviewed-head evidence:', 'Final exact-head evidence:')
          status = status.replace(
              '| Backend/PostGIS | #358 | Passed | `3e2a0ed7e7fcb69f8f6e48d57477c478b587cbf1cbcb71dd818d0ba05e666afb` |\n| Android reports | #221 | Passed | `074e99ea0a56ed0961db938f60daa2391fa9b53b129cdca4b9f33b8ce80131bc` |\n| Operations portal | #222 | Passed | `8b09068672e8011fc1d51dfb588aca809e0c65ef8568ee22594d6495b9a8a892` |\n| Documentation quality | #670 | Passed | `343c734aebec30755cf620c57f1d1a5309d930e6d82784bba56ce0c53e0fdc80` |',
              '| Backend/PostGIS | #360 | Passed | `5346cbc1d9f791da03e0145daa315b1f4bede574b071bc567593f51edd828b79` |\n| Android reports | #223 | Passed | `f2f7e80e65db779a19dce8bf9f9bf1db66158a08dbebe2a920b4b8d0f1da31f8` |\n| Operations portal | #224 | Passed | `229d586e38f0f1e0a4189193987d00a10e484920cf397acda9bc8d82555a7807` |\n| Documentation quality | #674 | Passed | `421ef455e38c0daabdbe72fa1c833b9fe66930be37da4c4c9013f01249b09ec8` |'
          )
          status = status.replace(
              '| Debug APK | `adc9dc7d64793b66dea88d10dac9ff8d221cd9a9cd75a05eb367eba368315f63` |\n| Compose test APK | `fd6955fa8fd2d54ce65cab3456498f64df67213fc48b2dcc3441068860325cd9` |',
              '| Debug APK | `03c05a83b402da9e9edb020a7fe10da7792304d9f152b72ac05715b527517658` |\n| Compose test APK | `673675dad7b431d5953340c636d804dd231b200a48282d890be1f45a9697c6ec` |'
          )
          status += '\n\n## Next planned checkpoint\n\nPhase 6 provider onboarding/workspace is the next planned phase. It remains unclaimed until a new governing issue and workstream lock are created. Production integrations remain gated by the integration and secrets plan.\n'
          required = [
              'Phase 5 Android customer discovery is complete and stable',
              'merge commit: 11541db4d5ea856404f8fee03c0ca55cf6bab36c',
              '| Backend/PostGIS | #360 | Passed |',
              'Phase 6 provider onboarding/workspace is the next planned phase',
          ]
          for marker in required:
              if marker not in status:
                  raise SystemExit(f'Missing Phase 5 status marker: {marker}')
          status_path.write_text(status)

          lock_path = Path('WORKSTREAM_LOCK.md')
          lock_path.write_text('''# DIREKT Workstream Lock

This file prevents overlapping writes in the single-lane build process.

## Current lock

| Field | Value |
|---|---|
| Status | RELEASED |
| Owner/agent | None |
| Phase | None |
| Task | None |
| Modules/paths | None |
| Claimed at | — |
| Expected handoff | Phase 5 merged, Issue #23 closed, and implementation branch synchronized |
| Last clean checkpoint | `11541db4d5ea856404f8fee03c0ca55cf6bab36c` |
| Governing issue | None |

## Most recent completed workstream

```text
Phase:                    Phase 5 — Android customer discovery
Governing issue:          #23 — closed as completed
Pull request:             #24 — merged
Reviewed source head:     4107aff54b098d299fd41dd60f63256150aab573
Final validation head:    28f03c196f0c6dc47c77c61cbe70d6448d179755
Merge commit:             11541db4d5ea856404f8fee03c0ca55cf6bab36c
Backend/PostGIS CI:       #360 — passed
Android CI:               #223 — passed
Operations portal CI:     #224 — passed
Documentation quality:    #674 — passed
Review threads:           3 resolved with regressions
```

## Next claim

Phase 6 provider onboarding/workspace is not claimed. A new agent must create or confirm a governing issue, claim the lock, identify exact paths, and preserve all Phase 5 privacy/publication stop gates before implementation.

## Conflict rule

No active write lock exists. The first agent starting the next documented phase must claim this file before modifying shared implementation paths.
''')

          decisions_path = Path('DECISION_LOG.md')
          decisions = decisions_path.read_text()
          marker = '\n## How to add a decision\n'
          additions = '''| D-062 | 2026-07-15 | Public discovery uses an explicit policy-controlled provider/category publication record rather than profile completeness or a blanket discoverable flag | Makes publication auditable, reversible and dependent on current mandatory scoped claims | Accepted |
| D-063 | 2026-07-15 | Private base, consented public premises and non-private service area are separate location concepts | Prevents home/mobile-provider location leakage while supporting lawful point distance and service-area matching | Accepted |
| D-064 | 2026-07-15 | Mobile providers are never ranked by distance from a private base, and manual area selection remains a first-class customer path | Protects provider privacy and preserves access when device location is unavailable or declined | Accepted |
| D-065 | 2026-07-15 | Every public search, profile, claim and save read re-evaluates provider status, selected category/version and current mandatory claims | Prevents stale publication rows and saved entries from bypassing live enforcement or category removal | Accepted |
| D-066 | 2026-07-15 | Discovery ordering is deterministic and uses allowlisted evidence-backed explanations; payment cannot improve publication or ranking | Keeps customer-facing reasons interpretable and preserves commercial independence from trust | Accepted |
| D-067 | 2026-07-15 | Phase 5 retains a synthetic map/list abstraction and manual area fallback instead of activating production maps or location credentials | Allows product and privacy contracts to mature before vendor, cost and consent approval | Accepted with production stop gate |
'''
          if '| D-062 |' not in decisions:
              if marker not in decisions:
                  raise SystemExit('Decision-log insertion marker not found')
              decisions = decisions.replace(marker, additions + marker, 1)
          decisions_path.write_text(decisions)

          risks_path = Path('RISK_REGISTER.md')
          risks = risks_path.read_text()
          risk_marker = '\n## Current treatment priorities\n'
          risk_additions = '''| R-045 | A stale published row remains visible after provider suspension or category removal | 3 | 5 | 15 | live provider/category/version joins on every public read, current-claim checks and removal regressions | Trust/backend / controlled |
| R-046 | Search distance or map output reveals a mobile provider private base | 2 | 5 | 10 | separate private/public geometry, service-area matching for mobile providers, public DTO allowlists and privacy regressions | Privacy/location / controlled |
| R-047 | Saved-provider lists retain ineligible or withdrawn providers | 3 | 4 | 12 | re-evaluate publication, organization, category/version and claim eligibility on save and every saved-list read | Product/backend / controlled |
| R-048 | Map/vendor outage, cost or permission denial makes discovery unusable | 3 | 4 | 12 | manual area path, list mode, adapter boundary, no background location and production vendor gate | Android/architecture / open |
| R-049 | Sparse supply or aggressive filters produce empty results that mislead customers | 4 | 3 | 12 | bounded no-results recovery, transparent filters, sparse/empty synthetic states and no fabricated providers | Product/growth / open |
'''
          if '| R-045 |' not in risks:
              if risk_marker not in risks:
                  raise SystemExit('Risk-register insertion marker not found')
              risks = risks.replace(risk_marker, risk_additions + risk_marker, 1)
          priorities_start = risks.index('## Current treatment priorities')
          cadence_start = risks.index('## Review cadence')
          priorities = '''## Current treatment priorities

Phase 5 exit controls are complete:

- R-003 and R-046 are controlled by separate private/public/service-area geometry and public serialization regressions;
- R-005, R-042 and R-045 are controlled by current-claim and live eligibility checks;
- R-011 and R-049 have explicit empty/sparse/no-results states without fabricated supply;
- R-027 remains controlled through synthetic fixtures and build labelling;
- R-035, R-044 and R-047 have database/API/Android tests for safe publication and saves.

Before Phase 6 or production integration:

- R-006 requires durable local drafts, retry and upload recovery in the provider workspace;
- R-014 and R-048 require an approved map/location provider, quotas, cost controls and manual fallback validation;
- R-039, R-042 and R-043 require production storage, scheduler, scanning, alerting and recovery validation;
- R-045 requires production monitoring for stale or policy-invalid publication rows.

Before the controlled pilot:

- R-004, R-010, R-013, R-015, R-021, R-022, R-023 and R-025 require real operational or legal evidence;
- R-030 requires approved providers, distributed rate limiting and monitored abuse controls;
- R-033 requires deployment, cookie/session, CSP and private-data review;
- R-034 requires production configuration and secret-management validation;
- R-037 requires representative provider and customer fairness testing.

'''
          risks = risks[:priorities_start] + priorities + risks[cadence_start:]
          risks_path.write_text(risks)
          PY

      - name: Commit stable programme record and remove helper
        shell: bash
        run: |
          rm .github/workflows/phase5-checkpoint-record.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATUS.md WORKSTREAM_LOCK.md DECISION_LOG.md RISK_REGISTER.md \
                  .github/workflows/phase5-checkpoint-record.yml
          git diff --cached --check
          git commit -m "docs: record Phase 5 stable checkpoint"
          git push origin HEAD:docs/phase5-checkpoint-record