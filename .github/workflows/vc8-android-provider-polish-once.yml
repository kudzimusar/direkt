name: VC8 Android provider polish once

on:
  push:
    branches:
      - vc/ai-quality-7-8
    paths:
      - ".github/workflows/vc8-android-provider-polish-once.yml"

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: vc/ai-quality-7-8
          fetch-depth: 0
      - name: Replace provider test-harness wording without changing behavior
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt")
          text = path.read_text()
          replacements = {
              'Text("Start synthetic upload")': 'Text("Prepare evidence upload")',
              'Text("Start another synthetic upload")': 'Text("Prepare another evidence upload")',
              'Text("Simulate interruption")': 'Text("Save and retry later")',
              'Text("Provider-safe verification timeline", style = MaterialTheme.typography.titleLarge)': 'Text("Verification progress", style = MaterialTheme.typography.titleLarge)',
              'detail = "Identity evidence needs a clearer synthetic image.",': 'detail = "Identity evidence needs a clearer image.",',
              'Text("Later-phase boundaries", style = MaterialTheme.typography.titleMedium)': 'Text("Additional workspace features", style = MaterialTheme.typography.titleMedium)',
              'Text("${surface.label}: ${surface.state} · ${surface.phaseOwner}")': 'Text("${surface.label}: ${surface.state}")',
              'location.publicLocality?.let { locality -> Text("Public-safe locality: $locality") }': 'location.publicLocality?.let { locality -> Text("Public locality: $locality") }',
              'snapshot.logicalIntentId?.let { "Logical intent ${it.take(8)}…" }': 'snapshot.logicalIntentId?.let { "Upload reference ${it.take(8)}…" }',
              'Text("Recovery code: $errorCode")': 'Text("Retry status: $errorCode")',
              'Text("Provider trust boundary", fontWeight = FontWeight.Bold)': 'Text("What this workspace can and cannot change", fontWeight = FontWeight.Bold)',
              '"No real evidence, private coordinates, production storage, messaging, payment or public traffic is connected.",': '"This controlled review build uses fictional data. Trust decisions, private location, payments and publication remain backend-controlled.",',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Required Android polish marker missing: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Verify no behavior/test-tag drift
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -q 'testTag("provider-upload-start")' android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt
          grep -q 'testTag("provider-upload-interrupt")' android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt
          grep -q 'store.interrupt("NETWORK_INTERRUPTED")' android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt
          grep -q 'store.retry()' android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt
      - name: Commit bounded Android presentation polish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "direkt-vc-polish[bot]"
          git config user.email "direkt-vc-polish[bot]@users.noreply.github.com"
          git add android/direkt-app/app/src/main/java/com/kudzimusar/direkt/ui/provider/ProviderWorkspaceExperience.kt
          git commit -m "polish(vc8): humanize Android provider evidence presentation"
          git push origin HEAD:vc/ai-quality-7-8
