name: Phase 10 managed staging diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-managed-evidence.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print final staging failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29628140844 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 35
