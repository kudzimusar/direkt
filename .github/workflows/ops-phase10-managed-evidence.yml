name: Phase 10 managed staging diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-phase10-managed-evidence.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print staging failure lines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29628140844 --repo "$GITHUB_REPOSITORY" --log-failed \
            | grep -E 'PERMISSION_DENIED|NOT_FOUND|Permission|permission|secret|Secret|ERROR|Error|error|HTTP [0-9]{3}|exit code' \
            | tail -n 60
