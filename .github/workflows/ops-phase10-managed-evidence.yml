name: Firebase active run diagnostic
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/ops-phase10-managed-evidence.yml]
permissions:
  actions: read
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show active Firebase run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow firebase-internal-distribution.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Firebase run ID: $RUN_ID"
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --json status,conclusion,jobs
