name: Firebase terminal diagnostic
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/ops-phase10-managed-evidence.yml]
permissions:
  actions: read
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 29628961733 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 25
