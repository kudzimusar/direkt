name: DIREKT RC6 one-shot WhatsApp signed-receipt canary bridge

# DO NOT MERGE until the exact RC6 callback URL has been registered in the DIREKT Meta app,
# the owner-known verify token has passed Meta verification, and the WABA is subscribed to
# WhatsApp message webhooks. Merging this file is the explicit activation event for one
# synthetic/test-only managed canary; it does not authorize participant or production delivery.

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rc6-whatsapp-run-once.yml

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: direkt-rc6-whatsapp-run-once
  cancel-in-progress: false

jobs:
  dispatch:
    name: Execute exact-main RC6 signed-receipt synthetic canary
    if: github.repository == 'kudzimusar/direkt'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Dispatch exact-main managed RUN and publish bounded receipt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          source_sha="${GITHUB_SHA}"
          [[ "${source_sha}" =~ ^[0-9a-f]{40}$ ]]

          main_sha="$(gh api "repos/${repo}/git/ref/heads/main" --jq '.object.sha')"
          test "${main_sha}" = "${source_sha}"

          # Non-secret Meta test/synthetic asset identifiers already approved for RC6.
          payload="$(jq -nc \
            --arg sha "${source_sha}" \
            --arg phone "1146158541925026" \
            --arg waba "904315252104562" \
            --arg graph "v25.0" \
            --arg template "hello_world" \
            --arg language "en_US" \
            '{"ref":"main","inputs":{"confirmation":"RUN-DIREKT-WHATSAPP-CANARY","source_sha":$sha,"phone_number_id":$phone,"business_account_id":$waba,"graph_api_version":$graph,"template_name":$template,"template_language":$language}}')"
          gh api --method POST \
            "repos/${repo}/actions/workflows/cloud-run-whatsapp-canary.yml/dispatches" \
            --input - <<< "${payload}"

          run_id=""
          for _ in $(seq 1 60); do
            runs_json="$(gh api "repos/${repo}/actions/workflows/cloud-run-whatsapp-canary.yml/runs?event=workflow_dispatch&branch=main&per_page=20")"
            run_id="$(jq -r --arg sha "${source_sha}" '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | last | .id // empty' <<< "${runs_json}")"
            [[ -n "${run_id}" ]] && break
            sleep 5
          done
          if [[ -z "${run_id}" ]]; then
            echo "::error title=RC6 RUN dispatch not observed::No managed WhatsApp canary run was found for exact current main."
            exit 1
          fi

          status=""
          conclusion=""
          for _ in $(seq 1 480); do
            run_json="$(gh api "repos/${repo}/actions/runs/${run_id}")"
            status="$(jq -r '.status' <<< "${run_json}")"
            conclusion="$(jq -r '.conclusion // ""' <<< "${run_json}")"
            [[ "${status}" = "completed" ]] && break
            sleep 5
          done

          run_url="https://github.com/${repo}/actions/runs/${run_id}"
          current_main="$(gh api "repos/${repo}/git/ref/heads/main" --jq '.object.sha')"

          if [[ "${status}" != "completed" || "${conclusion}" != "success" ]]; then
            failure_body="$(cat <<EOF
          RC6 managed WhatsApp signed-receipt synthetic canary did not complete successfully.

          - Exact source: \`${source_sha}\`
          - Current main at receipt: \`${current_main}\`
          - Managed run: \`${run_id}\`
          - Status: \`${status}\`
          - Conclusion: \`${conclusion:-not-completed}\`
          - Run: ${run_url}
          - Provider asset class: Meta test/synthetic only
          - Participant/production WhatsApp delivery: disabled
          - Production authorization: false

          RC6 remains open. This failed receipt must be diagnosed; it must not be rewritten as a pass and does not authorize a retry that bypasses the original evidence.
          EOF
          )"
            gh api --method POST "repos/${repo}/issues/261/comments" -f body="${failure_body}" >/dev/null
            exit 1
          fi

          # Exact-source success is only promotable while the canary source is still current main.
          if [[ "${current_main}" != "${source_sha}" ]]; then
            stale_body="$(cat <<EOF
          RC6 managed WhatsApp signed-receipt synthetic canary completed successfully, but current main advanced before receipt promotion.

          - Canary source: \`${source_sha}\`
          - Current main: \`${current_main}\`
          - Managed run: \`${run_id}\`
          - Run: ${run_url}

          The result is retained as historical evidence only and is not promoted as current RC6 closure proof. Participant/production delivery remains disabled.
          EOF
          )"
            gh api --method POST "repos/${repo}/issues/261/comments" -f body="${stale_body}" >/dev/null
            exit 1
          fi

          # The managed workflow can conclude success only after its private job proves:
          # transactional outbox -> Meta acceptance -> authentic signed webhook receipt.
          success_body="$(cat <<EOF
          RC6 managed WhatsApp signed-receipt synthetic canary succeeded.

          - Exact current main: \`${source_sha}\`
          - Managed run: \`${run_id}\`
          - Run: ${run_url}
          - Provider asset class: Meta test/synthetic only
          - Recipient class: one owner-controlled verified test recipient from Secret Manager
          - Payload: approved/pre-approved \`hello_world\` template only
          - Managed terminal contract: transactional outbox → Meta acceptance → authentic signed webhook receipt
          - Participant/production WhatsApp delivery: disabled
          - Production authorization: false

          This is bounded RC6 managed evidence only. RC6 may move to closure reconciliation after exact-head regressions and status/ledger updates; it does not authorize production or participant messaging.
          EOF
          )"
          gh api --method POST "repos/${repo}/issues/261/comments" -f body="${success_body}" >/dev/null

          {
            echo "### RC6 WhatsApp signed-receipt canary bridge"
            echo "- Source: \`${source_sha}\`"
            echo "- Managed run: \`${run_id}\`"
            echo "- Managed workflow conclusion: success"
            echo "- Signed-receipt terminal contract: required by managed workflow"
            echo "- Participant/production delivery: disabled"
            echo "- Production authorization: false"
          } >> "${GITHUB_STEP_SUMMARY}"
