name: DIREKT Backend Lint Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - ".github/workflows/backend-lint-diagnostic.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci --ignore-scripts --silent
      - name: Capture ESLint output
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          npm run lint > artifacts/eslint.txt 2>&1
          code=$?
          echo "$code" > artifacts/eslint-exit-code.txt
          cat artifacts/eslint.txt
          exit 0
      - name: Upload ESLint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: direkt-eslint-diagnostic-${{ github.run_number }}
          path: backend/direkt-api/artifacts/eslint*.txt
          retention-days: 2
