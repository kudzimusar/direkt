name: DIREKT Backend Lint Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/direkt-api/**"
      - ".github/workflows/backend-lint-diagnostic.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci --ignore-scripts --silent
      - run: npm run lint
