name: Phase 9 lint correction

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase9-lint-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - working-directory: backend/direkt-api
        run: npm ci --ignore-scripts
      - name: Remove promise wrapper from webhook test helper
        shell: bash
        working-directory: backend/direkt-api
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('test/e2e/commercial-lifecycle.e2e.spec.ts')
          source = path.read_text()
          old = '  async function sendWebhook('
          new = '  function sendWebhook('
          if source.count(old) != 1:
              raise SystemExit('Expected exactly one async webhook helper')
          path.write_text(source.replace(old, new))
          PY
          npx prettier --write test/e2e/commercial-lifecycle.e2e.spec.ts
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/commercial-lifecycle.e2e.spec.ts
          git commit -m "fix(test): return webhook request directly"
          git push origin HEAD:build/android-v1
