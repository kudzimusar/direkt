name: Phase 8 backend formatter
# One-time formatter activation.

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase8-format-backend.yml"

permissions:
  contents: write

concurrency:
  group: phase8-backend-formatter
  cancel-in-progress: false

jobs:
  format:
    if: contains(github.event.head_commit.message, 'activate Phase 8 backend formatter')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Format backend
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit formatter-clean source
        shell: bash
        run: |
          rm .github/workflows/phase8-format-backend.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Phase 8 backend lifecycle"
          git push origin HEAD:build/android-v1
