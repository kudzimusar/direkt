name: DIREKT functional web W8 managed public cutover

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RUN-DIREKT-W8-PUBLIC-WEB to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-functional-web-w8-managed-cutover
  cancel-in-progress: false

jobs:
  cutover:
    name: Deploy and verify public synthetic-only functional web
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api
      GCP_WEB_SERVICE: direkt-customer-provider-web
      GCP_WEB_RUNTIME_SERVICE_ACCOUNT_ID: direkt-cp-web-runtime
      GCP_WEB_RUNTIME_SERVICE_ACCOUNT: direkt-cp-web-runtime@direkt-dev-502701.iam.gserviceaccount.com
    steps:
      - name: Validate immutable main source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "RUN-DIREKT-W8-PUBLIC-WEB"
          source_sha="${{ inputs.source_sha }}"
          [[ "${source_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          fetch-depth: 0

      - name: Verify exact reviewed source
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ steps.source.outputs.source_sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${SOURCE_SHA}" origin/main
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "WEB_IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_WEB_SERVICE}:w8-${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/direkt-app/package-lock.json

      - name: Re-run exact functional web W2-W8 contract
        working-directory: web/direkt-app
        env:
          DIREKT_WEB_API_MODE: disabled
          DIREKT_WEB_AUTH_MODE: disabled
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run verify

      - name: Authenticate to Google Cloud through approved staging identity
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Preflight W8 private API and dedicated runtime identity
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh preflight

      - name: Bind W8 runtime invoker on private API
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh api-invoker

      - name: Build and push W8 functional web image
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh image

      - name: Deploy and attach dedicated W8 browser/BFF runtime
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh deploy

      - name: Pin W8 browser mutation origin
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh origin

      - name: Verify W8 runtime attachment and IAM boundaries
        shell: bash
        run: bash scripts/w8-managed-cutover-prepare.sh verify

      - name: Prove canonical API denies unauthenticated direct traffic
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh api-denial

      - name: Prove public W8 responsive shell is reachable
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh public-shell

      - name: Prove W8 manifest service worker and offline shell
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh pwa-assets

      - name: Prove W8 BFF discovery traverses private API
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh discovery

      - name: Prove W8 synthetic session and private state boundaries
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh session

      - name: Prove W8 browser privacy scan and emit evidence
        id: evidence_file
        shell: bash
        run: bash scripts/w8-managed-cutover-exercise.sh privacy-evidence

      - name: Mark cutover verification successful
        shell: bash
        run: echo "W8_CUTOVER_SUCCEEDED=true" >> "${GITHUB_ENV}"

      - name: Enforce fail-closed IAM or verify successful final IAM
        if: always()
        shell: bash
        run: bash scripts/w8-managed-cutover-cleanup.sh

      - name: Upload sanitized W8 public functional web evidence
        if: always() && steps.evidence_file.conclusion == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: direkt-w8-functional-cutover-${{ steps.source.outputs.source_sha }}
          path: ${{ runner.temp }}/w8-cutover-evidence.json
          if-no-files-found: error
          retention-days: 14
