name: DIREKT Phase 3 Backend Format Once

on:
  push:
    branches: [build/android-v1]
    paths: [.github/workflows/phase3-backend-format-once.yml]

permissions:
  contents: write

concurrency:
  group: direkt-phase3-backend-format-once
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply pinned backend formatter
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts
          npm run format
      - name: Commit formatting and remove this workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase3-backend-format-once.yml
          git add backend/direkt-api
          if git diff --cached --quiet; then
            echo "No staged changes found."
            exit 1
          fi
          git commit -m "style: apply Phase 3 backend formatting"
          git push origin HEAD:build/android-v1