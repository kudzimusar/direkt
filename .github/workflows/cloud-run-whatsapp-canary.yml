name: DIREKT managed WhatsApp synthetic canary

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type PREPARE-DIREKT-WHATSAPP-WEBHOOK or RUN-DIREKT-WHATSAPP-CANARY
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to current main
        required: true
        type: string
      phone_number_id:
        description: Meta test/synthetic WhatsApp phone-number ID
        required: true
        type: string
      business_account_id:
        description: Meta WhatsApp Business Account ID for the test/synthetic setup
        required: true
        type: string
      graph_api_version:
        description: Explicit reviewed Meta Graph API version, for example vNN.N
        required: true
        type: string
      template_name:
        description: Approved or Meta-provided test template name
        required: true
        type: string
      template_language:
        description: Template language code
        required: true
        default: en_US
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-managed-whatsapp-canary
  cancel-in-progress: false

jobs:
  canary:
    name: Prepare webhook or execute synthetic WhatsApp canary
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_IMAGE_NAME: direkt-api
      GCP_WEBHOOK_SERVICE: direkt-whatsapp-canary-webhook
      GCP_CANARY_JOB: direkt-whatsapp-canary
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_DEPLOYER_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_RUNTIME_SERVICE_ACCOUNT: direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com
      GCP_WEBHOOK_SERVICE_ACCOUNT: direkt-whatsapp-webhook@direkt-dev-502701.iam.gserviceaccount.com
      DIREKT_DATABASE_SECRET: direkt-database-url
      WHATSAPP_ACCESS_TOKEN_SECRET: direkt-whatsapp-access-token
      WHATSAPP_APP_SECRET_SECRET: direkt-whatsapp-app-secret
      WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET: direkt-whatsapp-webhook-verify-token
      WHATSAPP_SYNTHETIC_RECIPIENT_SECRET: direkt-whatsapp-synthetic-recipient

    steps:
      - name: Validate bounded proof inputs
        id: controls
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          SOURCE_INPUT: ${{ inputs.source_sha }}
          PHONE_NUMBER_ID: ${{ inputs.phone_number_id }}
          BUSINESS_ACCOUNT_ID: ${{ inputs.business_account_id }}
          GRAPH_API_VERSION: ${{ inputs.graph_api_version }}
          TEMPLATE_NAME: ${{ inputs.template_name }}
          TEMPLATE_LANGUAGE: ${{ inputs.template_language }}
        run: |
          set -euo pipefail
          case "${CONFIRMATION}" in
            PREPARE-DIREKT-WHATSAPP-WEBHOOK) echo "mode=prepare" >> "${GITHUB_OUTPUT}" ;;
            RUN-DIREKT-WHATSAPP-CANARY) echo "mode=run" >> "${GITHUB_OUTPUT}" ;;
            *) echo "::error title=Invalid confirmation::Use the exact bounded RC6 confirmation token."; exit 1 ;;
          esac
          [[ "${SOURCE_INPUT}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${PHONE_NUMBER_ID}" =~ ^[0-9]{5,32}$ ]]
          [[ "${BUSINESS_ACCOUNT_ID}" =~ ^[0-9]{5,32}$ ]]
          [[ "${GRAPH_API_VERSION}" =~ ^v[0-9]{1,3}\.[0-9]{1,2}$ ]]
          [[ "${TEMPLATE_NAME}" =~ ^[a-z][a-z0-9_]{2,79}$ ]]
          [[ "${TEMPLATE_LANGUAGE}" =~ ^[a-z]{2,3}(_[A-Z]{2})?$ ]]

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify exact current main and source contract
        shell: bash
        env:
          SOURCE_INPUT: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${SOURCE_INPUT}"
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = "${SOURCE_SHA}"
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_IMAGE_NAME}:rc6-${SOURCE_SHA}" >> "${GITHUB_ENV}"
          cd backend/direkt-api
          npm ci --ignore-scripts
          npm run format:check
          npm run lint
          npm run typecheck
          npm run build
          npm run openapi:check
          cd ../..
          python3 scripts/rc6/verify-whatsapp-contract.py
          python3 scripts/rc6/verify-whatsapp-managed-identity.py

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve enabled numeric Secret Manager versions
        shell: bash
        env:
          MODE: ${{ steps.controls.outputs.mode }}
        run: |
          set -euo pipefail
          resolve_secret() {
            local output_name="$1"
            local secret_name="$2"
            local record version state
            record="$(gcloud secrets versions describe latest --secret "${secret_name}" --project "${GCP_PROJECT_ID}" --format=json)"
            version="$(jq -r '.name | split("/") | last' <<< "${record}")"
            state="$(jq -r '.state' <<< "${record}")"
            [[ "${version}" =~ ^[1-9][0-9]*$ ]]
            test "${state}" = "ENABLED"
            echo "${output_name}=${version}" >> "${GITHUB_ENV}"
            echo "- ${secret_name}: enabled numeric version resolved" >> "${GITHUB_STEP_SUMMARY}"
          }
          resolve_secret DIREKT_DATABASE_URL_SECRET_VERSION "${DIREKT_DATABASE_SECRET}"
          resolve_secret WHATSAPP_APP_SECRET_VERSION "${WHATSAPP_APP_SECRET_SECRET}"
          resolve_secret WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET_VERSION "${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET}"
          if [[ "${MODE}" = "run" ]]; then
            resolve_secret WHATSAPP_ACCESS_TOKEN_SECRET_VERSION "${WHATSAPP_ACCESS_TOKEN_SECRET}"
            resolve_secret WHATSAPP_SYNTHETIC_RECIPIENT_SECRET_VERSION "${WHATSAPP_SYNTHETIC_RECIPIENT_SECRET}"
          fi

      - name: Configure Artifact Registry and push immutable image
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build --file backend/direkt-api/Dockerfile --tag "${IMAGE_URI}" backend/direkt-api
          docker push "${IMAGE_URI}"

      - name: Deploy isolated signed-webhook canary service
        shell: bash
        env:
          PHONE_NUMBER_ID: ${{ inputs.phone_number_id }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/whatsapp-webhook-env.yaml" <<EOF
          NODE_ENV: "development"
          LOG_LEVEL: "warn"
          DIREKT_ENVIRONMENT: "staging"
          DIREKT_DATA_MODE: "synthetic-only"
          DIREKT_TRAFFIC_MODE: "internal"
          RATE_LIMITS_ENABLED: "false"
          EVIDENCE_STORAGE_PROVIDER: "synthetic"
          PAYMENT_PROVIDER_MODE: "disabled"
          AI_PROVIDER_MODE: "disabled"
          AI_FALLBACK_PROVIDER: "disabled"
          EMAIL_PROVIDER_MODE: "disabled"
          WHATSAPP_PROVIDER_MODE: "disabled"
          WHATSAPP_PHONE_NUMBER_ID: "${PHONE_NUMBER_ID}"
          EOF
          gcloud run deploy "${GCP_WEBHOOK_SERVICE}" \
            --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" \
            --image "${IMAGE_URI}" --service-account "${GCP_WEBHOOK_SERVICE_ACCOUNT}" \
            --command node --args dist/communications/whatsapp-webhook-canary.js \
            --env-vars-file "${RUNNER_TEMP}/whatsapp-webhook-env.yaml" \
            --set-secrets "DATABASE_URL=${DIREKT_DATABASE_SECRET}:${DIREKT_DATABASE_URL_SECRET_VERSION},WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET_SECRET}:${WHATSAPP_APP_SECRET_VERSION},WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET}:${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET_VERSION}" \
            --allow-unauthenticated --min 0 --max 1 --cpu 1 --memory 512Mi --concurrency 20 --timeout 30s \
            --labels "direkt-environment=staging,direkt-data-mode=synthetic-only,direkt-integration=whatsapp-webhook-canary" --quiet
          WEBHOOK_BASE_URL="$(gcloud run services describe "${GCP_WEBHOOK_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format='value(status.url)')"
          [[ "${WEBHOOK_BASE_URL}" == https://* ]]
          echo "WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}" >> "${GITHUB_ENV}"
          echo "WEBHOOK_CALLBACK_URL=${WEBHOOK_BASE_URL}/api/v1/communications/whatsapp/webhook" >> "${GITHUB_ENV}"

      - name: Verify isolated webhook service and pinned secret references
        shell: bash
        run: |
          set -euo pipefail
          export_file="${RUNNER_TEMP}/whatsapp-webhook-service.yaml"
          gcloud run services describe "${GCP_WEBHOOK_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=export > "${export_file}"
          grep -Fq "${GCP_WEBHOOK_SERVICE_ACCOUNT}" "${export_file}"
          if grep -Fq "${GCP_RUNTIME_SERVICE_ACCOUNT}" "${export_file}"; then
            echo "::error title=Webhook identity overlap::Public webhook service is using the send runtime identity."
            exit 1
          fi
          grep -Fq "whatsapp-webhook-canary.js" "${export_file}"
          grep -Fq "${WHATSAPP_APP_SECRET_SECRET}" "${export_file}"
          grep -Fq "${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET}" "${export_file}"
          if grep -Fq "${WHATSAPP_ACCESS_TOKEN_SECRET}" "${export_file}" || grep -Fq "${WHATSAPP_SYNTHETIC_RECIPIENT_SECRET}" "${export_file}"; then
            echo "::error title=Webhook send-secret exposure::Public webhook service references a send-only secret."
            exit 1
          fi
          grep -Fq 'WHATSAPP_PROVIDER_MODE' "${export_file}"
          grep -Fq 'disabled' "${export_file}"
          if grep -Fq 'key: latest' "${export_file}" || grep -Fq 'key: "latest"' "${export_file}" || grep -Fq "key: 'latest'" "${export_file}"; then
            echo "::error title=Unpinned webhook secret::Webhook service contains a latest secret reference."
            exit 1
          fi

      - name: Publish webhook preparation receipt
        if: steps.controls.outputs.mode == 'prepare'
        shell: bash
        run: |
          {
            echo "### DIREKT RC6 WhatsApp webhook preparation"
            echo "- Exact current main: \`${SOURCE_SHA}\`"
            echo "- Callback URL: \`${WEBHOOK_CALLBACK_URL}\`"
            echo "- Runtime identity: \`${GCP_WEBHOOK_SERVICE_ACCOUNT}\` (webhook-only)"
            echo "- Verify token: protected Secret Manager value, not printed"
            echo "- POST authenticity: HMAC SHA-256 with protected app secret"
            echo "- Surface: isolated webhook-only canary module"
            echo "- Send-token/recipient-secret access: prohibited"
            echo "- Participant/production delivery: disabled"
            echo "- Next external action: register the callback URL and the owner-known verify token in Meta, then subscribe WhatsApp message webhooks."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Deploy private synthetic send job
        if: steps.controls.outputs.mode == 'run'
        shell: bash
        env:
          PHONE_NUMBER_ID: ${{ inputs.phone_number_id }}
          BUSINESS_ACCOUNT_ID: ${{ inputs.business_account_id }}
          GRAPH_API_VERSION: ${{ inputs.graph_api_version }}
          TEMPLATE_NAME: ${{ inputs.template_name }}
          TEMPLATE_LANGUAGE: ${{ inputs.template_language }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/whatsapp-send-env.yaml" <<EOF
          NODE_ENV: "development"
          LOG_LEVEL: "warn"
          DIREKT_ENVIRONMENT: "staging"
          DIREKT_DATA_MODE: "synthetic-only"
          DIREKT_TRAFFIC_MODE: "internal"
          RATE_LIMITS_ENABLED: "false"
          EVIDENCE_STORAGE_PROVIDER: "synthetic"
          PAYMENT_PROVIDER_MODE: "disabled"
          AI_PROVIDER_MODE: "disabled"
          AI_FALLBACK_PROVIDER: "disabled"
          EMAIL_PROVIDER_MODE: "disabled"
          WHATSAPP_PROVIDER_MODE: "meta_cloud"
          WHATSAPP_PHONE_NUMBER_ID: "${PHONE_NUMBER_ID}"
          WHATSAPP_BUSINESS_ACCOUNT_ID: "${BUSINESS_ACCOUNT_ID}"
          WHATSAPP_GRAPH_API_VERSION: "${GRAPH_API_VERSION}"
          WHATSAPP_REQUEST_TIMEOUT_MS: "8000"
          WHATSAPP_MAX_ATTEMPTS: "4"
          WHATSAPP_OUTBOX_LOCK_TIMEOUT_MS: "300000"
          WHATSAPP_SYNTHETIC_SEND_APPROVED: "true"
          WHATSAPP_SYNTHETIC_TEMPLATE_NAME: "${TEMPLATE_NAME}"
          WHATSAPP_SYNTHETIC_TEMPLATE_LANGUAGE: "${TEMPLATE_LANGUAGE}"
          DIREKT_SOURCE_SHA: "${SOURCE_SHA}"
          EOF
          gcloud run jobs deploy "${GCP_CANARY_JOB}" \
            --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" \
            --image "${IMAGE_URI}" --service-account "${GCP_RUNTIME_SERVICE_ACCOUNT}" \
            --tasks 1 --max-retries 0 --task-timeout 3m --cpu 1 --memory 512Mi \
            --command node --args dist/communications/whatsapp-canary.js \
            --env-vars-file "${RUNNER_TEMP}/whatsapp-send-env.yaml" \
            --set-secrets "DATABASE_URL=${DIREKT_DATABASE_SECRET}:${DIREKT_DATABASE_URL_SECRET_VERSION},WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN_SECRET}:${WHATSAPP_ACCESS_TOKEN_SECRET_VERSION},WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET_SECRET}:${WHATSAPP_APP_SECRET_VERSION},WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET}:${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET_VERSION},WHATSAPP_SYNTHETIC_RECIPIENT=${WHATSAPP_SYNTHETIC_RECIPIENT_SECRET}:${WHATSAPP_SYNTHETIC_RECIPIENT_SECRET_VERSION}" \
            --labels "direkt-environment=staging,direkt-data-mode=synthetic-only,direkt-integration=whatsapp-canary" --quiet

      - name: Verify private job then execute signed-receipt canary
        if: steps.controls.outputs.mode == 'run'
        shell: bash
        run: |
          set -euo pipefail
          export_file="${RUNNER_TEMP}/whatsapp-canary-job.yaml"
          gcloud run jobs describe "${GCP_CANARY_JOB}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=export > "${export_file}"
          grep -Fq "${GCP_RUNTIME_SERVICE_ACCOUNT}" "${export_file}"
          if grep -Fq "${GCP_WEBHOOK_SERVICE_ACCOUNT}" "${export_file}"; then
            echo "::error title=Send identity overlap::Private send job is using the public webhook identity."
            exit 1
          fi
          grep -Fq "${WHATSAPP_ACCESS_TOKEN_SECRET}" "${export_file}"
          grep -Fq "${WHATSAPP_APP_SECRET_SECRET}" "${export_file}"
          grep -Fq "${WHATSAPP_WEBHOOK_VERIFY_TOKEN_SECRET}" "${export_file}"
          grep -Fq "${WHATSAPP_SYNTHETIC_RECIPIENT_SECRET}" "${export_file}"
          grep -Fq 'WHATSAPP_SYNTHETIC_SEND_APPROVED' "${export_file}"
          if grep -Fq 'key: latest' "${export_file}" || grep -Fq 'key: "latest"' "${export_file}" || grep -Fq "key: 'latest'" "${export_file}"; then
            echo "::error title=Unpinned canary secret::Canary job contains a latest secret reference."
            exit 1
          fi
          gcloud run jobs execute "${GCP_CANARY_JOB}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --wait --quiet
          EXECUTION_NAME="$(gcloud run jobs executions list --job "${GCP_CANARY_JOB}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --sort-by='~metadata.creationTimestamp' --limit=1 --format='value(metadata.name)')"
          test -n "${EXECUTION_NAME}"
          echo "EXECUTION_NAME=${EXECUTION_NAME}" >> "${GITHUB_ENV}"

      - name: Publish sanitized managed-canary receipt
        if: steps.controls.outputs.mode == 'run'
        shell: bash
        run: |
          {
            echo "### DIREKT managed WhatsApp synthetic canary"
            echo "- Exact current main: \`${SOURCE_SHA}\`"
            echo "- Webhook callback: \`${WEBHOOK_CALLBACK_URL}\`"
            echo "- Webhook identity: \`${GCP_WEBHOOK_SERVICE_ACCOUNT}\`"
            echo "- Send identity: \`${GCP_RUNTIME_SERVICE_ACCOUNT}\`"
            echo "- Send job: \`${GCP_CANARY_JOB}\`"
            echo "- Execution: \`${EXECUTION_NAME}\`"
            echo "- Provider asset class: Meta test/synthetic only"
            echo "- Recipient class: one owner-controlled verified test recipient"
            echo "- Payload: approved/pre-approved template only"
            echo "- Secret references: enabled numeric versions only"
            echo "- Outbox → Meta acceptance → signed webhook receipt: passed"
            echo "- Participant/production delivery: disabled"
            echo "- Production authorization: false"
          } >> "${GITHUB_STEP_SUMMARY}"
