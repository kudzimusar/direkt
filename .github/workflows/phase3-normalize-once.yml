name: DIREKT Phase 3 Normalize Once

on:
  push:
    branches: [build/android-v1]
    paths: [.github/workflows/phase3-normalize-once.yml]

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
      - name: Normalize Phase 3 against existing repository contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          existing = '\n'.join(
              p.read_text()
              for p in sorted(Path('database/migrations').glob('*.sql'))
              if 'phase3_provider_category_core' not in p.name
          )
          table = re.search(r'CREATE TABLE authz\.role_assignments\s*\((.*?)\n\);', existing, re.S | re.I)
          if not table:
              raise SystemExit('role_assignments table definition not found')
          columns = re.findall(r'^\s*([a-z_]+_by_identity_id)\s+uuid', table.group(1), re.M)
          actor_column = next((c for c in columns if 'assign' in c or 'grant' in c), None)
          if not actor_column:
              raise SystemExit('role assignment actor column not found')
          repository = Path('backend/direkt-api/src/phase3/phase3.repository.ts')
          text = repository.read_text()
          text = text.replace('assigned_by_identity_id', actor_column)
          text = text.replace('granted_by_identity_id', actor_column)
          repository.write_text(text)

          decorator = Path('backend/direkt-api/src/authorization/require-permission.decorator.ts').read_text()
          controller = Path('backend/direkt-api/src/phase3/phase3.controller.ts')
          text = controller.read_text()
          signature = re.search(r'(?:function|const)\s+RequirePermission[^\n]*', decorator)
          signature_text = signature.group(0) if signature else decorator[:600]
          if 'providerParam?: string' in decorator and 'providerParam?: {' not in decorator and 'options' not in signature_text:
              text = re.sub(
                  r"@RequirePermission\((PERMISSIONS\.[A-Z_]+), \{ providerParam: 'providerId' \}\)",
                  r"@RequirePermission(\1, 'providerId')",
                  text,
              )
              text = text.replace(
                  "@RequirePermission(PERMISSIONS.PROVIDER_REPRESENTATIVES_MANAGE, {\n    providerParam: 'providerId',\n  })",
                  "@RequirePermission(PERMISSIONS.PROVIDER_REPRESENTATIVES_MANAGE, 'providerId')",
              )
          controller.write_text(text)
          PY
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Format exact source
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npm run format -- --log-level silent
      - name: Commit normalization and remove this workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase3-normalize-once.yml
          git add backend/direkt-api/src/phase3
          git commit -m "fix(phase3): align provider core with existing contracts"
          git push origin HEAD:build/android-v1
