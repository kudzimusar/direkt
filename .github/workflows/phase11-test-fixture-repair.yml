name: DIREKT Phase 11 test fixture repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Repair policy-version fixtures to satisfy canonical schema
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('backend/direkt-api/test/e2e/firebase-session-binding.e2e.spec.ts'),
              Path('backend/direkt-api/test/e2e/firebase-consent-withdrawal.e2e.spec.ts'),
              Path('backend/direkt-api/test/e2e/pilot-invitation.e2e.spec.ts'),
          ]
          old_columns = """         document_hash,
                   effective_at
                 ) VALUES ('pilot_participation_notice', $1, $2, now() - interval '1 minute')"""
          new_columns = """         document_hash,
                   published_at,
                   effective_at
                 ) VALUES (
                   'pilot_participation_notice',
                   $1,
                   $2,
                   now() - interval '1 minute',
                   now() - interval '1 minute'
                 )"""
          old_update = """       SET document_hash = EXCLUDED.document_hash,
                     effective_at = EXCLUDED.effective_at,"""
          new_update = """       SET document_hash = EXCLUDED.document_hash,
                     published_at = EXCLUDED.published_at,
                     effective_at = EXCLUDED.effective_at,"""

          for path in paths:
              text = path.read_text()
              if old_columns not in text:
                  raise SystemExit(f'Expected policy fixture columns not found in {path}')
              text = text.replace(old_columns, new_columns, 1)
              if 'ON CONFLICT (policy_key, version) DO UPDATE' in text:
                  if old_update not in text:
                      raise SystemExit(f'Expected policy fixture update not found in {path}')
                  text = text.replace(old_update, new_update, 1)
              path.write_text(text)
          PY
      - name: Format repaired fixtures
        working-directory: backend/direkt-api
        run: |
          npm ci --ignore-scripts --silent
          npx prettier --write \
            test/e2e/firebase-session-binding.e2e.spec.ts \
            test/e2e/firebase-consent-withdrawal.e2e.spec.ts \
            test/e2e/pilot-invitation.e2e.spec.ts
      - name: Commit repaired fixtures
        shell: bash
        run: |
          if git diff --quiet -- backend/direkt-api/test/e2e; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/direkt-api/test/e2e/firebase-session-binding.e2e.spec.ts \
            backend/direkt-api/test/e2e/firebase-consent-withdrawal.e2e.spec.ts \
            backend/direkt-api/test/e2e/pilot-invitation.e2e.spec.ts
          git commit -m "test: repair Phase 11 policy-version fixtures"
          git push origin HEAD:${{ github.head_ref }}
