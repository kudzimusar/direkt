name: Stage 7C-D regression fixes once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7cd-regression-fix-once.yml"

permissions:
  contents: write

concurrency:
  group: stage7cd-regression-fixes
  cancel-in-progress: false

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'activate robust Stage 7C-D regression fixes')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - name: Apply typed assertion and valid case transition
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          field_path = Path('backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts')
          field_text = field_path.read_text()
          start = field_text.index('    const allQueueBody = allQueue.body as FieldQueueResponse;')
          end = field_text.index('\n\n    await request(httpServer())', start)
          replacement = """    const allQueueBody = allQueue.body as FieldQueueResponse;
          expect(allQueueBody.scope).toBe('all');
          expect(allQueueBody.items).toEqual(
            expect.arrayContaining([expect.objectContaining({ workItemId: work.workItemId })]),
          );"""
          field_path.write_text(field_text[:start] + replacement + field_text[end:])

          override_path = Path('backend/direkt-api/test/e2e/operations-escalations-overrides.e2e.spec.ts')
          override_text = override_path.read_text()
          marker = "    await pool.query(\"UPDATE verification.cases SET status = 'ready_for_review' WHERE id = $1\", [caseId]);"
          if override_text.count(marker) != 1:
              raise SystemExit(f'expected one direct Stage 7D transition, found {override_text.count(marker)}')
          replacement = """    await pool.query(
            \"UPDATE verification.cases SET status = 'awaiting_evidence' WHERE id = $1 AND status = 'draft'\",
            [caseId],
          );
          await pool.query(
            \"UPDATE verification.cases SET status = 'ready_for_review' WHERE id = $1 AND status = 'awaiting_evidence'\",
            [caseId],
          );"""
          override_path.write_text(override_text.replace(marker, replacement, 1))
          PY
      - name: Format, commit and remove helper
        shell: bash
        run: |
          cd backend/direkt-api
          npm ci --ignore-scripts
          npm run format
          cd ../..
          rm .github/workflows/stage7cd-regression-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-field-workflow.e2e.spec.ts backend/direkt-api/test/e2e/operations-escalations-overrides.e2e.spec.ts .github/workflows/stage7cd-regression-fix-once.yml
          git diff --cached --check
          git commit -m "test: align Stage 7C-D workflow regressions"
          git push origin HEAD:build/android-v1
