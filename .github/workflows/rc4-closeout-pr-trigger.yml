name: DIREKT RC4 PR-scoped closeout trigger

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rc4-closeout-pr-trigger.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-closeout:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'integration/rc4-fcm-closeout'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm-closeout
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Execute validated non-workflow closeout patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/rc4-closeout-patcher.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply exact RC4 closeout reconciliation\n        shell: bash\n        run: |\n'
          if workflow.count(marker) != 1:
              raise SystemExit('Unable to locate the controlled closeout script exactly once.')
          raw = workflow.split(marker, 1)[1]
          lines = raw.splitlines()
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          body = body.replace('f"exact-main managed proof run `{RUN}`" if False else "29916381754"', '"29916381754"')
          body = body.replace(
              'fcm = replace_once(fcm, sentinel, "\\n", "remove obsolete FCM verifier sentinel")',
              'fcm = replace_once(fcm, sentinel, "", "remove obsolete FCM verifier sentinel")',
          )
          old = 'write(path, verifier)\n\n# The permanent canary remains; remove the obsolete compatibility sentinel.'
          new = (
              'verifier = replace_once(\n'
              '    verifier,\n'
              '    "fcm=implemented_gated_synthetic_canary_pending_participant_disabled",\n'
              '    "fcm=active_synthetic_only_managed_canary_participant_disabled",\n'
              '    "FCM verifier summary promotion",\n'
              ')\n'
              'write(path, verifier)\n\n'
              '# The permanent canary remains; remove the obsolete compatibility sentinel.'
          )
          if body.count(old) != 1:
              raise SystemExit(f'Unable to inject verifier summary promotion exactly once: {body.count(old)}')
          body = body.replace(old, new, 1)

          substitutions = {
              'git rm .github/workflows/rc4-fcm-managed-proof-once.yml': 'git checkout -- .github/workflows/rc4-fcm-managed-proof-once.yml',
              'git rm .github/workflows/rc4-closeout-patcher.yml': 'git checkout -- .github/workflows/rc4-closeout-patcher.yml',
              '  .github/workflows/firebase-fcm-canary.yml\n': '',
          }
          for old_text, new_text in substitutions.items():
              count = body.count(old_text)
              if count != 1:
                  raise SystemExit(f'Workflow-split substitution expected once, found {count}: {old_text!r}')
              body = body.replace(old_text, new_text, 1)

          Path('/tmp/rc4-closeout.sh').write_text(body, encoding='utf-8')
          PY

          if ! bash /tmp/rc4-closeout.sh > /tmp/rc4-closeout.log 2>&1; then
            {
              echo '### RC4 closeout patch helper failed safely'
              echo
              echo 'No closeout commit was pushed. Sanitized tail:'
              echo '```text'
              tail -n 40 /tmp/rc4-closeout.log | sed -E 's/(token|secret|password)=([^ ]+)/\1=[REDACTED]/Ig'
              echo '```'
            } > /tmp/rc4-closeout-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/rc4-closeout-comment.md
            exit 1
          fi

          tail -n 25 /tmp/rc4-closeout.log
          echo 'Non-workflow RC4 closeout commit pushed successfully; workflow cleanup is deferred to the repository connector.'
