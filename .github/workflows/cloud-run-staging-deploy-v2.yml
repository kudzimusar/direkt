name: DIREKT controlled Cloud Run staging deployment v2

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-DIREKT-STAGING to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-cloud-run-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, deploy and verify private synthetic staging
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api
      GCP_PORTAL_SERVICE: direkt-operations-portal-staging
      GCP_API_RUNTIME_SERVICE_ACCOUNT: direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com
      GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT: direkt-portal-runtime@direkt-dev-502701.iam.gserviceaccount.com

    steps:
      - name: Validate staging controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DEPLOY-DIREKT-STAGING"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "${SOURCE_SHA}" = "${{ inputs.source_sha }}"
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${SOURCE_SHA}" origin/main; then
            echo "::error title=Unmerged staging source::The selected source is not an ancestor of origin/main."
            exit 1
          fi
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "API_IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_API_SERVICE}:${SOURCE_SHA}" >> "${GITHUB_ENV}"
          echo "PORTAL_IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_PORTAL_SERVICE}:${SOURCE_SHA}" >> "${GITHUB_ENV}"

      - name: Run repository staging readiness gate
        shell: bash
        run: bash .github/scripts/check-cloud-run-staging-readiness.sh

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve enabled numeric Secret Manager versions
        shell: bash
        run: |
          set -euo pipefail
          mappings=(
            "DIREKT_DATABASE_URL_SECRET_VERSION:direkt-database-url"
            "DIREKT_SUPABASE_URL_SECRET_VERSION:direkt-supabase-url"
            "DIREKT_SUPABASE_SECRET_KEY_SECRET_VERSION:direkt-supabase-secret-key"
            "DIREKT_ACCESS_TOKEN_SECRET_VERSION:direkt-access-token-secret"
            "DIREKT_CONTACT_HASH_PEPPER_SECRET_VERSION:direkt-contact-hash-pepper"
            "DIREKT_CHALLENGE_HASH_PEPPER_SECRET_VERSION:direkt-challenge-hash-pepper"
            "DIREKT_RATE_LIMIT_HASH_PEPPER_SECRET_VERSION:direkt-rate-limit-hash-pepper"
            "DIREKT_PORTAL_COOKIE_SECRET_VERSION:direkt-portal-cookie-secret"
          )

          for mapping in "${mappings[@]}"; do
            variable_name="${mapping%%:*}"
            secret_name="${mapping#*:}"
            record="$(gcloud secrets versions describe latest \
              --secret "${secret_name}" \
              --project "${GCP_PROJECT_ID}" \
              --format=json)"
            version="$(jq -r '.name | split("/") | last' <<< "${record}")"
            state="$(jq -r '.state' <<< "${record}")"
            if [[ ! "${version}" =~ ^[1-9][0-9]*$ ]] || [[ "${state}" != "ENABLED" ]]; then
              echo "::error title=Enabled secret version missing::${secret_name} did not resolve to an enabled numeric version."
              exit 1
            fi
            echo "${variable_name}=${version}" >> "${GITHUB_ENV}"
            echo "- ${secret_name}: version ${version}" >> "${GITHUB_STEP_SUMMARY}"
          done

      - name: Configure Artifact Registry authentication
        shell: bash
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push immutable staging images
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file backend/direkt-api/Dockerfile \
            --tag "${API_IMAGE_URI}" \
            backend/direkt-api
          docker build \
            --file admin/direkt-operations-portal/Dockerfile \
            --build-arg NEXT_PUBLIC_APP_ENV=staging-synthetic \
            --tag "${PORTAL_IMAGE_URI}" \
            admin/direkt-operations-portal
          docker push "${API_IMAGE_URI}"
          docker push "${PORTAL_IMAGE_URI}"

      - name: Write bounded API runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/direkt-api-staging-env.yaml" <<'EOF'
          NODE_ENV: "development"
          LOG_LEVEL: "info"
          CORS_ORIGINS: ""
          DIREKT_ENVIRONMENT: "staging"
          DIREKT_DATA_MODE: "synthetic-only"
          DIREKT_TRAFFIC_MODE: "internal"
          RATE_LIMITS_ENABLED: "true"
          AUTH_CHALLENGE_MODE: "synthetic"
          ACCESS_TOKEN_TTL_SECONDS: "600"
          REFRESH_TOKEN_TTL_DAYS: "30"
          CHALLENGE_TTL_SECONDS: "300"
          EVIDENCE_STORAGE_PROVIDER: "supabase"
          SUPABASE_EVIDENCE_BUCKET: "provider-evidence"
          SUPABASE_PRIVATE_MEDIA_BUCKET: "provider-media-private"
          SUPABASE_PUBLIC_MEDIA_BUCKET: "provider-media-public"
          SUPABASE_SYSTEM_EXPORTS_BUCKET: "system-exports"
          PAYMENT_PROVIDER_MODE: "disabled"
          EOF

      - name: Deploy private API revision
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${GCP_API_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --image "${API_IMAGE_URI}" \
            --service-account "${GCP_API_RUNTIME_SERVICE_ACCOUNT}" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 40 \
            --timeout 60 \
            --ingress all \
            --labels "direkt-environment=staging,direkt-data-mode=synthetic-only" \
            --env-vars-file "${RUNNER_TEMP}/direkt-api-staging-env.yaml" \
            --set-secrets "DATABASE_URL=direkt-database-url:${DIREKT_DATABASE_URL_SECRET_VERSION},SUPABASE_URL=direkt-supabase-url:${DIREKT_SUPABASE_URL_SECRET_VERSION},SUPABASE_SECRET_KEY=direkt-supabase-secret-key:${DIREKT_SUPABASE_SECRET_KEY_SECRET_VERSION},ACCESS_TOKEN_SECRET=direkt-access-token-secret:${DIREKT_ACCESS_TOKEN_SECRET_VERSION},CONTACT_HASH_PEPPER=direkt-contact-hash-pepper:${DIREKT_CONTACT_HASH_PEPPER_SECRET_VERSION},CHALLENGE_HASH_PEPPER=direkt-challenge-hash-pepper:${DIREKT_CHALLENGE_HASH_PEPPER_SECRET_VERSION},RATE_LIMIT_HASH_PEPPER=direkt-rate-limit-hash-pepper:${DIREKT_RATE_LIMIT_HASH_PEPPER_SECRET_VERSION}" \
            --no-allow-unauthenticated \
            --quiet

          API_URL="$(gcloud run services describe "${GCP_API_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          test -n "${API_URL}"
          echo "API_URL=${API_URL}" >> "${GITHUB_ENV}"

      - name: Grant portal runtime invocation on API only
        shell: bash
        run: |
          set -euo pipefail
          gcloud run services add-iam-policy-binding "${GCP_API_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --member "serviceAccount:${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" \
            --role roles/run.invoker \
            --quiet

      - name: Deploy private operations portal revision
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${GCP_PORTAL_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --image "${PORTAL_IMAGE_URI}" \
            --service-account "${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 20 \
            --timeout 60 \
            --ingress all \
            --labels "direkt-environment=staging,direkt-data-mode=synthetic-only" \
            --set-env-vars "NODE_ENV=production,HOSTNAME=0.0.0.0,NEXT_PUBLIC_APP_ENV=staging-synthetic,DIREKT_API_BASE_URL=${API_URL},DIREKT_API_AUDIENCE=${API_URL}" \
            --set-secrets "PORTAL_COOKIE_SECRET=direkt-portal-cookie-secret:${DIREKT_PORTAL_COOKIE_SECRET_VERSION}" \
            --no-allow-unauthenticated \
            --quiet

          PORTAL_URL="$(gcloud run services describe "${GCP_PORTAL_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          test -n "${PORTAL_URL}"
          echo "PORTAL_URL=${PORTAL_URL}" >> "${GITHUB_ENV}"

      - name: Remove and reject public invocation bindings
        shell: bash
        run: |
          set -euo pipefail
          for service in "${GCP_API_SERVICE}" "${GCP_PORTAL_SERVICE}"; do
            for member in allUsers allAuthenticatedUsers; do
              gcloud run services remove-iam-policy-binding "${service}" \
                --project "${GCP_PROJECT_ID}" \
                --region "${GCP_REGION}" \
                --member "${member}" \
                --role roles/run.invoker \
                --quiet >/dev/null 2>&1 || true
            done
            policy_file="${RUNNER_TEMP}/${service}-iam.json"
            gcloud run services get-iam-policy "${service}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --format=json > "${policy_file}"
            jq -e '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' "${policy_file}" >/dev/null
          done

          api_policy="${RUNNER_TEMP}/${GCP_API_SERVICE}-iam.json"
          jq -e --arg expected "serviceAccount:${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" '
            [.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] as $members
            | ($members | index($expected)) != null
          ' "${api_policy}" >/dev/null

      - name: Verify runtime identities, images and secret allowlists
        shell: bash
        run: |
          set -euo pipefail
          gcloud run services describe "${GCP_API_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${RUNNER_TEMP}/api-service.json"
          gcloud run services describe "${GCP_PORTAL_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${RUNNER_TEMP}/portal-service.json"

          jq -e --arg identity "${GCP_API_RUNTIME_SERVICE_ACCOUNT}" '.spec.template.spec.serviceAccountName == $identity' "${RUNNER_TEMP}/api-service.json" >/dev/null
          jq -e --arg identity "${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" '.spec.template.spec.serviceAccountName == $identity' "${RUNNER_TEMP}/portal-service.json" >/dev/null
          jq -e --arg image "${API_IMAGE_URI}" '.spec.template.spec.containers[0].image == $image' "${RUNNER_TEMP}/api-service.json" >/dev/null
          jq -e --arg image "${PORTAL_IMAGE_URI}" '.spec.template.spec.containers[0].image == $image' "${RUNNER_TEMP}/portal-service.json" >/dev/null

          jq -e '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null) | .name] | sort == ["ACCESS_TOKEN_SECRET","CHALLENGE_HASH_PEPPER","CONTACT_HASH_PEPPER","DATABASE_URL","RATE_LIMIT_HASH_PEPPER","SUPABASE_SECRET_KEY","SUPABASE_URL"]' "${RUNNER_TEMP}/api-service.json" >/dev/null
          jq -e '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null) | .name] == ["PORTAL_COOKIE_SECRET"]' "${RUNNER_TEMP}/portal-service.json" >/dev/null
          jq -e '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null) | .valueFrom.secretKeyRef.key] | all(test("^[1-9][0-9]*$"))' "${RUNNER_TEMP}/api-service.json" >/dev/null
          jq -e '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null) | .valueFrom.secretKeyRef.key] | all(test("^[1-9][0-9]*$"))' "${RUNNER_TEMP}/portal-service.json" >/dev/null

      - name: Mint private API smoke-test ID token
        id: api-smoke-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.API_URL }}
          id_token_include_email: true

      - name: Mint private portal smoke-test ID token
        id: portal-smoke-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.PORTAL_URL }}
          id_token_include_email: true

      - name: Run private service smoke tests
        shell: bash
        env:
          API_ID_TOKEN: ${{ steps.api-smoke-auth.outputs.id_token }}
          PORTAL_ID_TOKEN: ${{ steps.portal-smoke-auth.outputs.id_token }}
        run: |
          set -euo pipefail
          echo "::add-mask::${API_ID_TOKEN}"
          echo "::add-mask::${PORTAL_ID_TOKEN}"
          curl --fail --silent --show-error --retry 8 --retry-delay 5 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer ${API_ID_TOKEN}" \
            "${API_URL}/api/v1/health/ready" > "${RUNNER_TEMP}/api-health.json"
          jq -e '.status == "ok" and .database.status == "ready"' "${RUNNER_TEMP}/api-health.json" >/dev/null

          curl --fail --silent --show-error --retry 8 --retry-delay 5 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer ${PORTAL_ID_TOKEN}" \
            "${PORTAL_URL}/api/health" > "${RUNNER_TEMP}/portal-health.json"
          jq -e '.status == "ready" and .portal == "ready" and .api == "ready"' "${RUNNER_TEMP}/portal-health.json" >/dev/null

      - name: Publish sanitized staging summary
        shell: bash
        run: |
          {
            echo "### DIREKT controlled Cloud Run staging"
            echo "- Source: \`${SOURCE_SHA}\`"
            echo "- API image: \`${API_IMAGE_URI}\`"
            echo "- Portal image: \`${PORTAL_IMAGE_URI}\`"
            echo "- Services: \`${GCP_API_SERVICE}\`, \`${GCP_PORTAL_SERVICE}\`"
            echo "- Invocation: IAM-private"
            echo "- Portal-to-API: bounded runtime identity"
            echo "- Scaling: minimum 0, maximum 1"
            echo "- Data mode: \`synthetic-only\`"
            echo "- Secret references: eight enabled numeric versions"
            echo "- Public invocation bindings: absent"
            echo "- Smoke tests: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
