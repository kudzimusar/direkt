name: DIREKT Phase 10 Android performance budget

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/phase10-android-performance-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/**"
      - ".github/workflows/phase10-android-performance-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-phase10-android-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cold-launch:
    name: Debug artifact and cold-launch budget
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_PROJECT_DIR: android/direkt-app
      DIREKT_GRADLE_VERSION: "9.4.0"
      DIREKT_DEBUG_PACKAGE: com.kudzimusar.direkt.debug
      APK_SIZE_BUDGET_BYTES: "52428800"
      COLD_LAUNCH_MEDIAN_BUDGET_MS: "3000"
      COLD_LAUNCH_P95_BUDGET_MS: "5000"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}

      - name: Bootstrap pinned Gradle wrapper
        working-directory: android/direkt-app
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin
          fi
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build debug APK and enforce artifact budget
        working-directory: android/direkt-app
        shell: bash
        run: |
          set -euo pipefail
          BUILD_STARTED_AT="$(date +%s)"
          ./gradlew --no-daemon --stacktrace testDebugUnitTest assembleDebug
          BUILD_DURATION_SECONDS="$(( $(date +%s) - BUILD_STARTED_AT ))"

          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          test -f "${APK_PATH}"
          APK_SIZE_BYTES="$(stat --format='%s' "${APK_PATH}")"
          test "${APK_SIZE_BYTES}" -le "${APK_SIZE_BUDGET_BYTES}"

          mkdir -p ../../artifacts/phase10
          {
            echo "APK_PATH=${ANDROID_PROJECT_DIR}/${APK_PATH}"
            echo "APK_SIZE_BYTES=${APK_SIZE_BYTES}"
            echo "ANDROID_BUILD_DURATION_SECONDS=${BUILD_DURATION_SECONDS}"
          } >> "${GITHUB_ENV}"

      - name: Enable KVM access
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Measure bounded cold launches on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euo pipefail
            adb install -r "${APK_PATH}"
            adb shell pm clear "${DIREKT_DEBUG_PACKAGE}" >/dev/null

            COMPONENT="$(adb shell cmd package resolve-activity --brief "${DIREKT_DEBUG_PACKAGE}" | tr -d '\r' | tail -n 1)"
            test -n "${COMPONENT}"

            RESULTS="${RUNNER_TEMP}/direkt-cold-launch-ms.txt"
            : > "${RESULTS}"
            for sample in 1 2 3 4 5; do
              OUTPUT="$(adb shell am start -W -S -n "${COMPONENT}")"
              TOTAL_MS="$(printf '%s\n' "${OUTPUT}" | awk -F: '/TotalTime/ { gsub(/[[:space:]]/, "", $2); print $2 }')"
              [[ "${TOTAL_MS}" =~ ^[0-9]+$ ]]
              echo "${TOTAL_MS}" >> "${RESULTS}"
              adb shell am force-stop "${DIREKT_DEBUG_PACKAGE}"
              sleep 1
            done

            sort -n "${RESULTS}" > "${RESULTS}.sorted"
            MEDIAN_MS="$(sed -n '3p' "${RESULTS}.sorted")"
            P95_MS="$(tail -n 1 "${RESULTS}.sorted")"
            test "${MEDIAN_MS}" -le "${COLD_LAUNCH_MEDIAN_BUDGET_MS}"
            test "${P95_MS}" -le "${COLD_LAUNCH_P95_BUDGET_MS}"

            jq -n \
              --arg sourceSha "${GITHUB_SHA}" \
              --arg packageName "${DIREKT_DEBUG_PACKAGE}" \
              --arg component "${COMPONENT}" \
              --argjson apkSizeBytes "${APK_SIZE_BYTES}" \
              --argjson apkSizeBudgetBytes "${APK_SIZE_BUDGET_BYTES}" \
              --argjson buildDurationSeconds "${ANDROID_BUILD_DURATION_SECONDS}" \
              --argjson medianMs "${MEDIAN_MS}" \
              --argjson p95Ms "${P95_MS}" \
              --argjson medianBudgetMs "${COLD_LAUNCH_MEDIAN_BUDGET_MS}" \
              --argjson p95BudgetMs "${COLD_LAUNCH_P95_BUDGET_MS}" \
              --slurpfile samples <(jq -Rsc 'split("\n") | map(select(length > 0) | tonumber)' "${RESULTS}") \
              '{
                schemaVersion: 1,
                sourceSha: $sourceSha,
                dataClassification: "synthetic-local-only",
                packageName: $packageName,
                component: $component,
                apk: {
                  sizeBytes: $apkSizeBytes,
                  sizeBudgetBytes: $apkSizeBudgetBytes,
                  buildDurationSeconds: $buildDurationSeconds
                },
                coldLaunch: {
                  samplesMs: $samples[0],
                  medianMs: $medianMs,
                  p95Ms: $p95Ms,
                  medianBudgetMs: $medianBudgetMs,
                  p95BudgetMs: $p95BudgetMs
                }
              }' > artifacts/phase10/android-performance-evidence.json

      - name: Publish Android performance summary
        shell: bash
        run: |
          {
            echo "### DIREKT Phase 10 Android performance budget"
            echo "- Package: \`${DIREKT_DEBUG_PACKAGE}\`"
            echo "- Debug APK: $(jq -r '.apk.sizeBytes' artifacts/phase10/android-performance-evidence.json) bytes"
            echo "- Build duration: $(jq -r '.apk.buildDurationSeconds' artifacts/phase10/android-performance-evidence.json)s"
            echo "- Cold-launch median: $(jq -r '.coldLaunch.medianMs' artifacts/phase10/android-performance-evidence.json)ms"
            echo "- Cold-launch p95: $(jq -r '.coldLaunch.p95Ms' artifacts/phase10/android-performance-evidence.json)ms"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitized Android performance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-phase10-android-performance-${{ github.run_number }}-${{ github.sha }}
          path: artifacts/phase10/android-performance-evidence.json
          if-no-files-found: warn
          retention-days: 30
