name: DIREKT Phase 10 managed Supabase restore exercise

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RESTORE-DIREKT-MANAGED to continue
        required: true
        type: string
      source_sha:
        description: Exact reviewed DIREKT commit already merged to main
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: direkt-phase10-managed-supabase-restore
  cancel-in-progress: false

jobs:
  restore:
    name: Dump, restore and verify managed Supabase application schemas
    if: github.ref == 'refs/heads/main'
    environment: development
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PROJECT_REF: aeeuscifrxcjmnswqwnq
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      POSTGRES_USER: direkt
      POSTGRES_PASSWORD: direkt_restore
      RESTORE_DB: direkt_managed_restore

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Validate restore controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "RESTORE-DIREKT-MANAGED"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]
          test -n "${SUPABASE_ACCESS_TOKEN}"
          test -n "${SUPABASE_DB_PASSWORD}"
          echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"
          echo "::add-mask::${SUPABASE_DB_PASSWORD}"
          RESTORE_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${RESTORE_DB}"
          echo "::add-mask::${RESTORE_DATABASE_URL}"
          echo "RESTORE_DATABASE_URL=${RESTORE_DATABASE_URL}" >> "${GITHUB_ENV}"

      - name: Check out exact reviewed source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Verify source identity and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.source_sha }}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${{ inputs.source_sha }}" origin/main

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve current Supabase Session pooler connection
        shell: bash
        run: |
          set -euo pipefail
          POOLER_RESPONSE="${RUNNER_TEMP}/supabase-pooler.json"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${POOLER_RESPONSE}" \
            --write-out '%{http_code}' \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/database/pooler" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json")"
          if [[ "${HTTP_STATUS}" != "200" ]]; then
            echo "::error title=Supabase pooler configuration unavailable::Management API returned HTTP ${HTTP_STATUS}."
            exit 1
          fi

          POOLER_ROW="$(jq -c '[.[] | select(.database_type == "PRIMARY")] | (map(select(.db_port == 5432 or .pool_mode == "session"))[0] // .[0] // empty)' "${POOLER_RESPONSE}")"
          test -n "${POOLER_ROW}"
          RAW_CONNECTION_STRING="$(jq -r '.connection_string // .connectionString // empty' <<<"${POOLER_ROW}")"
          DB_USER="$(jq -r '.db_user // empty' <<<"${POOLER_ROW}")"
          DB_HOST="$(jq -r '.db_host // empty' <<<"${POOLER_ROW}")"
          DB_NAME="$(jq -r '.db_name // "postgres"' <<<"${POOLER_ROW}")"

          export RAW_CONNECTION_STRING DB_USER DB_HOST DB_NAME
          SUPABASE_DATABASE_URL="$(node <<'NODE'
          const password = process.env.SUPABASE_DB_PASSWORD;
          const raw = process.env.RAW_CONNECTION_STRING;
          let url;
          if (raw) {
            const normalized = raw
              .replace(/\[YOUR-PASSWORD\]/g, 'placeholder')
              .replace(/\[YOUR_PASSWORD\]/g, 'placeholder');
            url = new URL(normalized);
          } else {
            if (!process.env.DB_USER || !process.env.DB_HOST) {
              throw new Error('Supabase pooler response did not include usable connection details.');
            }
            url = new URL('postgresql://localhost/postgres');
            url.username = process.env.DB_USER;
            url.hostname = process.env.DB_HOST;
            url.pathname = `/${process.env.DB_NAME || 'postgres'}`;
          }
          url.protocol = 'postgresql:';
          url.password = password;
          url.port = '5432';
          url.searchParams.set('sslmode', 'require');
          process.stdout.write(url.toString());
          NODE
          )"
          case "${SUPABASE_DATABASE_URL}" in
            postgresql://*) ;;
            *) echo "Invalid resolved Supabase database URL." >&2; exit 1 ;;
          esac
          echo "::add-mask::${SUPABASE_DATABASE_URL}"
          echo "SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}" >> "${GITHUB_ENV}"
          rm -f "${POOLER_RESPONSE}"

      - name: Capture sanitized live metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/phase10-managed-restore
          docker run --rm --network host \
            -v "${PWD}:/work:ro" \
            postgres:17-alpine \
            psql "${SUPABASE_DATABASE_URL}" \
              -v ON_ERROR_STOP=1 \
              -Atf /work/.github/scripts/phase10-managed-live-metadata.sql \
            > artifacts/phase10-managed-restore/live-metadata.json
          jq -e '
            .application_schema_count == 13
            and .application_table_count > 0
            and .migration_count >= 34
            and .private_bucket_count == 4
            and .storage_object_count == 0
          ' artifacts/phase10-managed-restore/live-metadata.json >/dev/null

      - name: Create managed application-schema backup
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -e DATABASE_URL="${SUPABASE_DATABASE_URL}" \
            -v "${PWD}:/work" \
            postgres:17-alpine sh -ceu '
              pg_dump \
                --dbname="$DATABASE_URL" \
                --format=custom \
                --file=/work/direkt-managed-application.dump \
                --schema=platform \
                --schema=account \
                --schema=authz \
                --schema=provider \
                --schema=catalog \
                --schema=evidence \
                --schema=verification \
                --schema=discovery \
                --schema=provider_workspace \
                --schema=operations \
                --schema=interaction \
                --schema=commercial \
                --schema=security \
                --no-owner \
                --no-acl
              pg_dump \
                --dbname="$DATABASE_URL" \
                --format=custom \
                --file=/work/direkt-managed-ledger.dump \
                --table=public.direkt_schema_migrations \
                --no-owner \
                --no-acl
            '
          test -s direkt-managed-application.dump
          test -s direkt-managed-ledger.dump

      - name: Restore into clean PostGIS database
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -e PGPASSWORD="${POSTGRES_PASSWORD}" \
            postgres:17-alpine \
            psql -h 127.0.0.1 -p 5432 -U "${POSTGRES_USER}" -d postgres \
              -v ON_ERROR_STOP=1 \
              -c "CREATE DATABASE ${RESTORE_DB};"
          docker run --rm --network host \
            -e PGPASSWORD="${POSTGRES_PASSWORD}" \
            postgres:17-alpine \
            psql -h 127.0.0.1 -p 5432 -U "${POSTGRES_USER}" -d "${RESTORE_DB}" \
              -v ON_ERROR_STOP=1 \
              -c 'CREATE EXTENSION IF NOT EXISTS postgis;' \
              -c 'CREATE EXTENSION IF NOT EXISTS btree_gist;'
          docker run --rm --network host \
            -e DATABASE_URL="${RESTORE_DATABASE_URL}" \
            -v "${PWD}:/work:ro" \
            postgres:17-alpine sh -ceu '
              pg_restore \
                --dbname="$DATABASE_URL" \
                --exit-on-error \
                --no-owner \
                --no-acl \
                /work/direkt-managed-application.dump
              pg_restore \
                --dbname="$DATABASE_URL" \
                --exit-on-error \
                --no-owner \
                --no-acl \
                /work/direkt-managed-ledger.dump
            '

      - name: Verify restored integrity and forward migrations
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -v "${PWD}:/work:ro" \
            postgres:17-alpine \
            psql "${RESTORE_DATABASE_URL}" \
              -v ON_ERROR_STOP=1 \
              -Atf /work/.github/scripts/phase10-managed-restored-metadata.sql \
            > artifacts/phase10-managed-restore/restored-metadata.json

          jq -e --slurpfile live artifacts/phase10-managed-restore/live-metadata.json '
            .application_table_count == $live[0].application_table_count
            and .application_schema_count == $live[0].application_schema_count
            and .migration_count == $live[0].migration_count
            and .seed_state == $live[0].seed_state
            and (.postgis_version | length > 0)
          ' artifacts/phase10-managed-restore/restored-metadata.json >/dev/null

          cd backend/direkt-api
          npm ci --ignore-scripts
          DATABASE_URL="${RESTORE_DATABASE_URL}" DIRECT_DATABASE_URL="${RESTORE_DATABASE_URL}" NODE_ENV=test npm run migration:check

      - name: Verify API readiness against restored database
        working-directory: backend/direkt-api
        shell: bash
        run: |
          set -euo pipefail
          DATABASE_URL="${RESTORE_DATABASE_URL}" \
          DIRECT_DATABASE_URL="${RESTORE_DATABASE_URL}" \
          NODE_ENV=development \
          PORT=9098 \
          EVIDENCE_STORAGE_PROVIDER=synthetic \
          PAYMENT_PROVIDER_MODE=disabled \
          DIREKT_ENVIRONMENT=development \
          DIREKT_DATA_MODE=synthetic-only \
          npm run start > "${RUNNER_TEMP}/managed-restore-api.log" 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9098/api/v1/health/ready > "${RUNNER_TEMP}/managed-restore-health.json"; then
              break
            fi
            sleep 2
          done
          jq -e '.status == "ok" and .database.status == "ready"' "${RUNNER_TEMP}/managed-restore-health.json" >/dev/null

      - name: Remove temporary backups and publish summary
        if: always()
        shell: bash
        run: |
          rm -f direkt-managed-application.dump direkt-managed-ledger.dump
          {
            echo "### DIREKT managed Supabase restore exercise"
            echo "- Source: \`${{ inputs.source_sha }}\`"
            echo "- Project ref: \`${PROJECT_REF}\`"
            echo "- Managed connection: resolved from the current Supabase Session pooler configuration"
            echo "- Scope: all 13 DIREKT application schemas plus the application migration ledger"
            echo "- Supabase platform schemas: excluded from the application dump"
            echo "- Storage metadata: verified independently; object count remains zero"
            echo "- PostgreSQL client: pinned container version 17"
            echo "- Restore target: clean disposable PostGIS 17 database"
            echo "- Application table count and seed-state sentinels: matched"
            echo "- Migration ledger: preserved and forward-checked"
            echo "- API readiness against restored data: passed"
            echo "- Backup artifacts retained: no"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitized restore evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-managed-restore-${{ github.run_number }}-${{ inputs.source_sha }}
          path: artifacts/phase10-managed-restore/*.json
          if-no-files-found: error
          retention-days: 30
