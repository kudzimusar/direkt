name: Stage 7 triage fixture fix once

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/stage7-test-fix-once.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Correct typed SQL placeholder sequence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/direkt-api/test/e2e/operations-triage.e2e.spec.ts')
          text = path.read_text()
          old = """          WHEN $2::uuid THEN now() - interval '13 hours'\n          ELSE now() - interval '1 hour'\n"""
          new = """          WHEN $2::uuid THEN now() - interval '13 hours'\n          WHEN $3::uuid THEN now() - interval '1 hour'\n          ELSE now()\n"""
          if text.count(old) != 1:
              raise SystemExit('expected one triage fixture placeholder block')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fixture correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/direkt-api/test/e2e/operations-triage.e2e.spec.ts
          git diff --cached --check
          git commit -m "test: type every Stage 7 triage fixture parameter"
          git push origin HEAD:build/android-v1
