# RC4 one-shot helper; never merge to main.
name: DIREKT RC4 one-shot FCM preflight patch

on:
  push:
    branches:
      - integration/rc4-fcm-canary-preflight-fix
    paths:
      - .github/workflows/rc4-fcm-preflight-patch-once.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/rc4-fcm-preflight-patch-once.yml

permissions:
  contents: read

jobs:
  patch:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'integration/rc4-fcm-canary-preflight-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: integration/rc4-fcm-canary-preflight-fix
          fetch-depth: 0

      - name: Patch FCM canary backend verification with disposable PostGIS
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          target = Path('.github/workflows/firebase-fcm-canary.yml')
          text = target.read_text()
          old_lines = [
              '      - name: Verify exact backend source',
              '        working-directory: backend/direkt-api',
              '        shell: bash',
              '        run: |',
              '          set -euo pipefail',
              '          npm ci --ignore-scripts',
              '          npm run format:check',
              '          npm run lint',
              '          npm run typecheck',
              '          npm run authorization:check',
              '          npm run migration:check',
              '          npm run test',
              '          npm run build',
              '          npm run openapi:check',
          ]
          new_lines = [
              '      - name: Verify exact backend source',
              '        working-directory: backend/direkt-api',
              '        shell: bash',
              '        run: |',
              '          set -euo pipefail',
              '          postgres_name="direkt-rc4-postgres-${GITHUB_RUN_ID}"',
              '          cleanup_postgres() {',
              '            docker rm --force "${postgres_name}" >/dev/null 2>&1 || true',
              '          }',
              '          trap cleanup_postgres EXIT',
              '',
              '          docker run --detach \\',
              '            --name "${postgres_name}" \\',
              '            --publish 55432:5432 \\',
              '            --env POSTGRES_DB=direkt_test \\',
              '            --env POSTGRES_USER=direkt \\',
              '            --env POSTGRES_PASSWORD=direkt_ci \\',
              '            postgis/postgis:18-3.6 >/dev/null',
              '',
              '          init_complete=false',
              '          for attempt in {1..60}; do',
              '            if docker logs "${postgres_name}" 2>&1 | grep -Fq "PostgreSQL init process complete; ready for start up."; then',
              '              init_complete=true',
              '              break',
              '            fi',
              '            if [[ "$(docker inspect --format=\'{{.State.Running}}\' "${postgres_name}")" != "true" ]]; then',
              '              echo "Disposable PostGIS exited before initialization completed." >&2',
              '              docker logs "${postgres_name}" >&2 || true',
              '              exit 1',
              '            fi',
              '            sleep 1',
              '          done',
              '          test "${init_complete}" = "true"',
              '',
              '          stable_ready=0',
              '          for attempt in {1..30}; do',
              '            if docker exec "${postgres_name}" pg_isready -U direkt -d direkt_test >/dev/null 2>&1; then',
              '              stable_ready=$((stable_ready + 1))',
              '              [[ "${stable_ready}" -ge 3 ]] && break',
              '            else',
              '              stable_ready=0',
              '            fi',
              '            [[ "${attempt}" -lt 30 ]]',
              '            sleep 1',
              '          done',
              '          [[ "${stable_ready}" -ge 3 ]]',
              '',
              '          export DATABASE_URL=postgresql://direkt:direkt_ci@localhost:55432/direkt_test',
              '          export DIRECT_DATABASE_URL="${DATABASE_URL}"',
              '          export NODE_ENV=test',
              '',
              '          npm ci --ignore-scripts',
              '          npm run format:check',
              '          npm run lint',
              '          npm run typecheck',
              '          npm run authorization:check',
              '          npm run migration:check',
              '          npm run test',
              '          npm run build',
              '          npm run openapi:check',
          ]
          old = '\n'.join(old_lines) + '\n'
          new = '\n'.join(new_lines) + '\n'
          if old not in text:
              raise SystemExit('expected FCM canary backend verification fragment not found')
          target.write_text(text.replace(old, new, 1))
          PY
          git diff --check

      - name: Upload exact patched canary workflow
        uses: actions/upload-artifact@v4
        with:
          name: rc4-fcm-canary-preflight-patch-${{ github.run_id }}
          path: .github/workflows/firebase-fcm-canary.yml
          if-no-files-found: error
          retention-days: 2
