name: DIREKT controlled Cloud Run staging inspection

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type INSPECT-DIREKT-STAGING to continue
        required: true
        type: string
      source_sha:
        description: Expected immutable DIREKT source SHA deployed to staging
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: direkt-cloud-run-staging-inspection
  cancel-in-progress: false

jobs:
  inspect:
    name: Inspect private DIREKT API and portal staging
    if: github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GCP_PROJECT_ID: direkt-dev-502701
      GCP_REGION: asia-northeast1
      GCP_ARTIFACT_REGISTRY: direkt-containers
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/264358173369/locations/global/workloadIdentityPools/direkt-github/providers/direkt-main
      GCP_SERVICE_ACCOUNT: direkt-github-deployer@direkt-dev-502701.iam.gserviceaccount.com
      GCP_API_SERVICE: direkt-api
      GCP_PORTAL_SERVICE: direkt-operations-portal-staging
      GCP_API_RUNTIME_SERVICE_ACCOUNT: direkt-api-runtime@direkt-dev-502701.iam.gserviceaccount.com
      GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT: direkt-portal-runtime@direkt-dev-502701.iam.gserviceaccount.com

    steps:
      - name: Validate inspection controls
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "INSPECT-DIREKT-STAGING"
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]]
          echo "EXPECTED_API_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_API_SERVICE}:${{ inputs.source_sha }}" >> "${GITHUB_ENV}"
          echo "EXPECTED_PORTAL_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_PORTAL_SERVICE}:${{ inputs.source_sha }}" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud through GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Inspect services, revisions, scaling and IAM
        shell: bash
        run: |
          set -euo pipefail
          api_file="${RUNNER_TEMP}/api-service.json"
          portal_file="${RUNNER_TEMP}/portal-service.json"
          api_iam="${RUNNER_TEMP}/api-iam.json"
          portal_iam="${RUNNER_TEMP}/portal-iam.json"

          fail() {
            echo "INSPECTION ASSERTION FAILED: $1" >&2
            exit 1
          }

          check_jq() {
            local label="$1"
            local expression="$2"
            local file="$3"
            jq -e "${expression}" "${file}" >/dev/null || fail "${label}"
            echo "PASS: ${label}"
          }

          diagnose_revision() {
            local label="$1"
            local revision="$2"
            local revision_file="${RUNNER_TEMP}/${label}-created-revision.json"
            if gcloud run revisions describe "${revision}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --format=json > "${revision_file}"; then
              echo "- ${label} latest-created timestamp: $(jq -r '.metadata.creationTimestamp // "unknown"' "${revision_file}")"
              jq -r --arg label "${label}" '.status.conditions[]? | "- \($label) condition \(.type): status=\(.status // "unknown"), reason=\(.reason // "none")"' "${revision_file}"
            else
              echo "- ${label} latest-created revision diagnostics unavailable"
            fi
          }

          gcloud run services describe "${GCP_API_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${api_file}"
          gcloud run services describe "${GCP_PORTAL_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${portal_file}"
          gcloud run services get-iam-policy "${GCP_API_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${api_iam}"
          gcloud run services get-iam-policy "${GCP_PORTAL_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${portal_iam}"

          API_URL="$(jq -r '.status.url' "${api_file}")"
          PORTAL_URL="$(jq -r '.status.url' "${portal_file}")"
          API_READY_REVISION="$(jq -r '.status.latestReadyRevisionName' "${api_file}")"
          PORTAL_READY_REVISION="$(jq -r '.status.latestReadyRevisionName' "${portal_file}")"
          API_CREATED_REVISION="$(jq -r '.status.latestCreatedRevisionName' "${api_file}")"
          PORTAL_CREATED_REVISION="$(jq -r '.status.latestCreatedRevisionName' "${portal_file}")"

          echo "Sanitized staging structure:"
          echo "- API revisions: created=${API_CREATED_REVISION}, ready=${API_READY_REVISION}"
          echo "- Portal revisions: created=${PORTAL_CREATED_REVISION}, ready=${PORTAL_READY_REVISION}"
          echo "- API image matches expected source: $(jq -r --arg image "${EXPECTED_API_IMAGE}" '.spec.template.spec.containers[0].image == $image' "${api_file}")"
          echo "- Portal image matches expected source: $(jq -r --arg image "${EXPECTED_PORTAL_IMAGE}" '.spec.template.spec.containers[0].image == $image' "${portal_file}")"
          echo "- API runtime identity: $(jq -r '.spec.template.spec.serviceAccountName' "${api_file}")"
          echo "- Portal runtime identity: $(jq -r '.spec.template.spec.serviceAccountName' "${portal_file}")"
          echo "- API secret-reference count: $(jq '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null)] | length' "${api_file}")"
          echo "- Portal secret-reference count: $(jq '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null)] | length' "${portal_file}")"
          echo "- API scaling effective min/max: $(jq -r '[(.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "0"), (.spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] // "unset")] | join("/")' "${api_file}")"
          echo "- Portal scaling effective min/max: $(jq -r '[(.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "0"), (.spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] // "unset")] | join("/")' "${portal_file}")"

          if [[ "${API_CREATED_REVISION}" != "${API_READY_REVISION}" ]]; then
            diagnose_revision "API" "${API_CREATED_REVISION}"
            fail "API latest-created revision must equal latest-ready revision"
          fi
          echo "PASS: API latest-created revision equals latest-ready revision"
          if [[ "${PORTAL_CREATED_REVISION}" != "${PORTAL_READY_REVISION}" ]]; then
            diagnose_revision "Portal" "${PORTAL_CREATED_REVISION}"
            fail "Portal latest-created revision must equal latest-ready revision"
          fi
          echo "PASS: Portal latest-created revision equals latest-ready revision"
          jq -e --arg image "${EXPECTED_API_IMAGE}" '.spec.template.spec.containers[0].image == $image' "${api_file}" >/dev/null || fail "API image must match exact requested source SHA"
          echo "PASS: API image matches exact requested source SHA"
          jq -e --arg image "${EXPECTED_PORTAL_IMAGE}" '.spec.template.spec.containers[0].image == $image' "${portal_file}" >/dev/null || fail "Portal image must match exact requested source SHA"
          echo "PASS: Portal image matches exact requested source SHA"
          jq -e --arg identity "${GCP_API_RUNTIME_SERVICE_ACCOUNT}" '.spec.template.spec.serviceAccountName == $identity' "${api_file}" >/dev/null || fail "API runtime identity must match bounded service account"
          echo "PASS: API runtime identity is bounded"
          jq -e --arg identity "${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" '.spec.template.spec.serviceAccountName == $identity' "${portal_file}" >/dev/null || fail "Portal runtime identity must match bounded service account"
          echo "PASS: Portal runtime identity is bounded"

          check_jq "API has exactly seven numeric-version secret references" '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null)] | length == 7 and all(.valueFrom.secretKeyRef.key | test("^[1-9][0-9]*$"))' "${api_file}"
          check_jq "Portal has exactly one numeric-version secret reference" '[.spec.template.spec.containers[0].env[]? | select(.valueFrom.secretKeyRef != null)] | length == 1 and all(.valueFrom.secretKeyRef.key | test("^[1-9][0-9]*$"))' "${portal_file}"
          check_jq "API effective scaling is min 0 max 1" '(.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "0") == "0" and .spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] == "1"' "${api_file}"
          check_jq "Portal effective scaling is min 0 max 1" '(.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "0") == "0" and .spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] == "1"' "${portal_file}"

          check_jq "API has no public Cloud Run invoker" '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' "${api_iam}"
          check_jq "Portal has no public Cloud Run invoker" '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' "${portal_iam}"
          jq -e --arg expected "serviceAccount:${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($expected) != null' "${api_iam}" >/dev/null || fail "API must grant Invoker to portal runtime"
          echo "PASS: API grants Invoker to portal runtime"
          jq -e --arg deployer "serviceAccount:${GCP_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($deployer) == null' "${api_iam}" >/dev/null || fail "API must not retain deployer Invoker outside bounded inspection window"
          echo "PASS: API does not retain deployer Invoker"
          jq -e --arg deployer "serviceAccount:${GCP_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($deployer) == null' "${portal_iam}" >/dev/null || fail "Portal must not retain deployer Invoker outside bounded inspection window"
          echo "PASS: Portal does not retain deployer Invoker"

          echo "API_URL=${API_URL}" >> "${GITHUB_ENV}"
          echo "PORTAL_URL=${PORTAL_URL}" >> "${GITHUB_ENV}"
          echo "API_READY_REVISION=${API_READY_REVISION}" >> "${GITHUB_ENV}"
          echo "PORTAL_READY_REVISION=${PORTAL_READY_REVISION}" >> "${GITHUB_ENV}"

      - name: Grant temporary deployer invocation for inspection
        shell: bash
        run: |
          set -euo pipefail
          for service in "${GCP_API_SERVICE}" "${GCP_PORTAL_SERVICE}"; do
            gcloud run services add-iam-policy-binding "${service}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --member "serviceAccount:${GCP_SERVICE_ACCOUNT}" \
              --role roles/run.invoker \
              --quiet >/dev/null
          done

      - name: Mint private API inspection token
        id: api-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.API_URL }}
          id_token_include_email: true

      - name: Mint private portal inspection token
        id: portal-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.PORTAL_URL }}
          id_token_include_email: true

      - name: Verify private readiness
        shell: bash
        env:
          API_ID_TOKEN: ${{ steps.api-auth.outputs.id_token }}
          PORTAL_ID_TOKEN: ${{ steps.portal-auth.outputs.id_token }}
        run: |
          set -euo pipefail
          echo "::add-mask::${API_ID_TOKEN}"
          echo "::add-mask::${PORTAL_ID_TOKEN}"
          curl --fail --silent --show-error --retry 4 --retry-delay 3 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer ${API_ID_TOKEN}" \
            "${API_URL}/api/v1/health/ready" > "${RUNNER_TEMP}/api-health.json"
          jq -e '.status == "ok" and .database.status == "ready"' "${RUNNER_TEMP}/api-health.json" >/dev/null
          curl --fail --silent --show-error --retry 4 --retry-delay 3 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer ${PORTAL_ID_TOKEN}" \
            "${PORTAL_URL}/api/health" > "${RUNNER_TEMP}/portal-health.json"
          jq -e '.status == "ready" and .portal == "ready" and .api == "ready"' "${RUNNER_TEMP}/portal-health.json" >/dev/null

      - name: Remove temporary deployer invocation and verify final IAM boundary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          for service in "${GCP_API_SERVICE}" "${GCP_PORTAL_SERVICE}"; do
            gcloud run services remove-iam-policy-binding "${service}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --member "serviceAccount:${GCP_SERVICE_ACCOUNT}" \
              --role roles/run.invoker \
              --quiet >/dev/null 2>&1 || true
          done

          api_iam="${RUNNER_TEMP}/api-final-iam.json"
          portal_iam="${RUNNER_TEMP}/portal-final-iam.json"
          gcloud run services get-iam-policy "${GCP_API_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${api_iam}"
          gcloud run services get-iam-policy "${GCP_PORTAL_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION}" --format=json > "${portal_iam}"

          jq -e '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' "${api_iam}" >/dev/null
          jq -e '[.bindings[]?.members[]? | select(. == "allUsers" or . == "allAuthenticatedUsers")] | length == 0' "${portal_iam}" >/dev/null
          jq -e --arg deployer "serviceAccount:${GCP_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($deployer) == null' "${api_iam}" >/dev/null
          jq -e --arg deployer "serviceAccount:${GCP_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($deployer) == null' "${portal_iam}" >/dev/null
          jq -e --arg expected "serviceAccount:${GCP_PORTAL_RUNTIME_SERVICE_ACCOUNT}" '[.bindings[]? | select(.role == "roles/run.invoker") | .members[]?] | index($expected) != null' "${api_iam}" >/dev/null

      - name: Publish sanitized inspection summary
        shell: bash
        run: |
          {
            echo "### DIREKT controlled staging inspection"
            echo "- Expected source: \`${{ inputs.source_sha }}\`"
            echo "- API ready revision: \`${API_READY_REVISION}\`"
            echo "- Portal ready revision: \`${PORTAL_READY_REVISION}\`"
            echo "- Runtime identities: bounded"
            echo "- Secret references: seven API plus one portal numeric version"
            echo "- Scaling: effective minimum 0, maximum 1"
            echo "- Public invocation bindings: absent"
            echo "- Portal-to-API invoker: present"
            echo "- Temporary inspection invoker: removed after readiness"
            echo "- Readiness: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
