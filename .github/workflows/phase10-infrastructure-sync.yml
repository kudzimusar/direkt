name: Synchronize Phase 10 infrastructure bootstrap

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase10-infrastructure-sync.yml"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0
      - name: Merge reviewed main infrastructure history
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --no-tags

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          if [[ ${merge_status} -ne 0 ]]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            test "${#conflicts[@]}" -gt 0
            for path in "${conflicts[@]}"; do
              case "${path}" in
                MASTER_BUILD_PLAN.md|PROJECT_STATUS.md|docs/INDEX.md|docs/integrations/INTEGRATION_AND_SECRETS_PLAN.md|docs/operations/CI_CD.md|docs/operations/DEPLOYMENT_RUNBOOK.md|docs/operations/ENVIRONMENT_STRATEGY.md|docs/phase10/HANDOFF_FROM_PHASE9.md)
                  git checkout --theirs -- "${path}"
                  git add "${path}"
                  ;;
                *)
                  echo "::error title=Unexpected synchronization conflict::${path}"
                  git merge --abort
                  exit 1
                  ;;
              esac
            done
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error title=Unresolved synchronization conflict::The merge still contains unresolved files."
            git merge --abort
            exit 1
          fi

          git add --all
          git commit -m "merge: synchronize Phase 10 infrastructure bootstrap"
          git push origin HEAD:build/android-v1
