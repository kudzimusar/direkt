name: Phase 5 review fix runner

on:
  push:
    branches:
      - build/android-v1
    paths:
      - ".github/workflows/phase5-review-fix-runner.yml"

permissions:
  contents: write

concurrency:
  group: phase5-review-fix-runner
  cancel-in-progress: false

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test

jobs:
  apply-and-verify:
    if: contains(github.event.head_commit.message, 'activate Phase 5 review fix runner')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v6
        with:
          ref: build/android-v1
          fetch-depth: 0

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json

      - name: Repair controlled patch matcher
        run: python3 .github/scripts/repair-phase5-review-runner.py

      - name: Apply reviewed source and regression patch
        run: python3 .github/scripts/apply-phase5-review-fixes.py

      - name: Install exact backend dependencies
        working-directory: backend/direkt-api
        run: npm ci --ignore-scripts

      - name: Format reviewed backend patch
        working-directory: backend/direkt-api
        run: npm run format

      - name: Verify lint and types
        working-directory: backend/direkt-api
        run: |
          npm run lint
          npm run typecheck

      - name: Verify migrations and full backend suite
        working-directory: backend/direkt-api
        run: |
          npm run migration:check
          npm run test
          npm run build
          npm run openapi:check

      - name: Commit clean reviewed source
        shell: bash
        run: |
          rm .github/scripts/apply-phase5-review-fixes.py
          rm .github/scripts/repair-phase5-review-runner.py
          rm .github/workflows/phase5-review-fix-runner.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: close Phase 5 review regressions"
          git push origin HEAD:build/android-v1
