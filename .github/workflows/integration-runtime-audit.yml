name: DIREKT integration runtime audit

on:
  push:
    branches:
      - main
      - build/android-v1
    paths:
      - "android/direkt-app/**"
      - "backend/direkt-api/**"
      - "admin/direkt-operations-portal/**"
      - "web/direkt-pwa/**"
      - "database/**"
      - "scripts/verify-integration-runtime-contract.py"
      - "scripts/verify-phase12-play-readiness.py"
      - "docs/integrations/**"
      - "docs/phase12/play/**"
      - "docs/phase12/PHASE12B_PLAY_CONSOLE_PREPARATION.md"
      - "docs/operations/REMOTE_UI_TESTING.md"
      - ".github/workflows/*cloud-run*"
      - ".github/workflows/*firebase*"
      - ".github/workflows/integration-runtime-audit.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/direkt-app/**"
      - "backend/direkt-api/**"
      - "admin/direkt-operations-portal/**"
      - "web/direkt-pwa/**"
      - "database/**"
      - "scripts/verify-integration-runtime-contract.py"
      - "scripts/verify-phase12-play-readiness.py"
      - "docs/integrations/**"
      - "docs/phase12/play/**"
      - "docs/phase12/PHASE12B_PLAY_CONSOLE_PREPARATION.md"
      - "docs/operations/REMOTE_UI_TESTING.md"
      - ".github/workflows/*cloud-run*"
      - ".github/workflows/*firebase*"
      - ".github/workflows/integration-runtime-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: direkt-integration-runtime-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  DIREKT_GRADLE_VERSION: "9.4.0"
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  source-contract:
    name: Verify integration source/runtime truth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate integration runtime contract
        shell: bash
        run: |
          set -o pipefail
          python scripts/verify-integration-runtime-contract.py 2>&1 | tee integration-runtime-contract.txt
      - name: Validate public PWA JavaScript syntax
        run: |
          node --check web/direkt-pwa/app.js
          node --check web/direkt-pwa/sw.js
      - name: Upload integration contract evidence
        uses: actions/upload-artifact@v4
        with:
          name: direkt-integration-runtime-contract-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: integration-runtime-contract.txt
          if-no-files-found: error
          retention-days: 14

  backend-database:
    name: Regress backend, migrations and OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://direkt:direkt_ci@localhost:5432/direkt_test
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: direkt_test
          POSTGRES_USER: direkt
          POSTGRES_PASSWORD: direkt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U direkt -d direkt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend/direkt-api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact checkout
        working-directory: .
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/direkt-api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run authorization:check
      - run: npm run migration:check
      - run: npm run test
      - run: npm run build
      - run: npm run openapi:check

  operations-portal:
    name: Regress protected operations portal
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: admin/direkt-operations-portal
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact checkout
        working-directory: .
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin/direkt-operations-portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  android:
    name: Regress Android integration boundary
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: android/direkt-app
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact checkout
        working-directory: .
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.DIREKT_GRADLE_VERSION }}
      - name: Bootstrap pinned Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            wrapper_checksum="$(sed -n 's/^distributionSha256Sum=//p' gradle/wrapper/gradle-wrapper.properties)"
            [[ "${wrapper_checksum}" =~ ^[0-9a-f]{64}$ ]]
            gradle wrapper \
              --gradle-version "${DIREKT_GRADLE_VERSION}" \
              --distribution-type bin \
              --gradle-distribution-sha256-sum "${wrapper_checksum}"
          fi
          chmod +x gradlew
      - name: Test, lint and assemble debug UI
        run: ./gradlew --no-daemon --no-configuration-cache testDebugUnitTest lintDebug assembleDebug
      - name: Build merged release manifest and resolved runtime dependency report
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --no-configuration-cache :app:processReleaseMainManifest
          ./gradlew --no-daemon --no-configuration-cache :app:dependencies \
            --configuration releaseRuntimeClasspath > "${RUNNER_TEMP}/release-runtime-dependencies.txt"
          MERGED_MANIFEST="$(find app/build/intermediates -type f -name AndroidManifest.xml -path '*merged_manifest*release*' -print -quit)"
          test -n "${MERGED_MANIFEST}"
          echo "DIREKT_MERGED_MANIFEST_PATH=${GITHUB_WORKSPACE}/android/direkt-app/${MERGED_MANIFEST}" >> "${GITHUB_ENV}"
          echo "DIREKT_REQUIRE_MERGED_MANIFEST=true" >> "${GITHUB_ENV}"
          echo "DIREKT_RELEASE_RUNTIME_DEPENDENCIES_PATH=${RUNNER_TEMP}/release-runtime-dependencies.txt" >> "${GITHUB_ENV}"
          echo "DIREKT_REQUIRE_RELEASE_RUNTIME_DEPENDENCIES=true" >> "${GITHUB_ENV}"
      - name: Re-run Phase 12B merged Play/Data Safety boundary
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -o pipefail
          python scripts/verify-phase12-play-readiness.py 2>&1 | tee "${RUNNER_TEMP}/phase12b-integration-audit.txt"
      - name: Upload Android integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direkt-android-integration-audit-${{ github.run_number }}-${{ env.SOURCE_SHA }}
          path: |
            ${{ runner.temp }}/phase12b-integration-audit.txt
            ${{ runner.temp }}/release-runtime-dependencies.txt
          if-no-files-found: warn
          retention-days: 7
