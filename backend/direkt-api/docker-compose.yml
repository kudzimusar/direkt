services:
  database:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: direkt
      POSTGRES_USER: direkt
      POSTGRES_PASSWORD: direkt_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U direkt -d direkt"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - direkt_postgres_data:/var/lib/postgresql

volumes:
  direkt_postgres_data:
